<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ─────────────────────────────────────────
           TOKENS
        ───────────────────────────────────────── */
        :root {
            --sidebar-w: 300px;
            --header-h: 58px;
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-xl: 22px;
            --ease: cubic-bezier(.4,0,.2,1);
            --ease-spring: cubic-bezier(.34,1.56,.64,1);
        }

        [data-theme="dark"] {
            --bg: #090d14;
            --bg-2: #0e1420;
            --bg-3: #141c2c;
            --bg-4: #1a2438;
            --border: rgba(255,255,255,.07);
            --border-accent: rgba(99,179,237,.25);
            --text: #e8edf5;
            --text-2: #8a9ab8;
            --text-3: #4a5878;
            --accent: #63b3ed;
            --accent-2: #90cdf4;
            --accent-glow: rgba(99,179,237,.15);
            --accent-muted: rgba(99,179,237,.08);
            --green: #68d391;
            --gold: #f6c90e;
            --red: #fc8181;
            --sidebar-bg: #07090f;
            --sidebar-hover: rgba(255,255,255,.04);
            --sidebar-active: rgba(99,179,237,.12);
            --shadow: 0 2px 12px rgba(0,0,0,.5);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
            --glow: 0 0 40px rgba(99,179,237,.08);
        }

        [data-theme="light"] {
            --bg: #f5f7fc;
            --bg-2: #ffffff;
            --bg-3: #eef1f8;
            --bg-4: #e3e8f4;
            --border: rgba(0,0,0,.08);
            --border-accent: rgba(37,99,235,.2);
            --text: #0d1526;
            --text-2: #4a5878;
            --text-3: #94a3b8;
            --accent: #2563eb;
            --accent-2: #1d4ed8;
            --accent-glow: rgba(37,99,235,.1);
            --accent-muted: rgba(37,99,235,.06);
            --green: #16a34a;
            --gold: #ca8a04;
            --red: #dc2626;
            --sidebar-bg: #0d1526;
            --sidebar-hover: rgba(255,255,255,.04);
            --sidebar-active: rgba(99,179,237,.12);
            --shadow: 0 2px 12px rgba(0,0,0,.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
            --glow: none;
        }

        /* ─────────────────────────────────────────
           RESET & BASE
        ───────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background .3s var(--ease), color .3s var(--ease);
            overflow: hidden;
            height: 100dvh;
        }

        /* ─────────────────────────────────────────
           LAYOUT
        ───────────────────────────────────────── */
        .app {
            display: flex;
            height: 100dvh;
            overflow: hidden;
        }

        /* ─────────────────────────────────────────
           SIDEBAR
        ───────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            transition: transform .3s var(--ease);
            z-index: 200;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(99,179,237,.03) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Logo bar */
        .sidebar-logo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            height: var(--header-h);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: .625rem;
        }

        .logo-icon-wrap {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent) 0%, rgba(99,179,237,.4) 100%);
            border-radius: var(--radius-sm);
            display: grid;
            place-items: center;
            font-size: .9rem;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            color: var(--text);
            letter-spacing: -.01em;
        }

        .logo-name span {
            color: var(--accent);
        }

        /* Close btn (mobile only) */
        .sidebar-close {
            display: none;
            background: none;
            border: none;
            color: var(--text-2);
            cursor: pointer;
            padding: .4rem;
            border-radius: var(--radius-sm);
            transition: color .2s, background .2s;
        }
        .sidebar-close:hover { color: var(--text); background: var(--sidebar-hover); }

        /* Search */
        .search-wrap {
            padding: .875rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-inner {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-inner svg {
            position: absolute;
            left: .75rem;
            color: var(--text-3);
            pointer-events: none;
            flex-shrink: 0;
        }

        .search-inner input {
            width: 100%;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: .55rem .75rem .55rem 2.25rem;
            font-family: inherit;
            font-size: .8125rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s, background .2s;
        }
        [data-theme="light"] .search-inner input {
            background: var(--bg-3);
        }
        .search-inner input::placeholder { color: var(--text-3); }
        .search-inner input:focus {
            border-color: var(--accent);
            background: var(--bg-4);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        .search-clear {
            position: absolute;
            right: .5rem;
            background: none;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            font-size: 1rem;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: color .2s;
        }
        .search-clear:hover { color: var(--text); }

        /* File tree */
        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: .5rem 0 1rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,.1) transparent;
        }
        .file-tree::-webkit-scrollbar { width: 4px; }
        .file-tree::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,.1);
            border-radius: 2px;
        }

        /* Folder */
        .folder { user-select: none; }

        .folder-header {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .425rem 1rem .425rem 1.25rem;
            cursor: pointer;
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: .06em;
            transition: color .2s, background .2s;
        }
        .folder-header:hover { color: var(--text-2); background: var(--sidebar-hover); }

        .folder-header svg {
            transition: transform .2s var(--ease);
            flex-shrink: 0;
        }
        .folder.open > .folder-header svg { transform: rotate(90deg); }
        .folder.open > .folder-header { color: var(--accent); }

        .folder-content { display: none; }
        .folder.open > .folder-content { display: block; }

        /* File item */
        .tree-file {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .38rem 1rem .38rem 1rem;
            cursor: pointer;
            font-size: .8125rem;
            color: var(--text-2);
            transition: color .18s, background .18s;
            border-radius: 0;
            position: relative;
        }
        .tree-file:hover { color: var(--text); background: var(--sidebar-hover); }
        .tree-file.active {
            color: var(--accent);
            background: var(--sidebar-active);
            font-weight: 500;
        }
        .tree-file.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            border-radius: 0 1px 1px 0;
        }

        .tree-file-icon {
            font-size: .75rem;
            opacity: .6;
            flex-shrink: 0;
        }
        .tree-file.active .tree-file-icon { opacity: 1; }

        /* ─────────────────────────────────────────
           MAIN
        ───────────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Header */
        .header {
            height: var(--header-h);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: .75rem;
            min-width: 0;
        }

        .menu-btn {
            display: none;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-2);
            width: 36px;
            height: 36px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color .2s, border-color .2s, background .2s;
        }
        .menu-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-muted); }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: .375rem;
            font-size: .8125rem;
            color: var(--text-3);
            min-width: 0;
            flex-wrap: nowrap;
            overflow: hidden;
        }
        .breadcrumb-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .breadcrumb-item.active { color: var(--text); font-weight: 500; }
        .breadcrumb-sep { flex-shrink: 0; opacity: .4; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-2);
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color .2s, border-color .2s, background .2s;
        }
        .icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-muted); }

        .theme-btn .moon { display: none; }
        [data-theme="light"] .theme-btn .sun { display: none; }
        [data-theme="light"] .theme-btn .moon { display: block; }

        /* Content area */
        .content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ─────────────────────────────────────────
           WELCOME SCREEN
        ───────────────────────────────────────── */
        .welcome {
            max-width: 860px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
            animation: fadeUp .4s var(--ease) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-hero {
            margin-bottom: 2.5rem;
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: var(--accent-muted);
            border: 1px solid var(--border-accent);
            border-radius: 100px;
            padding: .3rem .85rem;
            font-size: .75rem;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: .03em;
            margin-bottom: 1.25rem;
        }

        .welcome-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        .welcome-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.25rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -.03em;
            color: var(--text);
            margin-bottom: .75rem;
        }

        .welcome-title .hl {
            color: var(--accent);
            position: relative;
        }

        .welcome-sub {
            font-size: 1.0625rem;
            color: var(--text-2);
            max-width: 480px;
            line-height: 1.65;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            transition: border-color .2s, transform .2s var(--ease-spring);
        }
        .stat:hover {
            border-color: var(--border-accent);
            transform: translateY(-2px);
        }

        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: .25rem;
        }

        .stat-lbl {
            font-size: .78rem;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        /* Section */
        .section {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.125rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: .75rem;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .625rem;
            padding: 1.125rem .75rem;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-2);
            font-size: .8125rem;
            font-weight: 500;
            transition: all .2s var(--ease-spring);
            text-align: center;
        }
        .card:hover {
            color: var(--accent);
            border-color: var(--border-accent);
            background: var(--accent-muted);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .card-icon {
            font-size: 1.625rem;
            line-height: 1;
        }

        /* ─────────────────────────────────────────
           MARKDOWN CONTENT
        ───────────────────────────────────────── */
        .md-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            animation: fadeUp .3s var(--ease) both;
        }

        .md h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.6rem, 3vw, 2.25rem);
            font-weight: 800;
            letter-spacing: -.03em;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .md h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.375rem;
            font-weight: 700;
            margin-top: 2.25rem;
            margin-bottom: .875rem;
            color: var(--text);
        }

        .md h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1.75rem;
            margin-bottom: .625rem;
            color: var(--text);
        }

        .md h4 {
            font-size: .9375rem;
            font-weight: 600;
            margin-top: 1.25rem;
            margin-bottom: .5rem;
            color: var(--text-2);
        }

        .md p {
            margin-bottom: 1.125rem;
            color: var(--text-2);
            line-height: 1.8;
            font-size: .9375rem;
        }

        .md ul, .md ol {
            margin-bottom: 1.125rem;
            padding-left: 1.75rem;
            color: var(--text-2);
        }

        .md li {
            margin-bottom: .375rem;
            line-height: 1.75;
            font-size: .9375rem;
        }

        .md a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color .2s;
        }
        .md a:hover { border-bottom-color: var(--accent); }

        .md code {
            font-family: 'JetBrains Mono', monospace;
            font-size: .83em;
            background: var(--bg-4);
            color: var(--accent-2);
            padding: .15em .45em;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .md pre {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .md pre::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .md pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: .85rem;
            color: var(--text-2);
            line-height: 1.7;
        }

        .md blockquote {
            margin: 1.5rem 0;
            padding: 1rem 1.25rem;
            border-left: 3px solid var(--accent);
            background: var(--accent-muted);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--text-2);
            font-style: italic;
        }

        .md table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: .875rem;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .md th {
            background: var(--bg-3);
            padding: .75rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--text-3);
            border-bottom: 1px solid var(--border);
        }

        .md td {
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-2);
            line-height: 1.6;
        }

        .md tr:last-child td { border-bottom: none; }
        .md tr:hover td { background: var(--bg-3); }

        .md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        .md img {
            max-width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin: 1rem 0;
        }

        .md strong { font-weight: 600; color: var(--text); }

        /* ─────────────────────────────────────────
           STATES
        ───────────────────────────────────────── */
        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-3);
            animation: fadeUp .3s var(--ease) both;
        }

        .state-icon { font-size: 2.5rem; }

        .state h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-2);
        }

        .state p {
            font-size: .9rem;
            max-width: 400px;
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .625rem 1.25rem;
            background: var(--accent);
            color: #000;
            font-family: inherit;
            font-size: .875rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: opacity .2s, transform .2s;
        }
        .btn:hover { opacity: .85; transform: translateY(-1px); }

        /* Spinner */
        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─────────────────────────────────────────
           OVERLAY (mobile)
        ───────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 150;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: block; }

        /* ─────────────────────────────────────────
           NOTICE
        ───────────────────────────────────────── */
        .notice {
            background: var(--accent-muted);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius);
            padding: .875rem 1.125rem;
            font-size: .8125rem;
            color: var(--text-2);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .notice code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-4);
            padding: .1em .4em;
            border-radius: 3px;
            font-size: .85em;
        }

        /* ─────────────────────────────────────────
           RESPONSIVE
        ───────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100dvh;
                transform: translateX(-100%);
                z-index: 200;
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            .sidebar-close { display: flex; }
            .menu-btn { display: flex; }

            .welcome { padding: 1.5rem 1rem 3rem; }
            .stats { grid-template-columns: repeat(3, 1fr); gap: .625rem; }
            .stat { padding: .875rem 1rem; }
            .stat-num { font-size: 1.5rem; }
            .cards { grid-template-columns: repeat(3, 1fr); }

            .header { padding: 0 1rem; }
            .md-wrap { padding: 1.25rem 1rem 3rem; }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: repeat(3, 1fr); }
            .cards { grid-template-columns: repeat(2, 1fr); }
        }

        /* ─────────────────────────────────────────
           SCROLLBAR (main content)
        ───────────────────────────────────────── */
        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-mark">
                <div class="logo-icon-wrap">📚</div>
                <span class="logo-name">Interview <span>Prep</span></span>
            </div>
            <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="search-wrap">
            <div class="search-inner">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search…" autocomplete="off">
                <button class="search-clear" id="searchClear">×</button>
            </div>
        </div>

        <nav class="file-tree" id="fileTree"></nav>
    </aside>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Main -->
    <main class="main">
        <header class="header">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn" aria-label="Open menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <nav class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item active">Home</span>
                </nav>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="backBtn" style="display:none" aria-label="Back">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button class="icon-btn theme-btn" id="themeBtn" aria-label="Toggle theme">
                    <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="content" id="content">
            <!-- Populated by JS -->
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
