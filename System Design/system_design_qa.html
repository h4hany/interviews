<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design — Study Q&A</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #4f8fff;
    --accent2: #7c5cfc;
    --green: #3dffa0;
    --red: #ff4f6d;
    --yellow: #ffd166;
    --text: #e8ecf4;
    --muted: #6b7a99;
    --card-glow: rgba(79,143,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,143,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,143,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .stat span {
    color: var(--accent);
    font-weight: 500;
  }

  /* Filter tabs */
  .filter-area {
    position: relative;
    z-index: 1;
    padding: 28px 32px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.3px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Progress bar */
  .progress-wrap {
    position: relative;
    z-index: 1;
    padding: 20px 32px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Main grid */
  main {
    position: relative;
    z-index: 1;
    padding: 28px 32px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* Q&A Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-glow);
    opacity: 0;
    transition: opacity .2s;
    border-radius: 12px;
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border-color: rgba(79,143,255,0.3);
  }
  .card:hover::before { opacity: 1; }
  .card.revealed { border-color: rgba(61,255,160,0.25); }
  .card.revealed::before { background: rgba(61,255,160,0.04); opacity: 1; }

  .card-header {
    padding: 16px 18px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .q-badge {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 4px;
    background: rgba(79,143,255,0.12);
    color: var(--accent);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .category-tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .card-question {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    flex: 1;
  }

  .reveal-area {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s ease, padding .3s ease;
  }
  .card.revealed .reveal-area {
    max-height: 600px;
  }

  .card-answer {
    padding: 0 18px 16px;
    font-size: 13px;
    line-height: 1.75;
    color: #a8b4cc;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .card-answer strong {
    color: var(--green);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    display: block;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .reveal-hint {
    padding: 8px 18px 14px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
  }
  .card.revealed .reveal-hint { display: none; }

  .reveal-hint svg {
    width: 12px; height: 12px;
    opacity: 0.6;
  }

  /* Category colors */
  .cat-database    { background: rgba(255,82,130,0.12); color: #ff5282; }
  .cat-scaling     { background: rgba(79,143,255,0.12); color: var(--accent); }
  .cat-caching     { background: rgba(255,209,102,0.12); color: var(--yellow); }
  .cat-algorithms  { background: rgba(61,255,160,0.12); color: var(--green); }
  .cat-cloud       { background: rgba(124,92,252,0.15); color: #a988ff; }
  .cat-design      { background: rgba(255,150,50,0.12); color: #ffaa5e; }
  .cat-interview   { background: rgba(80,220,220,0.12); color: #56dede; }
  .cat-ai          { background: rgba(200,120,255,0.12); color: #d28aff; }
  .cat-storage     { background: rgba(255,200,80,0.12); color: #ffc850; }
  .cat-resiliency  { background: rgba(255,100,100,0.12); color: #ff8080; }

  /* Floating decorative element */
  .deco {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,143,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    top: -150px; right: -150px;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  @media (max-width: 640px) {
    header, .filter-area, .progress-wrap, main {
      padding-left: 16px;
      padding-right: 16px;
    }
    .stats-bar { display: none; }
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="deco"></div>

<header>
  <div class="logo">⬡ System Design Q&A</div>
  <div class="stats-bar">
    <div class="stat">Total <span id="totalCount">0</span></div>
    <div class="stat">Revealed <span id="revealedCount">0</span></div>
    <div class="stat">Mastered <span id="pct">0%</span></div>
  </div>
</header>

<div class="filter-area" id="filters"></div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0</div>
</div>

<main id="cardGrid"></main>

<script>
const QA = [
  // ── DATABASES ──────────────────────────────────────────
  {cat:"database", q:"What does ACID stand for, and what does each letter mean?",
   a:"Atomicity (entire transaction succeeds or fails completely), Consistency (rules are consistently applied), Isolation (no transaction affected by another in-progress transaction), Durability (committed data persists even if the system crashes)."},
  {cat:"database", q:"What is 'Atomicity' in ACID, and why does it matter?",
   a:"Atomicity means a database transaction either fully completes or fully rolls back — no partial writes. This prevents 'half-baked' data from being committed when part of a complex operation fails."},
  {cat:"database", q:"What does 'Consistency' mean in ACID vs the CAP Theorem?",
   a:"In ACID, consistency means database rules (constraints) are always enforced. In CAP, consistency means you always read the latest write immediately. These are two completely different definitions."},
  {cat:"database", q:"What is 'Isolation' in ACID?",
   a:"Isolation ensures that concurrent transactions don't interfere with each other. While one transaction is writing data, another cannot modify that same data simultaneously, preventing race conditions."},
  {cat:"database", q:"What does 'Durability' mean in ACID, and when would you NOT need it?",
   a:"Durability guarantees that committed data survives system crashes (written to persistent storage). In-memory caches are not durable, but they're still useful for speed — durability isn't always required."},
  {cat:"database", q:"What are the three letters in the CAP Theorem, and what do they represent?",
   a:"C = Consistency (you always read the most recent write), A = Availability (no single point of failure that can go down), P = Partition Tolerance (you can horizontally scale/shard the data)."},
  {cat:"database", q:"What is the core trade-off stated by the CAP Theorem?",
   a:"You can only achieve TWO of the three properties — Consistency, Availability, and Partition Tolerance — at the same time. You must choose which two matter most for your requirements."},
  {cat:"database", q:"Where does MySQL fall on the CAP Theorem, and why?",
   a:"MySQL favors Consistency + Availability, giving up Partition Tolerance. It has strong consistency (single host writes), high availability (few failure points), but it's hard to horizontally partition/shard."},
  {cat:"database", q:"Where does Cassandra fall on the CAP Theorem?",
   a:"Cassandra favors Availability + Partition Tolerance (A+P), giving up Consistency. It uses a ring structure with no single primary, so it scales horizontally and has no single point of failure, but data replication causes eventual consistency."},
  {cat:"database", q:"Where do MongoDB and DynamoDB fall on the CAP Theorem, and why?",
   a:"They favor Consistency + Partition Tolerance (C+P), giving up Availability. They have a single primary node that is a potential point of failure, but elect a new primary automatically within seconds."},
  {cat:"database", q:"What is 'eventual consistency'?",
   a:"In distributed databases, it takes time for data written to one node to propagate to all other nodes. During that window, some reads may return stale data. The system eventually becomes consistent — but not immediately."},
  {cat:"database", q:"What is denormalized data, and what are its trade-offs?",
   a:"Denormalized data duplicates information across rows to enable single-query lookups without joins. Advantage: faster reads, fewer DB hits. Disadvantage: updates are hard (must change every row), wastes storage, risk of data going out of sync."},
  {cat:"database", q:"What is normalized data, and when is it preferable?",
   a:"Normalized data stores each piece of information once and uses references (foreign keys) to relate tables. Advantages: less storage, easy updates in one place. It's the right default starting point — only denormalize when performance demands it."},
  {cat:"database", q:"What is database sharding, and why is it used?",
   a:"Sharding (horizontal partitioning) splits a database across multiple servers (shards), each holding a subset of the data. A router/hash function determines which shard to query. It allows virtually infinite horizontal scaling."},
  {cat:"database", q:"What is the 'celebrity problem' (hotspot problem) in sharded databases?",
   a:"When a hash-based shard stores data for an extremely popular entity (e.g., a celebrity), that shard gets disproportionately high traffic. Modern systems monitor traffic per shard and repartition dynamically to balance load."},
  {cat:"database", q:"What is re-sharding, and why is it challenging?",
   a:"Re-sharding is the process of redistributing data across shards when you add or remove servers. It requires moving data between hosts in a fault-tolerant way while the system is live — a complex and potentially risky operation."},
  {cat:"database", q:"What is the difference between a warm standby and a hot standby database?",
   a:"Warm standby: a secondary DB with replication enabled — data is copied continuously, but it isn't actively serving reads. Hot standby: real-time replication and the backup also handles read traffic; immediate failover with near-zero data loss."},
  {cat:"database", q:"What is a cold standby database?",
   a:"A cold standby relies on periodic backups to a separate server. When the primary fails, you restore the backup to the standby and redirect traffic. It's the cheapest option but has the most downtime and potential data loss."},
  {cat:"database", q:"What is a multi-primary database setup?",
   a:"Multiple database nodes all accept both reads AND writes simultaneously. No reliance on replication to sync writes — the application writes to all primaries directly. When one fails, others continue without interruption."},
  {cat:"database", q:"What is HDFS, and what is it used for?",
   a:"HDFS (Hadoop Distributed File System) is an open-source distributed storage system. It breaks files into blocks, replicates them across multiple servers and racks for fault tolerance, and is typically used for storing massive datasets in big data/analytics workloads."},
  {cat:"database", q:"What is the role of the HDFS Name Node?",
   a:"The Name Node is the master coordinator that tracks which blocks of each file are stored on which data nodes. Clients contact it first to find where data lives, then fetch data directly from the relevant data nodes."},
  {cat:"database", q:"What does 'NoSQL' actually mean in practice?",
   a:"It stands for 'Not Only SQL.' NoSQL databases are designed for horizontal scalability and flexible schemas. Most still support SQL as a query interface but avoid complex joins across shards. Best used with simple key-value lookups."},

  // ── SCALING ──────────────────────────────────────────
  {cat:"scaling", q:"What is the difference between vertical scaling and horizontal scaling?",
   a:"Vertical scaling = bigger machine (more CPU/RAM). Horizontal scaling = more machines with load distributed across them. Vertical scaling has a hard ceiling; horizontal scaling is theoretically infinite but requires stateless design."},
  {cat:"scaling", q:"What is a load balancer, and why is it essential for horizontal scaling?",
   a:"A load balancer distributes incoming requests across a fleet of servers using strategies like round-robin or capacity-aware routing. It enables horizontal scaling and removes single points of failure — if one server dies, others take over."},
  {cat:"scaling", q:"What does 'stateless' mean for web servers, and why does it matter for horizontal scaling?",
   a:"A stateless server doesn't store any user session data locally. Any request from any user can go to any server. This is required for horizontal scaling because the load balancer can route requests to different servers without breaking the experience."},
  {cat:"scaling", q:"What is geo-routing, and why is it used?",
   a:"Geo-routing uses DNS tricks to send users to the server fleet physically closest to them (e.g., North American users → North American data center). It reduces latency and also provides resiliency — if one region fails, traffic can route to another."},
  {cat:"scaling", q:"How do message queues help with scaling?",
   a:"Message queues decouple producers and consumers of data. If downstream consumers (e.g., fraud detection) get backed up, messages sit in the queue rather than being lost. This prevents cascading failures and allows independent scaling of each side."},
  {cat:"scaling", q:"What is the difference between SQS-style queues and pub/sub systems?",
   a:"SQS-style queues have one producer and one consumer. Pub/Sub (publish-subscribe) allows multiple consumers to subscribe and each receive the same message — useful when many downstream services need the same event (e.g., order placed)."},
  {cat:"scaling", q:"What is partition tolerance in the CAP Theorem, and why is it almost always required?",
   a:"Partition tolerance means the system can scale horizontally (add more nodes/shards). For truly massive systems, you MUST be able to add capacity. This is typically non-negotiable, forcing you to choose between consistency or availability as the trade-off."},

  // ── CACHING ──────────────────────────────────────────
  {cat:"caching", q:"What is the primary purpose of a caching layer, and when does it help the most?",
   a:"Caching stores frequently accessed database results in memory so you avoid expensive disk reads. It helps most when reads >> writes, because writes invalidate the cache. A cache that is constantly invalidated provides little benefit."},
  {cat:"caching", q:"What is an LRU cache, and how does it work?",
   a:"Least Recently Used cache evicts the item that hasn't been accessed for the longest time. Implemented with a HashMap (for O(1) lookup) + a doubly linked list (to track recency). Accessing an item moves it to the front; eviction pulls from the tail."},
  {cat:"caching", q:"What is a Least Frequently Used (LFU) cache?",
   a:"LFU tracks how often each key is accessed over time, not just recency. Keys with the lowest access count are evicted first. More predictive than LRU but more complex to implement — better when you have a small cache and clear usage frequency patterns."},
  {cat:"caching", q:"What is FIFO eviction in a cache?",
   a:"FIFO (First In, First Out) evicts the item that was added to the cache earliest, regardless of how often it's been accessed. Simple to implement but often suboptimal — recently added popular items could be evicted before old stale ones."},
  {cat:"caching", q:"What is the cold-start (cold cache) problem?",
   a:"When a cache layer starts up with an empty cache, every request flows through to the database until the cache warms up. At massive scale, this initial burst can crash the database. Solution: pre-warm the cache using replayed logs before exposing it to live traffic."},
  {cat:"caching", q:"What is the 'celebrity problem' in caching (hotspot)?",
   a:"A cache server that stores data for an extremely popular entity (e.g., a famous actor) receives disproportionate traffic. Solution: intelligent load-aware routing rather than naive key hashing, or replicating hot items across multiple cache servers."},
  {cat:"caching", q:"What is the difference between Memcached and Redis?",
   a:"Memcached is simple, fast, and proven — a pure in-memory key-value store. Redis has more features: persistence snapshots, replication, transactions, pub/sub, and advanced data structures. Redis is more popular today but more complex."},
  {cat:"caching", q:"What is ElastiCache, and when would you use it?",
   a:"ElastiCache is AWS's fully managed Redis or Memcached service. You don't manage servers. It's most efficient when your entire stack is on AWS, placing the cache in the same data centers as your application servers for minimal latency."},
  {cat:"caching", q:"What is a CDN (Content Delivery Network), and what does it cache?",
   a:"A CDN is a geographically distributed fleet of edge servers that cache static content (HTML, CSS, JS, images, videos) close to end users. It reduces latency by serving content from a server physically near the user instead of a distant origin server."},
  {cat:"caching", q:"What are the main CDN providers mentioned, and what is a key trade-off of CDNs?",
   a:"AWS CloudFront, Google Cloud CDN, Microsoft Azure CDN, Akamai, Cloudflare. Key trade-off: CDNs are expensive. Network bandwidth and server costs across global edge locations add up fast — especially for large video files. Be selective about what you cache."},
  {cat:"caching", q:"What is cache expiration policy, and why does it matter?",
   a:"Expiration policy determines how long data stays in the cache before being considered stale. Too long: users see outdated data. Too short: cache provides no benefit. The right TTL depends on how frequently the underlying data changes."},

  // ── ALGORITHMS ──────────────────────────────────────────
  {cat:"algorithms", q:"What is Big O notation, and what does O(n) mean?",
   a:"Big O notation describes the worst-case time or space complexity of an algorithm as input size grows. O(n) means the operation scales linearly — if you have n items, you may need to visit all n of them (e.g., linear search in a linked list)."},
  {cat:"algorithms", q:"What is a linked list, and what is its access complexity?",
   a:"A linked list is a dynamic data structure where each node holds a value and a pointer to the next node. Access is O(n) — you must traverse from the head. Insertion at the head is O(1); insertion at the tail is O(n) without a tail pointer."},
  {cat:"algorithms", q:"What is the difference between a singly linked list and a doubly linked list?",
   a:"Singly linked: each node has only a 'next' pointer. Doubly linked: each node has both 'next' and 'previous' pointers. Doubly linked lists allow O(1) insertion at both head AND tail (with pointers to both), and are useful for LRU caches."},
  {cat:"algorithms", q:"What is a binary search tree, and what is its average access complexity?",
   a:"A BST is an ordered tree where left children < parent < right children. Average access is O(log n) — each comparison halves the search space. Worst case is O(n) if the tree degenerates into a linked list (e.g., inserting data in sorted order)."},
  {cat:"algorithms", q:"What is a self-balancing binary search tree, and when is it useful?",
   a:"It automatically rearranges itself during insertions to stay balanced, maintaining O(log n) operations. Useful when you have infrequent inserts but need very fast, large-scale lookups — guarantees the worst-case degeneration to a linked list never occurs."},
  {cat:"algorithms", q:"What is a hash table, why is it important for system design?",
   a:"A hash table uses a hash function to map a key to a bucket, enabling O(1) average lookup, insert, and delete. In distributed systems, the same concept scales to a fleet: hash a key to determine which server stores the data — O(1) routing across thousands of machines."},
  {cat:"algorithms", q:"What is a hash collision, and how is it handled?",
   a:"A hash collision occurs when two keys hash to the same bucket. It can be handled by storing a linked list (or BST for many collisions) within the bucket. Quality of the hash function and number of buckets are critical for performance."},
  {cat:"algorithms", q:"What is Breadth-First Search (BFS) vs Depth-First Search (DFS)?",
   a:"BFS explores all neighbors of a node before going deeper (level-by-level). DFS follows one path all the way to the end before backtracking. For massively deep graphs like the web, BFS is preferred — DFS would follow one path forever."},
  {cat:"algorithms", q:"What is the Big O complexity of graph traversal (BFS or DFS)?",
   a:"O(V + E) — you must visit every Vertex and every Edge to fully traverse a graph. There's no shortcut; since graphs are unordered, you can't binary-search or skip vertices."},
  {cat:"algorithms", q:"What is linear search vs binary search?",
   a:"Linear search: start at the beginning and check each item — O(n). Binary search: requires sorted data, starts in the middle, and halves the search space each step — O(log n). Always sort first if you'll be searching repeatedly."},
  {cat:"algorithms", q:"What are the best sorting algorithms and their complexities?",
   a:"Insertion Sort: O(n) best case, O(n²) worst. Merge Sort: O(n log n) always — best for large datasets. Quicksort: O(n log n) average, O(n²) worst with bad pivot. Bubble Sort: O(n²) — never use this in production."},
  {cat:"algorithms", q:"What is an inverted index, and how does it power search engines?",
   a:"An inverted index maps keywords to a ranked list of document IDs containing that keyword. When a user searches, you look up the keyword → get the ranked list → return results. This is the core data structure behind all search engines."},
  {cat:"algorithms", q:"What is TF-IDF, and what problem does it solve?",
   a:"TF-IDF (Term Frequency × Inverse Document Frequency) measures how important a word is to a specific document compared to the entire corpus. It avoids ranking common words (the, and, a) highly by penalizing words that appear in many documents."},
  {cat:"algorithms", q:"What is PageRank?",
   a:"Google's original ranking algorithm. A page's importance is based on how many other pages link to it (backlinks), weighted by the importance of those linking pages. Inspired by academic citation counts. Modern Google uses deep learning instead."},

  // ── CLOUD ──────────────────────────────────────────
  {cat:"cloud", q:"What is Amazon S3, and what is it primarily used for?",
   a:"S3 (Simple Storage Service) is AWS's object store — a massive, durable place to store any raw data (files, logs, backups, media). It offers 11 nines of durability. Used as the foundation for data lakes and as input for analytics pipelines."},
  {cat:"cloud", q:"What is a Data Lake?",
   a:"A data lake is a massive repository of raw, unstructured data (CSV, JSON, log files) in object storage (like S3). Unlike a database, it doesn't impose schema upfront. You apply structure later with tools like AWS Glue, then query with Athena or Redshift."},
  {cat:"cloud", q:"What is AWS Glue, and what problem does it solve?",
   a:"AWS Glue crawls data in S3, infers a schema, and creates a catalog that allows SQL tools (like Athena) to query raw files as if they were a structured database. It 'imparts structure onto structureless data.'"},
  {cat:"cloud", q:"What is Amazon Athena?",
   a:"Athena is a serverless SQL query engine that runs queries directly against data stored in S3. You pay per query, don't manage servers, and use standard SQL. It works on top of AWS Glue's schema catalog."},
  {cat:"cloud", q:"What is Amazon Kinesis?",
   a:"Kinesis is AWS's managed data streaming service — similar to Kafka. It ingests real-time data streams (e.g., server logs, clickstreams) and routes them to destinations (S3, Redshift, Lambda) for storage or analysis."},
  {cat:"cloud", q:"What is AWS EMR, and what does it enable?",
   a:"EMR (Elastic MapReduce) is a managed cluster service for running Apache Spark, Hadoop, and other big data frameworks. Instead of configuring a cluster yourself, you say 'I want a Spark cluster with N nodes' and AWS provisions it for you."},
  {cat:"cloud", q:"What is Amazon DynamoDB?",
   a:"DynamoDB is AWS's serverless NoSQL key-value database. It scales horizontally with no server management, offers different consistency modes (eventually consistent or strongly consistent), and integrates natively with other AWS services."},
  {cat:"cloud", q:"What is Amazon Redshift?",
   a:"Redshift is AWS's managed data warehouse — a petabyte-scale SQL database optimized for analytics queries. Redshift Spectrum extends it to query raw data in S3 directly, bridging the gap between a data lake and a structured warehouse."},
  {cat:"cloud", q:"What is hybrid cloud, and why might a company use it?",
   a:"Hybrid cloud combines on-premises (private) data centers with public cloud providers. It allows elastic scaling using the cloud while keeping sensitive/regulated data on-premises. A secure bridge connects the two environments."},
  {cat:"cloud", q:"What is multi-cloud, and why might it be used?",
   a:"Multi-cloud means using more than one public cloud provider (e.g., AWS + Azure). It's a risk management strategy — if one provider has an outage or account issues, systems on other providers continue running."},

  // ── DESIGN PATTERNS ──────────────────────────────────────────
  {cat:"design", q:"What does 'working backwards from the customer' mean in system design?",
   a:"Instead of starting with a technology and hoping it meets requirements, you start with the customer experience you need to deliver, then determine what technologies and architecture are required to achieve it. This is Amazon's core design philosophy."},
  {cat:"design", q:"What is the difference between serverless and traditional server architectures?",
   a:"With traditional servers, you provision, configure, and maintain specific machines. Serverless (Lambda, Athena, DynamoDB) abstracts away all server management — you just deploy code or run queries and pay per usage. Serverless scales automatically."},
  {cat:"design", q:"What are SLAs (Service Level Agreements), and what does '3-nines' mean?",
   a:"SLAs define contractual promises about system performance. '3-nines' = 99.9% availability — means up to 8.76 hours of downtime per year. '6-nines' = 99.9999% — only ~30 seconds of downtime per year. Higher nines require more redundancy and cost."},
  {cat:"design", q:"Why is 99% availability often unacceptable?",
   a:"99% availability allows 3.65 days of downtime per year. For customer-facing systems, that is completely unacceptable. Most production systems target at least 3-4 nines (99.9%–99.99%), requiring thoughtful redundancy in every component."},
  {cat:"design", q:"What are 'hot', 'cool', and 'cold' storage tiers?",
   a:"Hot storage: fastest, most expensive, highly available (e.g., standard S3). Cool storage: slightly slower/cheaper, for less frequently accessed data. Cold storage: cheapest (e.g., S3 Glacier), for archival — takes hours or days to retrieve."},
  {cat:"design", q:"What is partitioning data in a data lake, and why does it matter?",
   a:"Organizing data into folder structures based on query patterns (e.g., year/month/day) dramatically speeds up queries by allowing the system to skip irrelevant partitions. Work backwards from how data will be queried to design the partition scheme."},
  {cat:"design", q:"When should you choose simplicity over complexity in a system design?",
   a:"Always prefer the simplest solution that meets requirements. Complex distributed systems are expensive to build and operate. Only add complexity when simpler approaches demonstrably can't scale to the requirements. Simplicity reduces operational burden."},
  {cat:"design", q:"What is a forward index vs an inverted index?",
   a:"Forward index: maps document IDs → list of keywords in that document. Inverted index: maps keywords → ranked list of document IDs. You build the forward index first during document processing, then invert it to create the search index."},

  // ── RESILIENCY ──────────────────────────────────────────
  {cat:"resiliency", q:"What are the levels of failure you need to plan for in large systems?",
   a:"Single server failure, rack failure, entire data center failure, entire region failure. Each requires different redundancy strategies. Servers in a rack can fail together; racks can lose power; data centers can be hit by natural disasters; regions can have network outages."},
  {cat:"resiliency", q:"What does it mean to be 'rack aware' in distributed storage?",
   a:"Rack awareness means the system intelligently distributes data replicas across different physical racks. If all replicas of a data block are in the same rack and the rack loses power, all replicas are lost simultaneously. Cross-rack placement prevents this."},
  {cat:"resiliency", q:"What is over-provisioning, and why is it necessary for resiliency?",
   a:"Over-provisioning means maintaining more server capacity than normal traffic requires. If a region fails and its traffic reroutes to surviving regions, those regions must have enough excess capacity to absorb the load without degrading."},
  {cat:"resiliency", q:"What are availability zones, and how do they help?",
   a:"Availability zones (used by AWS and other providers) are distinct physical locations within a region with independent power, cooling, and networking. Spreading servers across availability zones protects against data center-level failures."},
  {cat:"resiliency", q:"What is a single point of failure (SPOF)?",
   a:"A component whose failure would cause the entire system to fail. Examples: a single database host, a single load balancer, a single config server. In high-availability design, every SPOF must have a backup ready to take over automatically."},
  {cat:"resiliency", q:"How does MongoDB handle primary node failure?",
   a:"MongoDB replica sets keep secondary nodes ready. When the primary fails, the surviving secondaries automatically elect a new primary. This takes only seconds but technically means there's brief downtime — which is why CAP classifies it as giving up Availability."},
  {cat:"resiliency", q:"What is Cassandra's approach to eliminating single points of failure?",
   a:"Cassandra uses a ring architecture where any node can act as the primary entry point. There is no designated master. If any node fails, requests simply route to other nodes. The trade-off is eventual consistency as data propagates through the ring."},

  // ── INTERVIEW SKILLS ──────────────────────────────────────────
  {cat:"interview", q:"What is the single most important thing to do during a system design interview?",
   a:"Think out loud. Don't stay silent while you think. The interviewer wants to see your thought process, not just the final answer. Talking lets them steer you in the right direction and demonstrates how you approach problems collaboratively."},
  {cat:"interview", q:"What should you do first when given a system design question?",
   a:"Repeat the question back, then ask clarifying questions to define requirements: scale (users, traffic, data volume), latency requirements, availability needs, and budget constraints. Don't start designing until you've aligned on what you're actually building."},
  {cat:"interview", q:"What is 'behavioral interviewing', and how do you prepare for it?",
   a:"Behavioral interviewing asks you to tell stories about past experiences rather than hypothetical scenarios ('Tell me about a time when...'). Prepare specific stories demonstrating perseverance, initiative, handling conflict, and learning new technologies independently."},
  {cat:"interview", q:"Why do interviewers value perseverance over technical knowledge?",
   a:"Technology changes rapidly — specific knowledge becomes obsolete. The ability to learn new things independently, solve novel problems, and push through challenges without giving up is rare and far more valuable in the long term."},
  {cat:"interview", q:"What does 'working backwards' look like in a system design interview?",
   a:"Start by asking what customer experience you're delivering and at what scale. Define what the API needs to look like from the client's perspective. Then figure out what infrastructure, databases, and services are needed to power that API — not the reverse."},
  {cat:"interview", q:"How should you handle feedback or challenges from the interviewer?",
   a:"Do NOT get defensive. Acknowledge the concern, incorporate the feedback, and improve your design. Interviewers are evaluating what it's like to work with you every day. Defensiveness is a major red flag."},
  {cat:"interview", q:"What should you do if you don't know something during the interview?",
   a:"Say 'I don't know' honestly — don't fake it. But don't stop there. Ask questions, reason through the problem, show curiosity and willingness to work toward a solution collaboratively. Admitting ignorance + perseverance is what gets people hired."},
  {cat:"interview", q:"What notation should you use for system design diagrams?",
   a:"There's no universal standard. Simple boxes with labeled arrows works fine. What matters is that you explain what each component does. If drawing 'database' as a box, clarify that it represents a horizontally scaled distributed system, not a single host."},
  {cat:"interview", q:"What company values matter in tech interviews (e.g., Amazon)?",
   a:"Companies like Amazon publish their values (e.g., 'Leadership Principles'). Study them. Interviewers evaluate you against these values. Have concrete stories ready that demonstrate each principle (customer obsession, ownership, invent and simplify, etc.)."},
  {cat:"interview", q:"Why should you practice coding at a whiteboard, even before interviews?",
   a:"Writing code while someone watches is very different from coding in your IDE. It's stressful and unfamiliar if you've never done it. Practice with a friend watching you solve problems on a whiteboard to get comfortable before your actual interviews."},

  // ── APACHE SPARK / BIG DATA ──────────────────────────────────────────
  {cat:"storage", q:"What is Apache Spark, and what problems does it solve?",
   a:"Spark is a distributed data processing framework that replaced MapReduce. It's faster (in-memory caching), more flexible (Python, Scala, SQL, ML), and automatically optimizes parallel execution across a cluster using a DAG. Used for batch and streaming analytics."},
  {cat:"storage", q:"What is Spark's main alternative to MapReduce, and why is it better?",
   a:"Spark replaces MapReduce by allowing you to write SQL or high-level Python/Scala code, which it automatically translates into optimized parallel operations. MapReduce required manual low-level map/reduce logic. Spark claims up to 100× faster performance via in-memory processing."},
  {cat:"storage", q:"What is Spark Streaming / Structured Streaming?",
   a:"Spark Streaming processes real-time data as a continuously arriving stream. It integrates with Kafka, Kinesis, and other sources, and continuously applies transformations and writes results to destinations — enabling real-time analytics pipelines."},
  {cat:"storage", q:"What is MLLib in Spark?",
   a:"MLLib is Spark's built-in machine learning library. It includes classification, regression, clustering, and collaborative filtering algorithms that are automatically distributed across a Spark cluster — enabling ML on datasets too large for a single machine."},
  {cat:"storage", q:"What is the driver program and executor in Spark's architecture?",
   a:"The driver program contains your code (what to process and how). It communicates with the cluster manager, which distributes work to executor processes running on individual cluster nodes. Each executor runs tasks on its assigned data partition."},
  {cat:"storage", q:"What is Spark NOT suitable for?",
   a:"OLTP (Online Transaction Processing) — real-time, low-latency, user-facing queries. Spark is a batch/streaming analytics tool, not a database you expose directly to end users. Output from Spark should go into a proper database for user-facing queries."},

  // ── GENERATIVE AI / RAG ──────────────────────────────────────────
  {cat:"ai", q:"What is Retrieval-Augmented Generation (RAG), and what problem does it solve?",
   a:"RAG gives LLMs access to external, up-to-date data at query time by retrieving relevant documents and injecting them into the prompt as context. This reduces hallucinations, reduces token costs (vs. injecting all data), and avoids retraining when data changes."},
  {cat:"ai", q:"What is an embedding vector?",
   a:"An embedding is a high-dimensional vector representation of text that captures semantic meaning. Texts with similar meanings have embeddings that are close to each other in this high-dimensional space — enabling semantic (meaning-based) search rather than keyword matching."},
  {cat:"ai", q:"What is a vector database, and why is it used in RAG systems?",
   a:"A vector database stores text data alongside its embedding vectors, enabling fast semantic search (find the most similar embeddings to a query vector). Examples: Pinecone, Weaviate, Chroma. Most regular databases (Elasticsearch, PostgreSQL, Redis) now also support vector search."},
  {cat:"ai", q:"What is an 'agentic AI' or 'LLM Agent'?",
   a:"An agentic AI is an LLM that can access external tools (APIs, databases, browsers) to answer questions. The LLM decides autonomously which tool to call based on the query, calls it, receives the result, and integrates it into its response."},
  {cat:"ai", q:"What is the Model Context Protocol (MCP)?",
   a:"MCP is a standard developed by Anthropic for connecting tools to AI agents. It defines how to describe a tool's capabilities, inputs, and outputs in a standard way, making it easier to build interoperable AI agent systems."},
  {cat:"ai", q:"What is fine-tuning an LLM?",
   a:"Fine-tuning continues training a base model on your own domain-specific data (prompt + ideal response pairs). It adapts the model's behavior to your use case. More expensive than RAG but embeds knowledge directly into the model weights."},
  {cat:"ai", q:"What does 'context window' mean for LLMs, and how can it be used architecturally?",
   a:"The context window is the maximum amount of text an LLM can process in a single request. You can inject domain data directly into the prompt context (as an alternative to RAG), but this gets expensive since you're billed per token for all that injected text."},
  {cat:"ai", q:"How should AI systems be integrated into larger architectures?",
   a:"The AI subsystem is just one component in a larger system. It should sit behind a load balancer and fleet of application servers. Add a caching layer (responses can be expensive and repeated queries can be cached). Don't expose API credentials directly to end users."},
];

// ── STATE ─────────────────────────────────────────────
let activeFilter = 'all';
let revealed = new Set();

const catLabels = {
  all: 'All Topics',
  database: 'Databases & CAP',
  scaling: 'Scaling',
  caching: 'Caching & CDN',
  algorithms: 'Algorithms & DS',
  cloud: 'Cloud Services',
  design: 'Design Patterns',
  resiliency: 'Resiliency',
  interview: 'Interview Skills',
  storage: 'Big Data / Spark',
  ai: 'Generative AI'
};

// ── RENDER ─────────────────────────────────────────────
function getFiltered() {
  return activeFilter === 'all' ? QA : QA.filter(q => q.cat === activeFilter);
}

function updateStats() {
  const filtered = getFiltered();
  const revealedCount = filtered.filter((_,i) => revealed.has(activeFilter + ':' + i)).length;
  document.getElementById('totalCount').textContent = QA.length;
  document.getElementById('revealedCount').textContent = [...revealed].length;
  const pct = filtered.length ? Math.round(revealedCount / filtered.length * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = revealedCount + ' / ' + filtered.length + ' revealed';
}

function renderFilters() {
  const cats = ['all', ...new Set(QA.map(q => q.cat))];
  const container = document.getElementById('filters');
  container.innerHTML = cats.map(c => {
    const count = c === 'all' ? QA.length : QA.filter(q => q.cat === c).length;
    return `<button class="filter-btn ${activeFilter === c ? 'active' : ''}" data-cat="${c}">
      ${catLabels[c] || c} <span style="opacity:.6;font-size:10px">${count}</span>
    </button>`;
  }).join('');
  container.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      activeFilter = btn.dataset.cat;
      renderFilters();
      renderCards();
      updateStats();
    };
  });
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('cardGrid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No questions in this category.</div>';
    return;
  }

  grid.innerHTML = filtered.map((item, i) => {
    const key = activeFilter + ':' + i;
    const isRevealed = revealed.has(key);
    return `<div class="card ${isRevealed ? 'revealed' : ''}" data-key="${key}">
      <div class="card-header">
        <div class="q-badge">Q${(i+1).toString().padStart(2,'0')}</div>
        <span class="category-tag cat-${item.cat}">${catLabels[item.cat] || item.cat}</span>
        <div class="card-question">${item.q}</div>
      </div>
      <div class="reveal-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Click to reveal answer
      </div>
      <div class="reveal-area">
        <div class="card-answer"><strong>Answer</strong>${item.a}</div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.onclick = () => {
      const key = card.dataset.key;
      if (revealed.has(key)) {
        revealed.delete(key);
        card.classList.remove('revealed');
      } else {
        revealed.add(key);
        card.classList.add('revealed');
      }
      updateStats();
    };
  });
}

// ── INIT ───────────────────────────────────────────────
renderFilters();
renderCards();
updateStats();
</script>
