<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 75 — Solutions بالعربي 💻</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06090f;--surface:#0c1220;--card:#111827;--border:#1e2d45;
  --t1:#e2eeff;--t2:#7a9cc5;--muted:#3d5a7a;
  --green:#00e5a0;--yellow:#ffd166;--orange:#ff9f43;--red:#ff6b6b;--blue:#60b4ff;--purple:#c084fc;--cyan:#22d3ee;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;direction:rtl}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(96,180,255,.07), transparent),
    radial-gradient(ellipse 60% 40% at 90% 90%, rgba(0,229,160,.05), transparent);
  pointer-events:none;z-index:0;
}

.wrap{max-width:1100px;margin:0 auto;padding:20px;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;padding:50px 20px 30px}
.header h1{
  font-size:clamp(2rem,6vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,var(--blue),var(--cyan),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.header p{color:var(--t2);font-size:1rem;margin-bottom:30px}

/* SEARCH */
.top-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search{
  flex:1;min-width:200px;background:var(--surface);border:2px solid var(--border);
  border-radius:12px;padding:12px 18px;color:var(--t1);font-family:'Cairo',sans-serif;
  font-size:.95rem;outline:none;direction:rtl;transition:border-color .2s;
}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--muted)}
.fbtn{
  background:var(--surface);border:2px solid var(--border);border-radius:10px;
  padding:10px 16px;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.85rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.fbtn:hover,.fbtn.on{border-color:var(--blue);color:var(--blue);background:rgba(96,180,255,.08)}

/* CATEGORY NAV */
.cat-nav{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:30px;
  padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;
}
.cbtn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.8rem;
  cursor:pointer;transition:all .2s;
}
.cbtn:hover,.cbtn.on{background:var(--blue);color:#000;border-color:var(--blue);font-weight:700}

/* PROGRESS */
.prog-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.bar-track{flex:1;min-width:150px;background:var(--border);border-radius:50px;height:10px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:50px;transition:width .5s}
.prog-label{font-size:.85rem;color:var(--t2);white-space:nowrap}
.prog-label strong{color:var(--yellow)}

/* CATEGORY GROUP */
.cat-group{margin-bottom:40px}
.cat-title{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  font-size:1.1rem;font-weight:700;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.cat-cnt{font-size:.75rem;background:var(--border);padding:2px 10px;border-radius:20px;color:var(--muted);font-weight:400}

/* SOLUTION CARD */
.sol-card{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:10px;transition:border-color .25s;cursor:pointer;
}
.sol-card:hover{border-color:#253550}
.sol-card.open{border-color:var(--blue)}

.sol-head{display:flex;align-items:center;gap:12px;padding:14px 18px}
.sol-num{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:.8rem;background:rgba(96,180,255,.12);color:var(--blue);
}
.sol-titles{flex:1}
.sol-en{font-weight:700;font-size:.95rem}
.sol-ar{font-size:.8rem;color:var(--t2);margin-top:2px}
.diff{padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:700;flex-shrink:0}
.easy{background:rgba(0,229,160,.12);color:var(--green)}
.medium{background:rgba(255,209,102,.12);color:var(--yellow)}
.hard{background:rgba(255,107,107,.12);color:var(--red)}
.chev{color:var(--muted);transition:transform .3s;flex-shrink:0;font-size:1.1rem}
.sol-card.open .chev{transform:rotate(90deg)}

/* BODY */
.sol-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.sol-card.open .sol-body{max-height:3000px}

.sol-content{padding:0 18px 20px;border-top:1px solid var(--border)}

.tabs{display:flex;gap:4px;padding:14px 0 10px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
.tab{
  padding:6px 16px;border-radius:8px;border:1px solid transparent;
  background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.82rem;
  cursor:pointer;transition:all .2s;
}
.tab:hover,.tab.on{background:rgba(96,180,255,.1);color:var(--blue);border-color:rgba(96,180,255,.3)}

.tab-panel{display:none}
.tab-panel.on{display:block}

/* IDEA PANEL */
.idea-panel{
  background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);
  border-radius:12px;padding:18px;margin-bottom:12px;
}
.idea-panel p{font-size:.95rem;line-height:2;color:var(--t1)}
.idea-panel .ex{
  background:#080d18;border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-top:12px;font-family:'Fira Code',monospace;
  font-size:.8rem;color:var(--cyan);direction:ltr;text-align:left;white-space:pre;overflow-x:auto;
}

/* CODE PANEL */
.code-wrap{background:#050910;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.code-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);
}
.dots2{display:flex;gap:5px}
.dot2{width:9px;height:9px;border-radius:50%}
.lang-tag{font-size:.75rem;color:var(--muted);font-family:'Fira Code',monospace}
.copy-btn{
  background:rgba(96,180,255,.1);border:1px solid rgba(96,180,255,.2);
  color:var(--blue);border-radius:6px;padding:3px 10px;font-family:'Cairo',sans-serif;
  font-size:.72rem;cursor:pointer;transition:all .2s;
}
.copy-btn:hover{background:rgba(96,180,255,.2)}
pre.code{
  padding:18px;overflow-x:auto;font-family:'Fira Code',monospace;
  font-size:.82rem;line-height:2;direction:ltr;text-align:left;margin:0;
}

/* syntax colors */
.kw{color:#bb9af7}.fn{color:#7dcfff}.str{color:#9ece6a}.num{color:#ff9e64}
.cm{color:#4a6580;font-style:italic}.vr{color:#e0af68}.op{color:#89ddff}
.cm2{color:#3d5a7a;font-style:italic} /* subtle inline */

/* COMPLEXITY */
.cx-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0 0}
.cx{padding:5px 14px;border-radius:7px;font-size:.75rem;font-weight:700;font-family:'Fira Code',monospace}
.cx-t{background:rgba(255,209,102,.1);color:var(--yellow);border:1px solid rgba(255,209,102,.25)}
.cx-s{background:rgba(96,180,255,.1);color:var(--blue);border:1px solid rgba(96,180,255,.25)}

/* SOLVED BTN */
.mark-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.25);
  color:var(--green);border-radius:8px;padding:7px 14px;
  font-family:'Cairo',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;margin-top:12px;
}
.mark-btn:hover{background:rgba(0,229,160,.16)}
.mark-btn.done{background:rgba(0,229,160,.2);font-weight:700}

.no-res{text-align:center;padding:50px;color:var(--muted);font-size:1.1rem}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <h1>💻 Solutions بالعربي</h1>
  <p>كل سؤال من الـ 75 مع الحل JavaScript وشرح كل سطر بالعربي</p>
</div>

<div class="prog-bar">
  <span class="prog-label">تقدمك:</span>
  <div class="bar-track"><div class="bar-fill" id="pFill" style="width:0%"></div></div>
  <span class="prog-label">حليت <strong id="pCount">0</strong> / 75</span>
</div>

<div class="top-bar">
  <input class="search" id="srch" type="text" placeholder="🔍 ابحث عن أي سؤال..." oninput="render()">
  <button class="fbtn on" onclick="setDiff('all',this)">الكل</button>
  <button class="fbtn" onclick="setDiff('easy',this)">سهل</button>
  <button class="fbtn" onclick="setDiff('medium',this)">متوسط</button>
  <button class="fbtn" onclick="setDiff('hard',this)">صعب</button>
</div>

<div class="cat-nav" id="catNav"></div>
<div id="main"></div>
</div>

<script>
const solved = new Set();
let curDiff = 'all';
let curCat = 'all';

const QS = [
// ═══════════ ARRAYS & HASHING ═══════════
{id:1,cat:'arrays',catN:'📦 Arrays & Hashing',diff:'easy',
en:'Two Sum',ar:'إيجاد إتنين أرقام مجموعهم = الهدف',
idea:'تخيل عندك أسعار حاجات في السوبرماركت وعايز إتنين حاجات مجموعهم 100 جنيه. بدل ما تجرب كل الاحتمالات، بتحفظ كل رقم في HashMap وبتسأل "محتاج كام؟" — لو اللي محتاجه موجود، لقيناهم!',
ex:'nums=[2,7,11,15], target=9\nشفنا 2 → محتاجين 7\nشفنا 7 → 7 موجود في الـ map!\nالجواب: [0,1] ✅',
code:`<span class="kw">function</span> <span class="fn">twoSum</span>(<span class="vr">nums</span>, <span class="vr">target</span>) {
  <span class="cm">// الـ map بيحفظ: الرقم → index بتاعه</span>
  <span class="kw">const</span> <span class="vr">map</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Map</span>();

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">nums</span>.<span class="vr">length</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="cm">// الرقم اللي محتاجه عشان يكمل الـ target</span>
    <span class="kw">const</span> <span class="vr">need</span> <span class="op">=</span> <span class="vr">target</span> <span class="op">-</span> <span class="vr">nums</span>[<span class="vr">i</span>];

    <span class="cm">// لو الرقم المطلوب موجود في الـ map → لقيناهم!</span>
    <span class="kw">if</span> (<span class="vr">map</span>.<span class="fn">has</span>(<span class="vr">need</span>)) {
      <span class="kw">return</span> [<span class="vr">map</span>.<span class="fn">get</span>(<span class="vr">need</span>), <span class="vr">i</span>];
    }

    <span class="cm">// احفظ الرقم الحالي وموقعه</span>
    <span class="vr">map</span>.<span class="fn">set</span>(<span class="vr">nums</span>[<span class="vr">i</span>], <span class="vr">i</span>);
  }

  <span class="kw">return</span> []; <span class="cm">// ما لقيناش</span>
}`,time:'O(n)',space:'O(n)'},

{id:2,cat:'arrays',catN:'📦 Arrays & Hashing',diff:'medium',
en:'Group Anagrams',ar:'تجميع الكلمات اللي حروفها متشابهة',
idea:'تخيل كلمات: cat, tac, act — نفس الحروف بترتيب مختلف. بنرتب حروف كل كلمة أبجدياً ونستخدمها كـ key في HashMap. الكلمات اللي ليها نفس الـ key بتتحط في نفس المجموعة.',
ex:'["eat","tea","tan","ate","nat","bat"]\neat,tea,ate → key:"aet"\ntan,nat → key:"ant"\nbat → key:"abt"\nالجواب: [["eat","tea","ate"],["tan","nat"],["bat"]] ✅',
code:`<span class="kw">function</span> <span class="fn">groupAnagrams</span>(<span class="vr">strs</span>) {
  <span class="cm">// map: الـ sorted key → قائمة الكلمات</span>
  <span class="kw">const</span> <span class="vr">map</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Map</span>();

  <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">str</span> <span class="kw">of</span> <span class="vr">strs</span>) {
    <span class="cm">// رتب الحروف أبجدياً → ده الـ key</span>
    <span class="cm">// مثلاً "eat" → ["a","e","t"] → "aet"</span>
    <span class="kw">const</span> <span class="vr">key</span> <span class="op">=</span> <span class="vr">str</span>.<span class="fn">split</span>(<span class="str">''</span>).<span class="fn">sort</span>().<span class="fn">join</span>(<span class="str">''</span>);

    <span class="cm">// لو الـ key مش موجود، أضيف array فاضي</span>
    <span class="kw">if</span> (<span class="op">!</span><span class="vr">map</span>.<span class="fn">has</span>(<span class="vr">key</span>)) <span class="vr">map</span>.<span class="fn">set</span>(<span class="vr">key</span>, []);

    <span class="cm">// أضيف الكلمة لمجموعتها</span>
    <span class="vr">map</span>.<span class="fn">get</span>(<span class="vr">key</span>).<span class="fn">push</span>(<span class="vr">str</span>);
  }

  <span class="cm">// ارجع كل القيم (المجموعات)</span>
  <span class="kw">return</span> [...<span class="vr">map</span>.<span class="fn">values</span>()];
}`,time:'O(n × k log k)',space:'O(n)'},

{id:3,cat:'arrays',catN:'📦 Arrays & Hashing',diff:'medium',
en:'Top K Frequent Elements',ar:'الأرقام الأكتر تكراراً',
idea:'تخيل انتخابات وعايز تعرف أكتر K مرشحين أصواتاً. بتعد التكرار في HashMap، بعدين بتاخد أعلى K.',
ex:'nums=[1,1,1,2,2,3], k=2\nتكرار: {1:3, 2:2, 3:1}\nأعلى 2: [1,2] ✅',
code:`<span class="kw">function</span> <span class="fn">topKFrequent</span>(<span class="vr">nums</span>, <span class="vr">k</span>) {
  <span class="cm">// عد تكرار كل رقم</span>
  <span class="kw">const</span> <span class="vr">freq</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Map</span>();
  <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">n</span> <span class="kw">of</span> <span class="vr">nums</span>) {
    <span class="vr">freq</span>.<span class="fn">set</span>(<span class="vr">n</span>, (<span class="vr">freq</span>.<span class="fn">get</span>(<span class="vr">n</span>) <span class="op">||</span> <span class="num">0</span>) <span class="op">+</span> <span class="num">1</span>);
  }

  <span class="cm">// Bucket Sort: buckets[i] = الأرقام اللي تكررت i مرة</span>
  <span class="kw">const</span> <span class="vr">buckets</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">nums</span>.<span class="vr">length</span> <span class="op">+</span> <span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(() <span class="op">=&gt;</span> []);
  <span class="kw">for</span> (<span class="kw">const</span> [<span class="vr">num</span>, <span class="vr">count</span>] <span class="kw">of</span> <span class="vr">freq</span>) {
    <span class="vr">buckets</span>[<span class="vr">count</span>].<span class="fn">push</span>(<span class="vr">num</span>);
  }

  <span class="cm">// خد أعلى k من الـ buckets من اليمين</span>
  <span class="kw">const</span> <span class="vr">res</span> <span class="op">=</span> [];
  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="vr">buckets</span>.<span class="vr">length</span> <span class="op">-</span> <span class="num">1</span>; <span class="vr">i</span> <span class="op">&gt;=</span> <span class="num">0</span> <span class="op">&amp;&amp;</span> <span class="vr">res</span>.<span class="vr">length</span> <span class="op">&lt;</span> <span class="vr">k</span>; <span class="vr">i</span><span class="op">--</span>) {
    <span class="vr">res</span>.<span class="fn">push</span>(...<span class="vr">buckets</span>[<span class="vr">i</span>]);
  }
  <span class="kw">return</span> <span class="vr">res</span>.<span class="fn">slice</span>(<span class="num">0</span>, <span class="vr">k</span>);
}`,time:'O(n)',space:'O(n)'},

{id:4,cat:'arrays',catN:'📦 Arrays & Hashing',diff:'medium',
en:'Product of Array Except Self',ar:'ضرب كل العناصر إلا النفسه',
idea:'كل عنصر = ضرب كل اللي شماله × ضرب كل اللي يمينه. بتحسب Prefix Product وبعدين Suffix Product — من غير قسمة!',
ex:'nums=[1,2,3,4]\nPrefix: [1,1,2,6]\nSuffix: [24,12,4,1]\nالناتج: [24,12,8,6] ✅',
code:`<span class="kw">function</span> <span class="fn">productExceptSelf</span>(<span class="vr">nums</span>) {
  <span class="kw">const</span> <span class="vr">n</span> <span class="op">=</span> <span class="vr">nums</span>.<span class="vr">length</span>;
  <span class="kw">const</span> <span class="vr">res</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>).<span class="fn">fill</span>(<span class="num">1</span>);

  <span class="cm">// الـ pass الأول: لكل عنصر، احسب ضرب كل اللي شماله</span>
  <span class="kw">let</span> <span class="vr">prefix</span> <span class="op">=</span> <span class="num">1</span>;
  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">n</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="vr">res</span>[<span class="vr">i</span>] <span class="op">=</span> <span class="vr">prefix</span>;   <span class="cm">// ضرب كل اللي قبله</span>
    <span class="vr">prefix</span> <span class="op">*=</span> <span class="vr">nums</span>[<span class="vr">i</span>]; <span class="cm">// أضيف الحالي للـ prefix</span>
  }

  <span class="cm">// الـ pass التاني: اضرب في ضرب كل اللي يمينه</span>
  <span class="kw">let</span> <span class="vr">suffix</span> <span class="op">=</span> <span class="num">1</span>;
  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="vr">n</span> <span class="op">-</span> <span class="num">1</span>; <span class="vr">i</span> <span class="op">&gt;=</span> <span class="num">0</span>; <span class="vr">i</span><span class="op">--</span>) {
    <span class="vr">res</span>[<span class="vr">i</span>] <span class="op">*=</span> <span class="vr">suffix</span>;  <span class="cm">// اضرب في ضرب كل اللي بعده</span>
    <span class="vr">suffix</span> <span class="op">*=</span> <span class="vr">nums</span>[<span class="vr">i</span>]; <span class="cm">// أضيف الحالي للـ suffix</span>
  }

  <span class="kw">return</span> <span class="vr">res</span>;
}`,time:'O(n)',space:'O(1) extra'},

// ═══════════ TWO POINTERS ═══════════
{id:5,cat:'twoptr',catN:'👆 Two Pointers',diff:'easy',
en:'Valid Palindrome',ar:'هل الكلمة تقرأ نفسها من الاتجاهين؟',
idea:'إصبع من الأول وإصبع من الآخر. بتتحركوا للوسط وبتقارنوا كل حرفين. لو أي حرفين مختلفين — مش palindrome.',
ex:'"A man a plan a canal Panama"\nبعد إزالة المسافات والأرقام: "amanaplanacanalpanama"\nتقرأ نفسها ✅',
code:`<span class="kw">function</span> <span class="fn">isPalindrome</span>(<span class="vr">s</span>) {
  <span class="cm">// شيل كل حاجة غير حروف وأرقام، وحوّل لـ lowercase</span>
  <span class="vr">s</span> <span class="op">=</span> <span class="vr">s</span>.<span class="fn">toLowerCase</span>().<span class="fn">replace</span>(<span class="str">/[^a-z0-9]/g</span>, <span class="str">''</span>);

  <span class="kw">let</span> <span class="vr">l</span> <span class="op">=</span> <span class="num">0</span>;               <span class="cm">// إصبع من البداية</span>
  <span class="kw">let</span> <span class="vr">r</span> <span class="op">=</span> <span class="vr">s</span>.<span class="vr">length</span> <span class="op">-</span> <span class="num">1</span>;  <span class="cm">// إصبع من الآخر</span>

  <span class="kw">while</span> (<span class="vr">l</span> <span class="op">&lt;</span> <span class="vr">r</span>) {
    <span class="cm">// لو الحرفين مختلفين → مش palindrome</span>
    <span class="kw">if</span> (<span class="vr">s</span>[<span class="vr">l</span>] <span class="op">!==</span> <span class="vr">s</span>[<span class="vr">r</span>]) <span class="kw">return</span> <span class="kw">false</span>;
    <span class="vr">l</span><span class="op">++</span>; <span class="cm">// حرّك الأيسر للداخل</span>
    <span class="vr">r</span><span class="op">--</span>; <span class="cm">// حرّك الأيمن للداخل</span>
  }

  <span class="kw">return</span> <span class="kw">true</span>; <span class="cm">// كل الأزواج متطابقين</span>
}`,time:'O(n)',space:'O(1)'},

{id:6,cat:'twoptr',catN:'👆 Two Pointers',diff:'medium',
en:'3Sum',ar:'إيجاد 3 أرقام مجموعها صفر',
idea:'بترتب الأرقام. لكل رقم بتثبته وبتستخدم Two Pointers على الباقي. لو المجموع أكبر من 0 حرّك اليمين للشمال، لو أصغر حرّك الشمال لليمين.',
ex:'[-1,0,1,2,-1,-4] → بعد الترتيب: [-4,-1,-1,0,1,2]\nثبّت -1 → Two Pointers على الباقي\nالجواب: [[-1,-1,2],[-1,0,1]] ✅',
code:`<span class="kw">function</span> <span class="fn">threeSum</span>(<span class="vr">nums</span>) {
  <span class="vr">nums</span>.<span class="fn">sort</span>((<span class="vr">a</span>,<span class="vr">b</span>) <span class="op">=&gt;</span> <span class="vr">a</span> <span class="op">-</span> <span class="vr">b</span>); <span class="cm">// الترتيب شرط أساسي</span>
  <span class="kw">const</span> <span class="vr">res</span> <span class="op">=</span> [];

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">nums</span>.<span class="vr">length</span> <span class="op">-</span> <span class="num">2</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="cm">// تخطى التكرار للرقم الأول</span>
    <span class="kw">if</span> (<span class="vr">i</span> <span class="op">&gt;</span> <span class="num">0</span> <span class="op">&amp;&amp;</span> <span class="vr">nums</span>[<span class="vr">i</span>] <span class="op">===</span> <span class="vr">nums</span>[<span class="vr">i</span><span class="op">-</span><span class="num">1</span>]) <span class="kw">continue</span>;

    <span class="kw">let</span> <span class="vr">l</span> <span class="op">=</span> <span class="vr">i</span> <span class="op">+</span> <span class="num">1</span>;                    <span class="cm">// إصبع يسار</span>
    <span class="kw">let</span> <span class="vr">r</span> <span class="op">=</span> <span class="vr">nums</span>.<span class="vr">length</span> <span class="op">-</span> <span class="num">1</span>;         <span class="cm">// إصبع يمين</span>

    <span class="kw">while</span> (<span class="vr">l</span> <span class="op">&lt;</span> <span class="vr">r</span>) {
      <span class="kw">const</span> <span class="vr">sum</span> <span class="op">=</span> <span class="vr">nums</span>[<span class="vr">i</span>] <span class="op">+</span> <span class="vr">nums</span>[<span class="vr">l</span>] <span class="op">+</span> <span class="vr">nums</span>[<span class="vr">r</span>];
      <span class="kw">if</span> (<span class="vr">sum</span> <span class="op">===</span> <span class="num">0</span>) {
        <span class="vr">res</span>.<span class="fn">push</span>([<span class="vr">nums</span>[<span class="vr">i</span>], <span class="vr">nums</span>[<span class="vr">l</span>], <span class="vr">nums</span>[<span class="vr">r</span>]]);
        <span class="cm">// تخطى التكرار</span>
        <span class="kw">while</span> (<span class="vr">l</span> <span class="op">&lt;</span> <span class="vr">r</span> <span class="op">&amp;&amp;</span> <span class="vr">nums</span>[<span class="vr">l</span>] <span class="op">===</span> <span class="vr">nums</span>[<span class="vr">l</span><span class="op">+</span><span class="num">1</span>]) <span class="vr">l</span><span class="op">++</span>;
        <span class="kw">while</span> (<span class="vr">l</span> <span class="op">&lt;</span> <span class="vr">r</span> <span class="op">&amp;&amp;</span> <span class="vr">nums</span>[<span class="vr">r</span>] <span class="op">===</span> <span class="vr">nums</span>[<span class="vr">r</span><span class="op">-</span><span class="num">1</span>]) <span class="vr">r</span><span class="op">--</span>;
        <span class="vr">l</span><span class="op">++</span>; <span class="vr">r</span><span class="op">--</span>;
      } <span class="kw">else if</span> (<span class="vr">sum</span> <span class="op">&lt;</span> <span class="num">0</span>) {
        <span class="vr">l</span><span class="op">++</span>; <span class="cm">// محتاج أكبر</span>
      } <span class="kw">else</span> {
        <span class="vr">r</span><span class="op">--</span>; <span class="cm">// محتاج أصغر</span>
      }
    }
  }
  <span class="kw">return</span> <span class="vr">res</span>;
}`,time:'O(n²)',space:'O(1)'},

// ═══════════ SLIDING WINDOW ═══════════
{id:7,cat:'sliding',catN:'🪟 Sliding Window',diff:'easy',
en:'Best Time to Buy & Sell Stock',ar:'أفضل وقت لشراء وبيع سهم',
idea:'بنفضل نتذكر أرخص سعر شفناه، وبنحسب الربح لو بعنا النهارده. بنأخد أعلى ربح.',
ex:'[7,1,5,3,6,4]\nأرخص سعر: 1 (يوم 2)\nأعلى ربح: 6-1=5 (بيع يوم 5) ✅',
code:`<span class="kw">function</span> <span class="fn">maxProfit</span>(<span class="vr">prices</span>) {
  <span class="kw">let</span> <span class="vr">minPrice</span> <span class="op">=</span> <span class="kw">Infinity</span>; <span class="cm">// أرخص سعر شفناه</span>
  <span class="kw">let</span> <span class="vr">maxProfit</span> <span class="op">=</span> <span class="num">0</span>;        <span class="cm">// أعلى ربح</span>

  <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">p</span> <span class="kw">of</span> <span class="vr">prices</span>) {
    <span class="kw">if</span> (<span class="vr">p</span> <span class="op">&lt;</span> <span class="vr">minPrice</span>) {
      <span class="vr">minPrice</span> <span class="op">=</span> <span class="vr">p</span>; <span class="cm">// لقينا سعر أرخص → اشتري هنا</span>
    } <span class="kw">else</span> {
      <span class="cm">// لو بعنا النهارده كام هيبقى الربح؟</span>
      <span class="vr">maxProfit</span> <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">maxProfit</span>, <span class="vr">p</span> <span class="op">-</span> <span class="vr">minPrice</span>);
    }
  }
  <span class="kw">return</span> <span class="vr">maxProfit</span>;
}`,time:'O(n)',space:'O(1)'},

{id:8,cat:'sliding',catN:'🪟 Sliding Window',diff:'medium',
en:'Longest Substring Without Repeating Characters',ar:'أطول substring من غير تكرار',
idea:'نافذة بـ left وright. بنوسع يمين، لو حرف موجود بالفعل بنضيّق شمال لحد ما يختفي.',
ex:'"abcabcbb"\n[a] → [ab] → [abc] → a تكرر! → [bca] → أطول=3 ✅',
code:`<span class="kw">function</span> <span class="fn">lengthOfLongestSubstring</span>(<span class="vr">s</span>) {
  <span class="kw">const</span> <span class="vr">seen</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Set</span>(); <span class="cm">// الحروف في النافذة الحالية</span>
  <span class="kw">let</span> <span class="vr">left</span> <span class="op">=</span> <span class="num">0</span>, <span class="vr">max</span> <span class="op">=</span> <span class="num">0</span>;

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">right</span> <span class="op">=</span> <span class="num">0</span>; <span class="vr">right</span> <span class="op">&lt;</span> <span class="vr">s</span>.<span class="vr">length</span>; <span class="vr">right</span><span class="op">++</span>) {
    <span class="cm">// لو الحرف موجود → ضيّق من الشمال</span>
    <span class="kw">while</span> (<span class="vr">seen</span>.<span class="fn">has</span>(<span class="vr">s</span>[<span class="vr">right</span>])) {
      <span class="vr">seen</span>.<span class="fn">delete</span>(<span class="vr">s</span>[<span class="vr">left</span>]);
      <span class="vr">left</span><span class="op">++</span>;
    }
    <span class="vr">seen</span>.<span class="fn">add</span>(<span class="vr">s</span>[<span class="vr">right</span>]); <span class="cm">// أضيف الحرف الجديد</span>
    <span class="vr">max</span> <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">max</span>, <span class="vr">right</span> <span class="op">-</span> <span class="vr">left</span> <span class="op">+</span> <span class="num">1</span>); <span class="cm">// حجم النافذة</span>
  }
  <span class="kw">return</span> <span class="vr">max</span>;
}`,time:'O(n)',space:'O(min(n,26))'},

// ═══════════ STACK ═══════════
{id:9,cat:'stack',catN:'📚 Stack',diff:'easy',
en:'Valid Parentheses',ar:'الأقواس الصحيحة',
idea:'كل قوس مفتوح بيتحط في الكومة. لما بنشوف قوس مغلق، لازم يطابق آخر حاجة في الكومة.',
ex:'"({[]})"\n( → push\n{ → push\n[ → push\n] → pop [ ✅\n} → pop { ✅\n) → pop ( ✅\nكومة فاضية → صح ✅',
code:`<span class="kw">function</span> <span class="fn">isValid</span>(<span class="vr">s</span>) {
  <span class="kw">const</span> <span class="vr">stack</span> <span class="op">=</span> [];
  <span class="cm">// كل قوس مغلق → شريكه المفتوح</span>
  <span class="kw">const</span> <span class="vr">pairs</span> <span class="op">=</span> { <span class="str">')'</span>:<span class="str">'('</span>, <span class="str">'}'</span>:<span class="str">'{'</span>, <span class="str">']'</span>:<span class="str">'['</span> };

  <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">s</span>) {
    <span class="kw">if</span> (<span class="str">'([{'</span>.<span class="fn">includes</span>(<span class="vr">c</span>)) {
      <span class="vr">stack</span>.<span class="fn">push</span>(<span class="vr">c</span>); <span class="cm">// قوس مفتوح → حطه في الكومة</span>
    } <span class="kw">else</span> {
      <span class="cm">// قوس مغلق → قارن مع رأس الكومة</span>
      <span class="kw">if</span> (<span class="vr">stack</span>.<span class="fn">pop</span>() <span class="op">!==</span> <span class="vr">pairs</span>[<span class="vr">c</span>]) <span class="kw">return</span> <span class="kw">false</span>;
    }
  }
  <span class="kw">return</span> <span class="vr">stack</span>.<span class="vr">length</span> <span class="op">===</span> <span class="num">0</span>; <span class="cm">// الكومة لازم فاضية</span>
}`,time:'O(n)',space:'O(n)'},

// ═══════════ BINARY SEARCH ═══════════
{id:10,cat:'bsearch',catN:'🔍 Binary Search',diff:'easy',
en:'Binary Search',ar:'البحث الثنائي',
idea:'قاموس مرتب. بتفتحه من النص. لو الرقم أصغر — النص الأيسر. لو أكبر — النص الأيمن.',
ex:'[1,3,5,7,9], target=7\nmid=5: 5<7 → اليمين\nmid=7: لقيناه! → index=3 ✅',
code:`<span class="kw">function</span> <span class="fn">search</span>(<span class="vr">nums</span>, <span class="vr">target</span>) {
  <span class="kw">let</span> <span class="vr">l</span> <span class="op">=</span> <span class="num">0</span>, <span class="vr">r</span> <span class="op">=</span> <span class="vr">nums</span>.<span class="vr">length</span> <span class="op">-</span> <span class="num">1</span>;

  <span class="kw">while</span> (<span class="vr">l</span> <span class="op">&lt;=</span> <span class="vr">r</span>) {
    <span class="cm">// النص — بنحسبه كده عشان ما يحصلش overflow</span>
    <span class="kw">const</span> <span class="vr">mid</span> <span class="op">=</span> <span class="fn">Math.floor</span>((<span class="vr">l</span> <span class="op">+</span> <span class="vr">r</span>) <span class="op">/</span> <span class="num">2</span>);

    <span class="kw">if</span>      (<span class="vr">nums</span>[<span class="vr">mid</span>] <span class="op">===</span> <span class="vr">target</span>) <span class="kw">return</span> <span class="vr">mid</span>; <span class="cm">// لقيناه!</span>
    <span class="kw">else if</span> (<span class="vr">nums</span>[<span class="vr">mid</span>] <span class="op">&lt;</span> <span class="vr">target</span>)  <span class="vr">l</span> <span class="op">=</span> <span class="vr">mid</span> <span class="op">+</span> <span class="num">1</span>; <span class="cm">// الـ target في اليمين</span>
    <span class="kw">else</span>                            <span class="vr">r</span> <span class="op">=</span> <span class="vr">mid</span> <span class="op">-</span> <span class="num">1</span>; <span class="cm">// الـ target في الشمال</span>
  }
  <span class="kw">return</span> <span class="op">-</span><span class="num">1</span>; <span class="cm">// ما لقيناهوش</span>
}`,time:'O(log n)',space:'O(1)'},

// ═══════════ LINKED LIST ═══════════
{id:11,cat:'linked',catN:'🔗 Linked List',diff:'easy',
en:'Reverse Linked List',ar:'عكس القائمة المرتبطة',
idea:'تخيل قطار. كل عربية بتشيل ربطها من الأمام وتربطها للخلف. بنمشي واحدة واحدة.',
ex:'1→2→3→4→5\nبعد العكس: 5→4→3→2→1 ✅',
code:`<span class="kw">function</span> <span class="fn">reverseList</span>(<span class="vr">head</span>) {
  <span class="kw">let</span> <span class="vr">prev</span> <span class="op">=</span> <span class="kw">null</span>;  <span class="cm">// العقدة السابقة (في البداية مفيش)</span>
  <span class="kw">let</span> <span class="vr">curr</span> <span class="op">=</span> <span class="vr">head</span>;  <span class="cm">// العقدة الحالية</span>

  <span class="kw">while</span> (<span class="vr">curr</span>) {
    <span class="cm">// احفظ العقدة الجاية قبل ما تبدل الاتجاه</span>
    <span class="kw">const</span> <span class="vr">next</span> <span class="op">=</span> <span class="vr">curr</span>.<span class="vr">next</span>;

    <span class="cm">// اقلب الاتجاه: اربط للخلف</span>
    <span class="vr">curr</span>.<span class="vr">next</span> <span class="op">=</span> <span class="vr">prev</span>;

    <span class="cm">// تقدم للأمام</span>
    <span class="vr">prev</span> <span class="op">=</span> <span class="vr">curr</span>;
    <span class="vr">curr</span> <span class="op">=</span> <span class="vr">next</span>;
  }

  <span class="kw">return</span> <span class="vr">prev</span>; <span class="cm">// prev هو الـ head الجديد</span>
}`,time:'O(n)',space:'O(1)'},

{id:12,cat:'linked',catN:'🔗 Linked List',diff:'medium',
en:'Detect Cycle in Linked List',ar:'اكتشاف الحلقة في القائمة',
idea:'عدّائَين: واحد سريع (خطوتين) وواحد بطيء (خطوة). لو فيه حلقة، السريع هيلحق البطيء. ده Floyd\'s Cycle Detection.',
ex:'1→2→3→4→2 (حلقة)\nبطيء: 1,2,3,4,2...\nسريع: 1,3,2,4,3...\nهيلتقوا! → حلقة ✅',
code:`<span class="kw">function</span> <span class="fn">hasCycle</span>(<span class="vr">head</span>) {
  <span class="kw">let</span> <span class="vr">slow</span> <span class="op">=</span> <span class="vr">head</span>; <span class="cm">// العدّاء البطيء (خطوة)</span>
  <span class="kw">let</span> <span class="vr">fast</span> <span class="op">=</span> <span class="vr">head</span>; <span class="cm">// العدّاء السريع (خطوتين)</span>

  <span class="kw">while</span> (<span class="vr">fast</span> <span class="op">&amp;&amp;</span> <span class="vr">fast</span>.<span class="vr">next</span>) {
    <span class="vr">slow</span> <span class="op">=</span> <span class="vr">slow</span>.<span class="vr">next</span>;       <span class="cm">// خطوة واحدة</span>
    <span class="vr">fast</span> <span class="op">=</span> <span class="vr">fast</span>.<span class="vr">next</span>.<span class="vr">next</span>; <span class="cm">// خطوتين</span>

    <span class="cm">// التقوا! → فيه حلقة</span>
    <span class="kw">if</span> (<span class="vr">slow</span> <span class="op">===</span> <span class="vr">fast</span>) <span class="kw">return</span> <span class="kw">true</span>;
  }

  <span class="kw">return</span> <span class="kw">false</span>; <span class="cm">// fast وصل للآخر → مفيش حلقة</span>
}`,time:'O(n)',space:'O(1)'},

// ═══════════ TREES ═══════════
{id:13,cat:'trees',catN:'🌳 Trees',diff:'easy',
en:'Invert Binary Tree',ar:'عكس الشجرة الثنائية',
idea:'كل عقدة بنبادل ابنها الأيمن بالأيسر. بنعمل نفس الشيء لكل العقد بالـ Recursion.',
ex:'    4          4\n   / \\   →   / \\\n  2   7      7   2\n / \\ / \\  / \\ / \\\n1 3 6 9  9 6 3 1 ✅',
code:`<span class="kw">function</span> <span class="fn">invertTree</span>(<span class="vr">root</span>) {
  <span class="cm">// Base case: شجرة فاضية</span>
  <span class="kw">if</span> (<span class="op">!</span><span class="vr">root</span>) <span class="kw">return</span> <span class="kw">null</span>;

  <span class="cm">// بادل الابن الأيمن والأيسر</span>
  [<span class="vr">root</span>.<span class="vr">left</span>, <span class="vr">root</span>.<span class="vr">right</span>] <span class="op">=</span> [<span class="vr">root</span>.<span class="vr">right</span>, <span class="vr">root</span>.<span class="vr">left</span>];

  <span class="cm">// اعكس الفرع الأيسر بشكل تكراري</span>
  <span class="fn">invertTree</span>(<span class="vr">root</span>.<span class="vr">left</span>);

  <span class="cm">// اعكس الفرع الأيمن بشكل تكراري</span>
  <span class="fn">invertTree</span>(<span class="vr">root</span>.<span class="vr">right</span>);

  <span class="kw">return</span> <span class="vr">root</span>;
}`,time:'O(n)',space:'O(h)'},

{id:14,cat:'trees',catN:'🌳 Trees',diff:'easy',
en:'Maximum Depth of Binary Tree',ar:'أقصى عمق للشجرة',
idea:'العمق = 1 + أقصى عمق من الفرعين. Base case: شجرة فاضية = 0.',
ex:'   3\n  / \\\n 9  20\n    / \\\n   15  7\nالعمق = 3 ✅',
code:`<span class="kw">function</span> <span class="fn">maxDepth</span>(<span class="vr">root</span>) {
  <span class="cm">// Base case: ما فيش شجرة → عمق 0</span>
  <span class="kw">if</span> (<span class="op">!</span><span class="vr">root</span>) <span class="kw">return</span> <span class="num">0</span>;

  <span class="cm">// احسب أقصى عمق من كل فرع</span>
  <span class="kw">const</span> <span class="vr">leftDepth</span>  <span class="op">=</span> <span class="fn">maxDepth</span>(<span class="vr">root</span>.<span class="vr">left</span>);
  <span class="kw">const</span> <span class="vr">rightDepth</span> <span class="op">=</span> <span class="fn">maxDepth</span>(<span class="vr">root</span>.<span class="vr">right</span>);

  <span class="cm">// العمق = 1 (العقدة الحالية) + أعمق فرع</span>
  <span class="kw">return</span> <span class="num">1</span> <span class="op">+</span> <span class="fn">Math.max</span>(<span class="vr">leftDepth</span>, <span class="vr">rightDepth</span>);
}`,time:'O(n)',space:'O(h)'},

{id:15,cat:'trees',catN:'🌳 Trees',diff:'medium',
en:'Level Order Traversal',ar:'قراءة الشجرة مستوى مستوى',
idea:'BFS بـ Queue. بنحط الجذر، وبناخده وبنحط أبنائه، وبنكمل.',
ex:'   3 → [[3],[9,20],[15,7]] ✅',
code:`<span class="kw">function</span> <span class="fn">levelOrder</span>(<span class="vr">root</span>) {
  <span class="kw">if</span> (<span class="op">!</span><span class="vr">root</span>) <span class="kw">return</span> [];

  <span class="kw">const</span> <span class="vr">result</span> <span class="op">=</span> [], <span class="vr">queue</span> <span class="op">=</span> [<span class="vr">root</span>];

  <span class="kw">while</span> (<span class="vr">queue</span>.<span class="vr">length</span>) {
    <span class="kw">const</span> <span class="vr">size</span> <span class="op">=</span> <span class="vr">queue</span>.<span class="vr">length</span>; <span class="cm">// حجم المستوى الحالي</span>
    <span class="kw">const</span> <span class="vr">level</span> <span class="op">=</span> [];

    <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">size</span>; <span class="vr">i</span><span class="op">++</span>) {
      <span class="kw">const</span> <span class="vr">node</span> <span class="op">=</span> <span class="vr">queue</span>.<span class="fn">shift</span>(); <span class="cm">// طلّع من الطابور</span>
      <span class="vr">level</span>.<span class="fn">push</span>(<span class="vr">node</span>.<span class="vr">val</span>);

      <span class="kw">if</span> (<span class="vr">node</span>.<span class="vr">left</span>)  <span class="vr">queue</span>.<span class="fn">push</span>(<span class="vr">node</span>.<span class="vr">left</span>);  <span class="cm">// أضيف الأبناء</span>
      <span class="kw">if</span> (<span class="vr">node</span>.<span class="vr">right</span>) <span class="vr">queue</span>.<span class="fn">push</span>(<span class="vr">node</span>.<span class="vr">right</span>);
    }
    <span class="vr">result</span>.<span class="fn">push</span>(<span class="vr">level</span>); <span class="cm">// ضيف المستوى للنتيجة</span>
  }
  <span class="kw">return</span> <span class="vr">result</span>;
}`,time:'O(n)',space:'O(w)'},

{id:16,cat:'trees',catN:'🌳 Trees',diff:'hard',
en:'Binary Tree Maximum Path Sum',ar:'أعظم مجموع مسار',
idea:'كل عقدة ممكن تكون جزء من مسار (فرع واحد) أو المحور (يمين + أنا + شمال). بنحسب الاتنين ونأخد الأعلى.',
ex:'[-10, 9, 20, null, null, 15, 7]\n15+20+7 = 42 ✅',
code:`<span class="kw">function</span> <span class="fn">maxPathSum</span>(<span class="vr">root</span>) {
  <span class="kw">let</span> <span class="vr">max</span> <span class="op">=</span> <span class="op">-</span><span class="kw">Infinity</span>;

  <span class="kw">function</span> <span class="fn">dfs</span>(<span class="vr">node</span>) {
    <span class="kw">if</span> (<span class="op">!</span><span class="vr">node</span>) <span class="kw">return</span> <span class="num">0</span>;

    <span class="cm">// لو الفرع سالب، مش بنستخدمه (نأخد 0 بدلاً منه)</span>
    <span class="kw">const</span> <span class="vr">left</span>  <span class="op">=</span> <span class="fn">Math.max</span>(<span class="fn">dfs</span>(<span class="vr">node</span>.<span class="vr">left</span>),  <span class="num">0</span>);
    <span class="kw">const</span> <span class="vr">right</span> <span class="op">=</span> <span class="fn">Math.max</span>(<span class="fn">dfs</span>(<span class="vr">node</span>.<span class="vr">right</span>), <span class="num">0</span>);

    <span class="cm">// المسار اللي بيمر من الـ node ده = left + node + right</span>
    <span class="vr">max</span> <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">max</span>, <span class="vr">node</span>.<span class="vr">val</span> <span class="op">+</span> <span class="vr">left</span> <span class="op">+</span> <span class="vr">right</span>);

    <span class="cm">// ارجع للأب أحسن فرع واحد بس</span>
    <span class="kw">return</span> <span class="vr">node</span>.<span class="vr">val</span> <span class="op">+</span> <span class="fn">Math.max</span>(<span class="vr">left</span>, <span class="vr">right</span>);
  }

  <span class="fn">dfs</span>(<span class="vr">root</span>);
  <span class="kw">return</span> <span class="vr">max</span>;
}`,time:'O(n)',space:'O(h)'},

// ═══════════ GRAPHS ═══════════
{id:17,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',
en:'Number of Islands',ar:'عد الجزر',
idea:'كل ما بنلاقي أرض (1)، بنعمل DFS ونلوّن كل الجزيرة بـ 0 عشان ما نعدهاش تاني.',
ex:'11110\n11010\n11000\nجزيرة واحدة → 1 ✅',
code:`<span class="kw">function</span> <span class="fn">numIslands</span>(<span class="vr">grid</span>) {
  <span class="kw">let</span> <span class="vr">count</span> <span class="op">=</span> <span class="num">0</span>;

  <span class="kw">function</span> <span class="fn">dfs</span>(<span class="vr">r</span>, <span class="vr">c</span>) {
    <span class="cm">// توقف لو خارج الحدود أو مياه</span>
    <span class="kw">if</span> (<span class="vr">r</span><span class="op">&lt;</span><span class="num">0</span><span class="op">||</span><span class="vr">r</span><span class="op">&gt;=</span><span class="vr">grid</span>.<span class="vr">length</span><span class="op">||</span><span class="vr">c</span><span class="op">&lt;</span><span class="num">0</span><span class="op">||</span><span class="vr">c</span><span class="op">&gt;=</span><span class="vr">grid</span>[<span class="num">0</span>].<span class="vr">length</span><span class="op">||</span><span class="vr">grid</span>[<span class="vr">r</span>][<span class="vr">c</span>]<span class="op">!==</span><span class="str">'1'</span>) <span class="kw">return</span>;
    <span class="vr">grid</span>[<span class="vr">r</span>][<span class="vr">c</span>] <span class="op">=</span> <span class="str">'0'</span>; <span class="cm">// زيارة (لوّن المياه)</span>
    <span class="fn">dfs</span>(<span class="vr">r</span><span class="op">+</span><span class="num">1</span>,<span class="vr">c</span>); <span class="fn">dfs</span>(<span class="vr">r</span><span class="op">-</span><span class="num">1</span>,<span class="vr">c</span>); <span class="fn">dfs</span>(<span class="vr">r</span>,<span class="vr">c</span><span class="op">+</span><span class="num">1</span>); <span class="fn">dfs</span>(<span class="vr">r</span>,<span class="vr">c</span><span class="op">-</span><span class="num">1</span>); <span class="cm">// الـ 4 اتجاهات</span>
  }

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">r</span><span class="op">=</span><span class="num">0</span>; <span class="vr">r</span><span class="op">&lt;</span><span class="vr">grid</span>.<span class="vr">length</span>; <span class="vr">r</span><span class="op">++</span>) {
    <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">c</span><span class="op">=</span><span class="num">0</span>; <span class="vr">c</span><span class="op">&lt;</span><span class="vr">grid</span>[<span class="num">0</span>].<span class="vr">length</span>; <span class="vr">c</span><span class="op">++</span>) {
      <span class="kw">if</span> (<span class="vr">grid</span>[<span class="vr">r</span>][<span class="vr">c</span>] <span class="op">===</span> <span class="str">'1'</span>) { <span class="vr">count</span><span class="op">++</span>; <span class="fn">dfs</span>(<span class="vr">r</span>,<span class="vr">c</span>); }
    }
  }
  <span class="kw">return</span> <span class="vr">count</span>;
}`,time:'O(n×m)',space:'O(n×m)'},

{id:18,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',
en:'Course Schedule',ar:'هل تقدر تكمل كل الكورسات؟',
idea:'لو فيه حلقة في الـ prerequisites → مستحيل. Topological Sort بـ Kahn\'s Algorithm.',
ex:'2 كورسات: [[1,0]] → 0 قبل 1 → ممكن ✅\n[[1,0],[0,1]] → حلقة → مستحيل ❌',
code:`<span class="kw">function</span> <span class="fn">canFinish</span>(<span class="vr">n</span>, <span class="vr">prereqs</span>) {
  <span class="kw">const</span> <span class="vr">adj</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(() <span class="op">=&gt;</span> []);
  <span class="kw">const</span> <span class="vr">deg</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>).<span class="fn">fill</span>(<span class="num">0</span>);

  <span class="cm">// ابنى الجراف والـ in-degrees</span>
  <span class="kw">for</span> (<span class="kw">const</span> [<span class="vr">a</span>,<span class="vr">b</span>] <span class="kw">of</span> <span class="vr">prereqs</span>) { <span class="vr">adj</span>[<span class="vr">b</span>].<span class="fn">push</span>(<span class="vr">a</span>); <span class="vr">deg</span>[<span class="vr">a</span>]<span class="op">++</span>; }

  <span class="cm">// ابدأ بالكورسات ما ليهاش prerequisites</span>
  <span class="kw">const</span> <span class="vr">q</span> <span class="op">=</span> [];
  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span><span class="op">=</span><span class="num">0</span>; <span class="vr">i</span><span class="op">&lt;</span><span class="vr">n</span>; <span class="vr">i</span><span class="op">++</span>) <span class="kw">if</span> (<span class="vr">deg</span>[<span class="vr">i</span>]<span class="op">===</span><span class="num">0</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">i</span>);

  <span class="kw">let</span> <span class="vr">done</span> <span class="op">=</span> <span class="num">0</span>;
  <span class="kw">while</span> (<span class="vr">q</span>.<span class="vr">length</span>) {
    <span class="kw">const</span> <span class="vr">c</span> <span class="op">=</span> <span class="vr">q</span>.<span class="fn">shift</span>(); <span class="vr">done</span><span class="op">++</span>;
    <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">nx</span> <span class="kw">of</span> <span class="vr">adj</span>[<span class="vr">c</span>]) {
      <span class="kw">if</span> (<span class="op">--</span><span class="vr">deg</span>[<span class="vr">nx</span>] <span class="op">===</span> <span class="num">0</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">nx</span>); <span class="cm">// أصبح جاهز</span>
    }
  }
  <span class="kw">return</span> <span class="vr">done</span> <span class="op">===</span> <span class="vr">n</span>; <span class="cm">// لو خلصنا كل → مفيش حلقة</span>
}`,time:'O(V+E)',space:'O(V+E)'},

// ═══════════ DYNAMIC PROGRAMMING ═══════════
{id:19,cat:'dp',catN:'🧠 Dynamic Programming',diff:'easy',
en:'Climbing Stairs',ar:'طلوع السلم',
idea:'طرق الوصول لدرجة n = طرق n-1 (جيت بخطوة) + طرق n-2 (جيت بقفزة). زي فيبوناتشي!',
ex:'n=4: dp[1]=1, dp[2]=2, dp[3]=3, dp[4]=5 ✅',
code:`<span class="kw">function</span> <span class="fn">climbStairs</span>(<span class="vr">n</span>) {
  <span class="kw">if</span> (<span class="vr">n</span> <span class="op">&lt;=</span> <span class="num">2</span>) <span class="kw">return</span> <span class="vr">n</span>; <span class="cm">// Base cases</span>

  <span class="kw">let</span> <span class="vr">a</span> <span class="op">=</span> <span class="num">1</span>, <span class="vr">b</span> <span class="op">=</span> <span class="num">2</span>; <span class="cm">// dp[1]=1, dp[2]=2</span>

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span> <span class="op">=</span> <span class="num">3</span>; <span class="vr">i</span> <span class="op">&lt;=</span> <span class="vr">n</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="cm">// dp[i] = dp[i-1] + dp[i-2]</span>
    <span class="kw">const</span> <span class="vr">temp</span> <span class="op">=</span> <span class="vr">a</span> <span class="op">+</span> <span class="vr">b</span>;
    <span class="vr">a</span> <span class="op">=</span> <span class="vr">b</span>;    <span class="cm">// تقدم: a بقى dp[i-1]</span>
    <span class="vr">b</span> <span class="op">=</span> <span class="vr">temp</span>; <span class="cm">// b بقى dp[i]</span>
  }
  <span class="kw">return</span> <span class="vr">b</span>;
}`,time:'O(n)',space:'O(1)'},

{id:20,cat:'dp',catN:'🧠 Dynamic Programming',diff:'medium',
en:'House Robber',ar:'حرامي البيوت',
idea:'لكل بيت: اسرق هنا (+ بيتين قبل) أو اتخطى (+ بيت قبل). خد الأحسن.',
ex:'[2,7,9,3,1]\ndp: [2,7,11,11,12]\nالجواب: 12 ✅',
code:`<span class="kw">function</span> <span class="fn">rob</span>(<span class="vr">nums</span>) {
  <span class="kw">let</span> <span class="vr">prev2</span> <span class="op">=</span> <span class="num">0</span>; <span class="cm">// أقصى سرقة قبل البيت اللي قبلي بـ2</span>
  <span class="kw">let</span> <span class="vr">prev1</span> <span class="op">=</span> <span class="num">0</span>; <span class="cm">// أقصى سرقة في البيت اللي قبلي</span>

  <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">n</span> <span class="kw">of</span> <span class="vr">nums</span>) {
    <span class="cm">// اسرق البيت ده (prev2 + n) أو اتخطاه (prev1)</span>
    <span class="kw">const</span> <span class="vr">curr</span> <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">prev2</span> <span class="op">+</span> <span class="vr">n</span>, <span class="vr">prev1</span>);
    <span class="vr">prev2</span> <span class="op">=</span> <span class="vr">prev1</span>; <span class="cm">// حرّك للأمام</span>
    <span class="vr">prev1</span> <span class="op">=</span> <span class="vr">curr</span>;
  }
  <span class="kw">return</span> <span class="vr">prev1</span>;
}`,time:'O(n)',space:'O(1)'},

{id:21,cat:'dp',catN:'🧠 Dynamic Programming',diff:'medium',
en:'Coin Change',ar:'أقل عدد عملات لصرف مبلغ',
idea:'لكل مبلغ من 1 للـ target: جرب كل عملة. dp[i] = min(dp[i], dp[i-coin]+1).',
ex:'coins=[1,5,6,9], amount=11\ndp[11] = min ways = 2 (5+6) ✅',
code:`<span class="kw">function</span> <span class="fn">coinChange</span>(<span class="vr">coins</span>, <span class="vr">amount</span>) {
  <span class="cm">// ملي بـ Infinity = "مستحيل" في البداية</span>
  <span class="kw">const</span> <span class="vr">dp</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">amount</span><span class="op">+</span><span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">Infinity</span>);
  <span class="vr">dp</span>[<span class="num">0</span>] <span class="op">=</span> <span class="num">0</span>; <span class="cm">// مبلغ 0 = 0 عملات</span>

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span><span class="op">=</span><span class="num">1</span>; <span class="vr">i</span><span class="op">&lt;=</span><span class="vr">amount</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">coins</span>) {
      <span class="kw">if</span> (<span class="vr">c</span> <span class="op">&lt;=</span> <span class="vr">i</span>) <span class="cm">// لو العملة تنفع</span>
        <span class="vr">dp</span>[<span class="vr">i</span>] <span class="op">=</span> <span class="fn">Math.min</span>(<span class="vr">dp</span>[<span class="vr">i</span>], <span class="vr">dp</span>[<span class="vr">i</span><span class="op">-</span><span class="vr">c</span>] <span class="op">+</span> <span class="num">1</span>);
    }
  }
  <span class="kw">return</span> <span class="vr">dp</span>[<span class="vr">amount</span>] <span class="op">===</span> <span class="kw">Infinity</span> <span class="op">?</span> <span class="op">-</span><span class="num">1</span> <span class="op">:</span> <span class="vr">dp</span>[<span class="vr">amount</span>];
}`,time:'O(amount×coins)',space:'O(amount)'},

{id:22,cat:'dp',catN:'🧠 Dynamic Programming',diff:'medium',
en:'Longest Increasing Subsequence',ar:'أطول تسلسل متزايد',
idea:'لكل عنصر بنسأل: أطول تسلسل ينتهي بيّا؟ = 1 + أطول تسلسل قبله وأصغر منه.',
ex:'[10,9,2,5,3,7,101,18]\nأطول تسلسل: [2,3,7,18] أو [2,3,7,101] = طول 4 ✅',
code:`<span class="kw">function</span> <span class="fn">lengthOfLIS</span>(<span class="vr">nums</span>) {
  <span class="cm">// dp[i] = أطول تسلسل ينتهي بالعنصر i</span>
  <span class="kw">const</span> <span class="vr">dp</span> <span class="op">=</span> <span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">nums</span>.<span class="vr">length</span>).<span class="fn">fill</span>(<span class="num">1</span>); <span class="cm">// على الأقل 1</span>

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span><span class="op">=</span><span class="num">1</span>; <span class="vr">i</span><span class="op">&lt;</span><span class="vr">nums</span>.<span class="vr">length</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">j</span><span class="op">=</span><span class="num">0</span>; <span class="vr">j</span><span class="op">&lt;</span><span class="vr">i</span>; <span class="vr">j</span><span class="op">++</span>) {
      <span class="cm">// لو nums[j] أصغر → ممكن يكون قبلي في التسلسل</span>
      <span class="kw">if</span> (<span class="vr">nums</span>[<span class="vr">j</span>] <span class="op">&lt;</span> <span class="vr">nums</span>[<span class="vr">i</span>]) {
        <span class="vr">dp</span>[<span class="vr">i</span>] <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">dp</span>[<span class="vr">i</span>], <span class="vr">dp</span>[<span class="vr">j</span>] <span class="op">+</span> <span class="num">1</span>);
      }
    }
  }
  <span class="kw">return</span> <span class="fn">Math.max</span>(...<span class="vr">dp</span>); <span class="cm">// الأطول من الكل</span>
}`,time:'O(n²)',space:'O(n)'},

// ═══════════ INTERVALS ═══════════
{id:23,cat:'intervals',catN:'📅 Intervals',diff:'medium',
en:'Merge Intervals',ar:'دمج الفترات المتداخلة',
idea:'رتّب بالبداية. لو نهاية الحالي >= بداية الجاي → ادمجهم.',
ex:'[[1,3],[2,6],[8,10],[15,18]]\nبعد الدمج: [[1,6],[8,10],[15,18]] ✅',
code:`<span class="kw">function</span> <span class="fn">merge</span>(<span class="vr">intervals</span>) {
  <span class="cm">// رتّب حسب البداية</span>
  <span class="vr">intervals</span>.<span class="fn">sort</span>((<span class="vr">a</span>,<span class="vr">b</span>) <span class="op">=&gt;</span> <span class="vr">a</span>[<span class="num">0</span>] <span class="op">-</span> <span class="vr">b</span>[<span class="num">0</span>]);

  <span class="kw">const</span> <span class="vr">res</span> <span class="op">=</span> [<span class="vr">intervals</span>[<span class="num">0</span>]]; <span class="cm">// ابدأ بالأول</span>

  <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span><span class="op">=</span><span class="num">1</span>; <span class="vr">i</span><span class="op">&lt;</span><span class="vr">intervals</span>.<span class="vr">length</span>; <span class="vr">i</span><span class="op">++</span>) {
    <span class="kw">const</span> <span class="vr">last</span> <span class="op">=</span> <span class="vr">res</span>[<span class="vr">res</span>.<span class="vr">length</span><span class="op">-</span><span class="num">1</span>];
    <span class="kw">const</span> <span class="vr">curr</span> <span class="op">=</span> <span class="vr">intervals</span>[<span class="vr">i</span>];

    <span class="kw">if</span> (<span class="vr">last</span>[<span class="num">1</span>] <span class="op">&gt;=</span> <span class="vr">curr</span>[<span class="num">0</span>]) {
      <span class="cm">// تداخل! وسّع الـ last</span>
      <span class="vr">last</span>[<span class="num">1</span>] <span class="op">=</span> <span class="fn">Math.max</span>(<span class="vr">last</span>[<span class="num">1</span>], <span class="vr">curr</span>[<span class="num">1</span>]);
    } <span class="kw">else</span> {
      <span class="cm">// ما فيش تداخل → أضيف كـ interval جديد</span>
      <span class="vr">res</span>.<span class="fn">push</span>(<span class="vr">curr</span>);
    }
  }
  <span class="kw">return</span> <span class="vr">res</span>;
}`,time:'O(n log n)',space:'O(n)'},

// ═══════════ TRIE ═══════════
{id:24,cat:'trie',catN:'🔤 Trie',diff:'medium',
en:'Implement Trie',ar:'بناء شجرة البادئات',
idea:'كل حرف = عقدة في الشجرة. cat وcar بيشتركوا في ca وبعدين بيتفرقوا. البحث سريع جداً!',
ex:'ضيف "apple" ثم ابحث عن "app"\nالمسار: a→p→p موجود! ✅',
code:`<span class="kw">class</span> <span class="fn">Trie</span> {
  <span class="fn">constructor</span>() {
    <span class="cm">// كل عقدة ليها: أولاد (حروف) + علامة نهاية كلمة</span>
    <span class="kw">this</span>.<span class="vr">children</span> <span class="op">=</span> {};
    <span class="kw">this</span>.<span class="vr">isEnd</span> <span class="op">=</span> <span class="kw">false</span>;
  }

  <span class="fn">insert</span>(<span class="vr">word</span>) {
    <span class="kw">let</span> <span class="vr">node</span> <span class="op">=</span> <span class="kw">this</span>; <span class="cm">// ابدأ من الجذر</span>
    <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">word</span>) {
      <span class="cm">// لو الحرف مش موجود → أضيف عقدة جديدة</span>
      <span class="kw">if</span> (<span class="op">!</span><span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>]) <span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>] <span class="op">=</span> <span class="kw">new</span> <span class="fn">Trie</span>();
      <span class="vr">node</span> <span class="op">=</span> <span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>]; <span class="cm">// تحرك للعقدة التالية</span>
    }
    <span class="vr">node</span>.<span class="vr">isEnd</span> <span class="op">=</span> <span class="kw">true</span>; <span class="cm">// علّم نهاية الكلمة</span>
  }

  <span class="fn">search</span>(<span class="vr">word</span>) {
    <span class="kw">let</span> <span class="vr">node</span> <span class="op">=</span> <span class="kw">this</span>;
    <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">word</span>) {
      <span class="kw">if</span> (<span class="op">!</span><span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>]) <span class="kw">return</span> <span class="kw">false</span>; <span class="cm">// مش موجود</span>
      <span class="vr">node</span> <span class="op">=</span> <span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>];
    }
    <span class="kw">return</span> <span class="vr">node</span>.<span class="vr">isEnd</span>; <span class="cm">// موجود وكاملة</span>
  }

  <span class="fn">startsWith</span>(<span class="vr">prefix</span>) {
    <span class="kw">let</span> <span class="vr">node</span> <span class="op">=</span> <span class="kw">this</span>;
    <span class="kw">for</span> (<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">prefix</span>) {
      <span class="kw">if</span> (<span class="op">!</span><span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>]) <span class="kw">return</span> <span class="kw">false</span>;
      <span class="vr">node</span> <span class="op">=</span> <span class="vr">node</span>.<span class="vr">children</span>[<span class="vr">c</span>];
    }
    <span class="kw">return</span> <span class="kw">true</span>; <span class="cm">// البادئة موجودة (مش لازم كلمة كاملة)</span>
  }
}`,time:'O(m) كل عملية',space:'O(ALPHABET × n)'},

// ═══════════ HEAP ═══════════
{id:25,cat:'heap',catN:'⛏️ Heap',diff:'medium',
en:'Kth Largest Element',ar:'الـ K أكبر عنصر',
idea:'Min Heap بحجم K. لو دخل عنصر أكبر من الأصغر فيه → شيل الأصغر وأضيف الجديد. الباقي = Kth largest.',
ex:'[3,2,1,5,6,4], k=2\nMin Heap حجم 2: [5,6]\nأصغره = 5 = الثاني أكبر ✅',
code:`<span class="kw">function</span> <span class="fn">findKthLargest</span>(<span class="vr">nums</span>, <span class="vr">k</span>) {
  <span class="cm">// QuickSelect: O(n) average</span>
  <span class="kw">function</span> <span class="fn">partition</span>(<span class="vr">lo</span>, <span class="vr">hi</span>) {
    <span class="kw">const</span> <span class="vr">pivot</span> <span class="op">=</span> <span class="vr">nums</span>[<span class="vr">hi</span>]; <span class="cm">// آخر عنصر كـ pivot</span>
    <span class="kw">let</span> <span class="vr">p</span> <span class="op">=</span> <span class="vr">lo</span>;
    <span class="kw">for</span> (<span class="kw">let</span> <span class="vr">i</span><span class="op">=</span><span class="vr">lo</span>; <span class="vr">i</span><span class="op">&lt;</span><span class="vr">hi</span>; <span class="vr">i</span><span class="op">++</span>) {
      <span class="kw">if</span> (<span class="vr">nums</span>[<span class="vr">i</span>] <span class="op">&gt;=</span> <span class="vr">pivot</span>) { <span class="cm">// ترتيب تنازلي</span>
        [<span class="vr">nums</span>[<span class="vr">p</span>],<span class="vr">nums</span>[<span class="vr">i</span>]] <span class="op">=</span> [<span class="vr">nums</span>[<span class="vr">i</span>],<span class="vr">nums</span>[<span class="vr">p</span>]]; <span class="vr">p</span><span class="op">++</span>;
      }
    }
    [<span class="vr">nums</span>[<span class="vr">p</span>],<span class="vr">nums</span>[<span class="vr">hi</span>]] <span class="op">=</span> [<span class="vr">nums</span>[<span class="vr">hi</span>],<span class="vr">nums</span>[<span class="vr">p</span>]]; <span class="kw">return</span> <span class="vr">p</span>;
  }

  <span class="kw">let</span> <span class="vr">lo</span><span class="op">=</span><span class="num">0</span>, <span class="vr">hi</span><span class="op">=</span><span class="vr">nums</span>.<span class="vr">length</span><span class="op">-</span><span class="num">1</span>;
  <span class="kw">while</span> (<span class="vr">lo</span> <span class="op">&lt;=</span> <span class="vr">hi</span>) {
    <span class="kw">const</span> <span class="vr">mid</span> <span class="op">=</span> <span class="fn">partition</span>(<span class="vr">lo</span>,<span class="vr">hi</span>);
    <span class="kw">if</span>      (<span class="vr">mid</span> <span class="op">===</span> <span class="vr">k</span><span class="op">-</span><span class="num">1</span>) <span class="kw">return</span> <span class="vr">nums</span>[<span class="vr">mid</span>];
    <span class="kw">else if</span> (<span class="vr">mid</span> <span class="op">&lt;</span>  <span class="vr">k</span><span class="op">-</span><span class="num">1</span>) <span class="vr">lo</span> <span class="op">=</span> <span class="vr">mid</span><span class="op">+</span><span class="num">1</span>;
    <span class="kw">else</span>                    <span class="vr">hi</span> <span class="op">=</span> <span class="vr">mid</span><span class="op">-</span><span class="num">1</span>;
  }
}`,time:'O(n) avg',space:'O(1)'},

// ═══════════ BIT MANIPULATION ═══════════
{id:26,cat:'bits',catN:'🔢 Bit Manipulation',diff:'easy',
en:'Number of 1 Bits',ar:'عد الـ 1 في التمثيل الثنائي',
idea:'n & (n-1) بتشيل أقصى يمين 1 في كل مرة. عدد المرات = عدد الـ 1.',
ex:'n=11=1011\n11&10=1010 (شيل أول 1)\n1010&1001=1000 (شيل ثاني 1)\n1000&0111=0000 (شيل ثالث 1)\n3 مرات → 3 ✅',
code:`<span class="kw">function</span> <span class="fn">hammingWeight</span>(<span class="vr">n</span>) {
  <span class="kw">let</span> <span class="vr">count</span> <span class="op">=</span> <span class="num">0</span>;

  <span class="kw">while</span> (<span class="vr">n</span>) {
    <span class="cm">// n & (n-1) بتشيل أقصى يمين 1</span>
    <span class="cm">// مثال: 1100 & 1011 = 1000 (شال ثاني 1 من اليمين)</span>
    <span class="vr">n</span> <span class="op">&amp;=</span> (<span class="vr">n</span> <span class="op">-</span> <span class="num">1</span>);
    <span class="vr">count</span><span class="op">++</span>; <span class="cm">// عدّ كل 1 شيلناه</span>
  }

  <span class="kw">return</span> <span class="vr">count</span>;
}`,time:'O(k) k=عدد الـ1',space:'O(1)'},

{id:27,cat:'bits',catN:'🔢 Bit Manipulation',diff:'easy',
en:'Missing Number',ar:'إيجاد الرقم المفقود',
idea:'مجموع 0..n = n(n+1)/2. اطرح مجموع الأرقام الموجودة. الفرق = الناقص.',
ex:'[3,0,1]: n=3\nمجموع نظري = 6\nمجموع موجود = 4\nالناقص = 2 ✅',
code:`<span class="kw">function</span> <span class="fn">missingNumber</span>(<span class="vr">nums</span>) {
  <span class="kw">const</span> <span class="vr">n</span> <span class="op">=</span> <span class="vr">nums</span>.<span class="vr">length</span>;

  <span class="cm">// المجموع النظري لو ما فيش ناقص</span>
  <span class="kw">const</span> <span class="vr">expected</span> <span class="op">=</span> <span class="vr">n</span> <span class="op">*</span> (<span class="vr">n</span> <span class="op">+</span> <span class="num">1</span>) <span class="op">/</span> <span class="num">2</span>;

  <span class="cm">// المجموع الفعلي</span>
  <span class="kw">const</span> <span class="vr">actual</span> <span class="op">=</span> <span class="vr">nums</span>.<span class="fn">reduce</span>((<span class="vr">a</span>,<span class="vr">b</span>) <span class="op">=&gt;</span> <span class="vr">a</span><span class="op">+</span><span class="vr">b</span>, <span class="num">0</span>);

  <span class="cm">// الفرق = الرقم الناقص</span>
  <span class="kw">return</span> <span class="vr">expected</span> <span class="op">-</span> <span class="vr">actual</span>;
}`,time:'O(n)',space:'O(1)'},

,{id:28,cat:'arrays',catN:'📦 Arrays',diff:'hard',en:'Longest Consecutive Sequence',ar:'أطول تسلسل أرقام متتالية',idea:'حط كل الأرقام في HashSet. لو n-1 مش موجود → ابدأ عد من هنا.',ex:'[100,4,200,1,3,2] → 4 ✅',code:`<span class="kw">function</span> <span class="fn">longestConsecutive</span>(<span class="vr">nums</span>) {
  <span class="kw">const</span> <span class="vr">s</span>=<span class="kw">new</span> <span class="fn">Set</span>(<span class="vr">nums</span>); <span class="kw">let</span> <span class="vr">b</span>=<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">n</span> <span class="kw">of</span> <span class="vr">s</span>) <span class="kw">if</span>(!<span class="vr">s</span>.<span class="fn">has</span>(<span class="vr">n</span>-<span class="num">1</span>)) {
    <span class="kw">let</span> <span class="vr">c</span>=<span class="vr">n</span>,<span class="vr">l</span>=<span class="num">1</span>;
    <span class="kw">while</span>(<span class="vr">s</span>.<span class="fn">has</span>(<span class="vr">c</span>+<span class="num">1</span>)){<span class="vr">c</span>++;<span class="vr">l</span>++;}
    <span class="vr">b</span>=<span class="fn">Math.max</span>(<span class="vr">b</span>,<span class="vr">l</span>);
  }
  <span class="kw">return</span> <span class="vr">b</span>;
}`,time:'O(n)',space:'O(n)'}

,{id:29,cat:'arrays',catN:'📦 Arrays',diff:'hard',en:'Trapping Rain Water',ar:'كمية الأمطار المتجمعة',idea:'Two Pointers. lMax وrMax. المياه = min(lMax,rMax) - ارتفاع الحالي.',ex:'[0,1,0,2,1,0,1,3,2,1,2,1] → 6 ✅',code:`<span class="kw">function</span> <span class="fn">trap</span>(<span class="vr">h</span>) {
  <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">r</span>=<span class="vr">h</span>.<span class="vr">length</span>-<span class="num">1</span>,<span class="vr">lm</span>=<span class="num">0</span>,<span class="vr">rm</span>=<span class="num">0</span>,<span class="vr">w</span>=<span class="num">0</span>;
  <span class="kw">while</span>(<span class="vr">l</span>&lt;<span class="vr">r</span>) {
    <span class="kw">if</span>(<span class="vr">h</span>[<span class="vr">l</span>]&lt;<span class="vr">h</span>[<span class="vr">r</span>]){<span class="vr">lm</span>=<span class="fn">Math.max</span>(<span class="vr">lm</span>,<span class="vr">h</span>[<span class="vr">l</span>]);<span class="vr">w</span>+=<span class="vr">lm</span>-<span class="vr">h</span>[<span class="vr">l</span>++];}
    <span class="kw">else</span>{<span class="vr">rm</span>=<span class="fn">Math.max</span>(<span class="vr">rm</span>,<span class="vr">h</span>[<span class="vr">r</span>]);<span class="vr">w</span>+=<span class="vr">rm</span>-<span class="vr">h</span>[<span class="vr">r</span>--];}
  }
  <span class="kw">return</span> <span class="vr">w</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:30,cat:'sliding',catN:'🪟 Sliding Window',diff:'hard',en:'Minimum Window Substring',ar:'أصغر نافذة تحوي كل الحروف',idea:'وسّع يمين حتى تجمع كل الحروف، ضيّق شمال وحدّث الأقصر.',ex:'s="ADOBECODEBANC",t="ABC" → "BANC" ✅',code:`<span class="kw">function</span> <span class="fn">minWindow</span>(<span class="vr">s</span>,<span class="vr">t</span>) {
  <span class="kw">const</span> <span class="vr">nd</span>=<span class="kw">new</span> <span class="fn">Map</span>(),<span class="vr">wn</span>=<span class="kw">new</span> <span class="fn">Map</span>();
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">t</span>) <span class="vr">nd</span>.<span class="fn">set</span>(<span class="vr">c</span>,(<span class="vr">nd</span>.<span class="fn">get</span>(<span class="vr">c</span>)||<span class="num">0</span>)+<span class="num">1</span>);
  <span class="kw">let</span> <span class="vr">hv</span>=<span class="num">0</span>,<span class="vr">req</span>=<span class="vr">nd</span>.<span class="vr">size</span>,<span class="vr">l</span>=<span class="num">0</span>,<span class="vr">res</span>=[-<span class="num">1</span>,<span class="num">0</span>,<span class="num">0</span>];
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">s</span>.<span class="vr">length</span>;<span class="vr">r</span>++) {
    <span class="kw">const</span> <span class="vr">c</span>=<span class="vr">s</span>[<span class="vr">r</span>]; <span class="vr">wn</span>.<span class="fn">set</span>(<span class="vr">c</span>,(<span class="vr">wn</span>.<span class="fn">get</span>(<span class="vr">c</span>)||<span class="num">0</span>)+<span class="num">1</span>);
    <span class="kw">if</span>(<span class="vr">nd</span>.<span class="fn">has</span>(<span class="vr">c</span>)&&<span class="vr">wn</span>.<span class="fn">get</span>(<span class="vr">c</span>)===<span class="vr">nd</span>.<span class="fn">get</span>(<span class="vr">c</span>)) <span class="vr">hv</span>++;
    <span class="kw">while</span>(<span class="vr">hv</span>===<span class="vr">req</span>) {
      <span class="kw">if</span>(<span class="vr">res</span>[<span class="num">0</span>]===-<span class="num">1</span>||<span class="vr">r</span>-<span class="vr">l</span>+<span class="num">1</span>&lt;<span class="vr">res</span>[<span class="num">0</span>]) <span class="vr">res</span>=[<span class="vr">r</span>-<span class="vr">l</span>+<span class="num">1</span>,<span class="vr">l</span>,<span class="vr">r</span>];
      <span class="kw">const</span> <span class="vr">lc</span>=<span class="vr">s</span>[<span class="vr">l</span>++]; <span class="vr">wn</span>.<span class="fn">set</span>(<span class="vr">lc</span>,<span class="vr">wn</span>.<span class="fn">get</span>(<span class="vr">lc</span>)-<span class="num">1</span>);
      <span class="kw">if</span>(<span class="vr">nd</span>.<span class="fn">has</span>(<span class="vr">lc</span>)&&<span class="vr">wn</span>.<span class="fn">get</span>(<span class="vr">lc</span>)&lt;<span class="vr">nd</span>.<span class="fn">get</span>(<span class="vr">lc</span>)) <span class="vr">hv</span>--;
    }
  }
  <span class="kw">return</span> <span class="vr">res</span>[<span class="num">0</span>]===-<span class="num">1</span>?"":<span class="vr">s</span>.<span class="fn">slice</span>(<span class="vr">res</span>[<span class="num">1</span>],<span class="vr">res</span>[<span class="num">2</span>]+<span class="num">1</span>);
}`,time:'O(n)',space:'O(k)'}

,{id:31,cat:'twoptr',catN:'👆 Two Pointers',diff:'medium',en:'Container With Most Water',ar:'أكبر حوض مياه',idea:'إصبعين من الطرفين. المساحة = عرض × أقصر حيط. حرّك الأقصر.',ex:'[1,8,6,2,5,4,8,3,7] → 49 ✅',code:`<span class="kw">function</span> <span class="fn">maxArea</span>(<span class="vr">h</span>) {
  <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">r</span>=<span class="vr">h</span>.<span class="vr">length</span>-<span class="num">1</span>,<span class="vr">mx</span>=<span class="num">0</span>;
  <span class="kw">while</span>(<span class="vr">l</span>&lt;<span class="vr">r</span>){<span class="vr">mx</span>=<span class="fn">Math.max</span>(<span class="vr">mx</span>,(<span class="vr">r</span>-<span class="vr">l</span>)*<span class="fn">Math.min</span>(<span class="vr">h</span>[<span class="vr">l</span>],<span class="vr">h</span>[<span class="vr">r</span>]));<span class="vr">h</span>[<span class="vr">l</span>]&lt;<span class="vr">h</span>[<span class="vr">r</span>]?<span class="vr">l</span>++:<span class="vr">r</span>--;}
  <span class="kw">return</span> <span class="vr">mx</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:32,cat:'sliding',catN:'🪟 Sliding Window',diff:'medium',en:'Longest Repeating Character Replacement',ar:'أطول substring بعد تغيير k حروف',idea:'(حجم النافذة - أكثر حرف) > k → ضيّق.',ex:'"AABABBA",k=1 → 4 ✅',code:`<span class="kw">function</span> <span class="fn">characterReplacement</span>(<span class="vr">s</span>,<span class="vr">k</span>) {
  <span class="kw">const</span> <span class="vr">f</span>={};
  <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">mf</span>=<span class="num">0</span>,<span class="vr">res</span>=<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">s</span>.<span class="vr">length</span>;<span class="vr">r</span>++){
    <span class="vr">f</span>[<span class="vr">s</span>[<span class="vr">r</span>]]=(<span class="vr">f</span>[<span class="vr">s</span>[<span class="vr">r</span>]]||<span class="num">0</span>)+<span class="num">1</span>; <span class="vr">mf</span>=<span class="fn">Math.max</span>(<span class="vr">mf</span>,<span class="vr">f</span>[<span class="vr">s</span>[<span class="vr">r</span>]]);
    <span class="kw">if</span>(<span class="vr">r</span>-<span class="vr">l</span>+<span class="num">1</span>-<span class="vr">mf</span>&gt;<span class="vr">k</span>){<span class="vr">f</span>[<span class="vr">s</span>[<span class="vr">l</span>]]--;<span class="vr">l</span>++;}
    <span class="vr">res</span>=<span class="fn">Math.max</span>(<span class="vr">res</span>,<span class="vr">r</span>-<span class="vr">l</span>+<span class="num">1</span>);
  }
  <span class="kw">return</span> <span class="vr">res</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:33,cat:'stack',catN:'📚 Stack',diff:'medium',en:'Min Stack',ar:'كومة مع getMin بـ O(1)',idea:'كومتين: عادية وكومة للـ min الحالي في كل لحظة.',ex:'push(5,3,7) → getMin()=3 ✅',code:`<span class="kw">class</span> <span class="fn">MinStack</span> {
  <span class="fn">constructor</span>(){<span class="kw">this</span>.<span class="vr">s</span>=[];<span class="kw">this</span>.<span class="vr">m</span>=[];}
  <span class="fn">push</span>(<span class="vr">v</span>){
    <span class="kw">this</span>.<span class="vr">s</span>.<span class="fn">push</span>(<span class="vr">v</span>);
    <span class="kw">const</span> <span class="vr">c</span>=<span class="kw">this</span>.<span class="vr">m</span>.<span class="vr">length</span>?<span class="kw">this</span>.<span class="vr">m</span>[<span class="kw">this</span>.<span class="vr">m</span>.<span class="vr">length</span>-<span class="num">1</span>]:<span class="kw">Infinity</span>;
    <span class="kw">this</span>.<span class="vr">m</span>.<span class="fn">push</span>(<span class="fn">Math.min</span>(<span class="vr">v</span>,<span class="vr">c</span>));
  }
  <span class="fn">pop</span>(){<span class="kw">this</span>.<span class="vr">s</span>.<span class="fn">pop</span>();<span class="kw">this</span>.<span class="vr">m</span>.<span class="fn">pop</span>();}
  <span class="fn">top</span>(){<span class="kw">return</span> <span class="kw">this</span>.<span class="vr">s</span>[<span class="kw">this</span>.<span class="vr">s</span>.<span class="vr">length</span>-<span class="num">1</span>];}
  <span class="fn">getMin</span>(){<span class="kw">return</span> <span class="kw">this</span>.<span class="vr">m</span>[<span class="kw">this</span>.<span class="vr">m</span>.<span class="vr">length</span>-<span class="num">1</span>];}
}`,time:'O(1)',space:'O(n)'}

,{id:34,cat:'stack',catN:'📚 Stack',diff:'medium',en:'Evaluate Reverse Polish Notation',ar:'حساب التعبير البولندي',idea:'أرقام في كومة. عملية → خد آخر رقمين واحسب.',ex:'["2","1","+","3","*"] → 9 ✅',code:`<span class="kw">function</span> <span class="fn">evalRPN</span>(<span class="vr">t</span>) {
  <span class="kw">const</span> <span class="vr">s</span>=[];
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">t</span>){
    <span class="kw">if</span>('+-*/'.includes(<span class="vr">x</span>)){
