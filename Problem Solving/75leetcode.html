      <span class="kw">const</span> <span class="vr">b</span>=<span class="vr">s</span>.<span class="fn">pop</span>(),<span class="vr">a</span>=<span class="vr">s</span>.<span class="fn">pop</span>();
      <span class="vr">s</span>.<span class="fn">push</span>(<span class="vr">x</span>==='+' ?<span class="vr">a</span>+<span class="vr">b</span>:<span class="vr">x</span>==='-'?<span class="vr">a</span>-<span class="vr">b</span>:<span class="vr">x</span>==='*'?<span class="vr">a</span>*<span class="vr">b</span>:<span class="fn">Math.trunc</span>(<span class="vr">a</span>/<span class="vr">b</span>));
    } <span class="kw">else</span> <span class="vr">s</span>.<span class="fn">push</span>(+<span class="vr">x</span>);
  }
  <span class="kw">return</span> <span class="vr">s</span>[<span class="num">0</span>];
}`,time:'O(n)',space:'O(n)'}

,{id:35,cat:'stack',catN:'📚 Stack',diff:'hard',en:'Largest Rectangle in Histogram',ar:'أكبر مستطيل في الهيستوجرام',idea:'Monotonic Stack. لما شريط أقصر من رأس الـ stack احسب مساحته.',ex:'[2,1,5,6,2,3] → 10 ✅',code:`<span class="kw">function</span> <span class="fn">largestRectangleArea</span>(<span class="vr">h</span>) {
  <span class="vr">h</span>.<span class="fn">push</span>(<span class="num">0</span>);
  <span class="kw">const</span> <span class="vr">st</span>=[-<span class="num">1</span>]; <span class="kw">let</span> <span class="vr">mx</span>=<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">h</span>.<span class="vr">length</span>;<span class="vr">i</span>++){
    <span class="kw">while</span>(<span class="vr">st</span>[<span class="vr">st</span>.<span class="vr">length</span>-<span class="num">1</span>]!==-<span class="num">1</span>&&<span class="vr">h</span>[<span class="vr">i</span>]&lt;<span class="vr">h</span>[<span class="vr">st</span>[<span class="vr">st</span>.<span class="vr">length</span>-<span class="num">1</span>]]){
      <span class="kw">const</span> <span class="vr">ht</span>=<span class="vr">h</span>[<span class="vr">st</span>.<span class="fn">pop</span>()],<span class="vr">w</span>=<span class="vr">i</span>-<span class="vr">st</span>[<span class="vr">st</span>.<span class="vr">length</span>-<span class="num">1</span>]-<span class="num">1</span>;
      <span class="vr">mx</span>=<span class="fn">Math.max</span>(<span class="vr">mx</span>,<span class="vr">ht</span>*<span class="vr">w</span>);
    }
    <span class="vr">st</span>.<span class="fn">push</span>(<span class="vr">i</span>);
  }
  <span class="kw">return</span> <span class="vr">mx</span>;
}`,time:'O(n)',space:'O(n)'}

,{id:36,cat:'bsearch',catN:'🔍 Binary Search',diff:'medium',en:'Search in Rotated Sorted Array',ar:'ابحث في array مدوّرة',idea:'فيه جزء مرتب دايماً. شوف أي جزء مرتب وقرر فين الـ target.',ex:'[4,5,6,7,0,1,2],target=0 → 4 ✅',code:`<span class="kw">function</span> <span class="fn">searchRot</span>(<span class="vr">n</span>,<span class="vr">t</span>) {
  <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">r</span>=<span class="vr">n</span>.<span class="vr">length</span>-<span class="num">1</span>;
  <span class="kw">while</span>(<span class="vr">l</span>&lt;=<span class="vr">r</span>){
    <span class="kw">const</span> <span class="vr">m</span>=<span class="vr">l</span>+<span class="vr">r</span>&gt;&gt;<span class="num">1</span>;
    <span class="kw">if</span>(<span class="vr">n</span>[<span class="vr">m</span>]===<span class="vr">t</span>) <span class="kw">return</span> <span class="vr">m</span>;
    <span class="kw">if</span>(<span class="vr">n</span>[<span class="vr">l</span>]&lt;=<span class="vr">n</span>[<span class="vr">m</span>])
      <span class="vr">n</span>[<span class="vr">l</span>]&lt;=<span class="vr">t</span>&&<span class="vr">t</span>&lt;<span class="vr">n</span>[<span class="vr">m</span>]?<span class="vr">r</span>=<span class="vr">m</span>-<span class="num">1</span>:<span class="vr">l</span>=<span class="vr">m</span>+<span class="num">1</span>;
    <span class="kw">else</span>
      <span class="vr">n</span>[<span class="vr">m</span>]&lt;<span class="vr">t</span>&&<span class="vr">t</span>&lt;=<span class="vr">n</span>[<span class="vr">r</span>]?<span class="vr">l</span>=<span class="vr">m</span>+<span class="num">1</span>:<span class="vr">r</span>=<span class="vr">m</span>-<span class="num">1</span>;
  }
  <span class="kw">return</span> -<span class="num">1</span>;
}`,time:'O(log n)',space:'O(1)'}

,{id:37,cat:'bsearch',catN:'🔍 Binary Search',diff:'medium',en:'Find Min in Rotated Sorted Array',ar:'أصغر قيمة في array مدوّرة',idea:'لو nums[m]>nums[r] → الأصغر في اليمين.',ex:'[3,4,5,1,2] → 1 ✅',code:`<span class="kw">function</span> <span class="fn">findMin</span>(<span class="vr">n</span>) {
  <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">r</span>=<span class="vr">n</span>.<span class="vr">length</span>-<span class="num">1</span>;
  <span class="kw">while</span>(<span class="vr">l</span>&lt;<span class="vr">r</span>){<span class="kw">const</span> <span class="vr">m</span>=<span class="vr">l</span>+<span class="vr">r</span>&gt;&gt;<span class="num">1</span>;<span class="vr">n</span>[<span class="vr">m</span>]&gt;<span class="vr">n</span>[<span class="vr">r</span>]?<span class="vr">l</span>=<span class="vr">m</span>+<span class="num">1</span>:<span class="vr">r</span>=<span class="vr">m</span>;}
  <span class="kw">return</span> <span class="vr">n</span>[<span class="vr">l</span>];
}`,time:'O(log n)',space:'O(1)'}

,{id:38,cat:'linked',catN:'🔗 Linked List',diff:'easy',en:'Merge Two Sorted Lists',ar:'دمج قائمتين مرتبتين',idea:'قارن رأس الاتنين. خد الأصغر. dummy node.',ex:'1→3→5 و 2→4→6 → 1→2→3→4→5→6 ✅',code:`<span class="kw">function</span> <span class="fn">mergeLists</span>(<span class="vr">a</span>,<span class="vr">b</span>) {
  <span class="kw">const</span> <span class="vr">d</span>={<span class="vr">next</span>:<span class="kw">null</span>};<span class="kw">let</span> <span class="vr">c</span>=<span class="vr">d</span>;
  <span class="kw">while</span>(<span class="vr">a</span>&&<span class="vr">b</span>){
    <span class="kw">if</span>(<span class="vr">a</span>.<span class="vr">val</span>&lt;<span class="vr">b</span>.<span class="vr">val</span>){<span class="vr">c</span>.<span class="vr">next</span>=<span class="vr">a</span>;<span class="vr">a</span>=<span class="vr">a</span>.<span class="vr">next</span>;}
    <span class="kw">else</span>{<span class="vr">c</span>.<span class="vr">next</span>=<span class="vr">b</span>;<span class="vr">b</span>=<span class="vr">b</span>.<span class="vr">next</span>;}
    <span class="vr">c</span>=<span class="vr">c</span>.<span class="vr">next</span>;
  }
  <span class="vr">c</span>.<span class="vr">next</span>=<span class="vr">a</span>||<span class="vr">b</span>;<span class="kw">return</span> <span class="vr">d</span>.<span class="vr">next</span>;
}`,time:'O(n+m)',space:'O(1)'}

,{id:39,cat:'linked',catN:'🔗 Linked List',diff:'medium',en:'Remove Nth Node From End',ar:'شيل العنصر N من الآخر',idea:'Fast يتقدم N+1. بعدين كلاهما. لما Fast ينتهي Slow عند العقدة قبل المطلوبة.',ex:'1→2→3→4→5, n=2 → 1→2→3→5 ✅',code:`<span class="kw">function</span> <span class="fn">removeNth</span>(<span class="vr">h</span>,<span class="vr">n</span>) {
  <span class="kw">const</span> <span class="vr">d</span>={<span class="vr">next</span>:<span class="vr">h</span>};<span class="kw">let</span> <span class="vr">f</span>=<span class="vr">d</span>,<span class="vr">s</span>=<span class="vr">d</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;=<span class="vr">n</span>;<span class="vr">i</span>++) <span class="vr">f</span>=<span class="vr">f</span>.<span class="vr">next</span>;
  <span class="kw">while</span>(<span class="vr">f</span>){<span class="vr">f</span>=<span class="vr">f</span>.<span class="vr">next</span>;<span class="vr">s</span>=<span class="vr">s</span>.<span class="vr">next</span>;}
  <span class="vr">s</span>.<span class="vr">next</span>=<span class="vr">s</span>.<span class="vr">next</span>.<span class="vr">next</span>;<span class="kw">return</span> <span class="vr">d</span>.<span class="vr">next</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:40,cat:'linked',catN:'🔗 Linked List',diff:'hard',en:'Merge K Sorted Lists',ar:'دمج K قوائم مرتبة',idea:'Divide & Conquer. ادمج كل اتنين حتى تفضل قائمة واحدة.',ex:'[1→4],[1→3],[2→6] → 1→1→2→3→4→6 ✅',code:`<span class="kw">function</span> <span class="fn">mergeKLists</span>(<span class="vr">ls</span>) {
  <span class="kw">function</span> <span class="fn">m</span>(<span class="vr">a</span>,<span class="vr">b</span>){
    <span class="kw">if</span>(!<span class="vr">a</span>) <span class="kw">return</span> <span class="vr">b</span>;<span class="kw">if</span>(!<span class="vr">b</span>) <span class="kw">return</span> <span class="vr">a</span>;
    <span class="kw">if</span>(<span class="vr">a</span>.<span class="vr">val</span>&lt;<span class="vr">b</span>.<span class="vr">val</span>){<span class="vr">a</span>.<span class="vr">next</span>=<span class="fn">m</span>(<span class="vr">a</span>.<span class="vr">next</span>,<span class="vr">b</span>);<span class="kw">return</span> <span class="vr">a</span>;}
    <span class="vr">b</span>.<span class="vr">next</span>=<span class="fn">m</span>(<span class="vr">a</span>,<span class="vr">b</span>.<span class="vr">next</span>);<span class="kw">return</span> <span class="vr">b</span>;
  }
  <span class="kw">while</span>(<span class="vr">ls</span>.<span class="vr">length</span>&gt;<span class="num">1</span>){
    <span class="kw">const</span> <span class="vr">t</span>=[];
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">ls</span>.<span class="vr">length</span>;<span class="vr">i</span>+=<span class="num">2</span>) <span class="vr">t</span>.<span class="fn">push</span>(<span class="fn">m</span>(<span class="vr">ls</span>[<span class="vr">i</span>],<span class="vr">ls</span>[<span class="vr">i</span>+<span class="num">1</span>]||<span class="kw">null</span>));
    <span class="vr">ls</span>=<span class="vr">t</span>;
  }
  <span class="kw">return</span> <span class="vr">ls</span>[<span class="num">0</span>]||<span class="kw">null</span>;
}`,time:'O(n log k)',space:'O(1)'}

,{id:41,cat:'trees',catN:'🌳 Trees',diff:'easy',en:'Balanced Binary Tree',ar:'هل الشجرة متوازنة؟',idea:'DFS. لو فرق الأعماق > 1 → ارجع -1.',ex:'[3,9,20,null,null,15,7] → true ✅',code:`<span class="kw">function</span> <span class="fn">isBalanced</span>(<span class="vr">r</span>) {
  <span class="kw">function</span> <span class="fn">h</span>(<span class="vr">n</span>){
    <span class="kw">if</span>(!<span class="vr">n</span>) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">const</span> <span class="vr">l</span>=<span class="fn">h</span>(<span class="vr">n</span>.<span class="vr">left</span>),<span class="vr">r</span>=<span class="fn">h</span>(<span class="vr">n</span>.<span class="vr">right</span>);
    <span class="kw">if</span>(<span class="vr">l</span>===-<span class="num">1</span>||<span class="vr">r</span>===-<span class="num">1</span>||<span class="fn">Math.abs</span>(<span class="vr">l</span>-<span class="vr">r</span>)&gt;<span class="num">1</span>) <span class="kw">return</span> -<span class="num">1</span>;
    <span class="kw">return</span> <span class="num">1</span>+<span class="fn">Math.max</span>(<span class="vr">l</span>,<span class="vr">r</span>);
  }
  <span class="kw">return</span> <span class="fn">h</span>(<span class="vr">r</span>)!==-<span class="num">1</span>;
}`,time:'O(n)',space:'O(h)'}

,{id:42,cat:'trees',catN:'🌳 Trees',diff:'easy',en:'Diameter of Binary Tree',ar:'أطول مسار في الشجرة',idea:'لكل عقدة: المسار من خلالها = عمق يسار + عمق يمين.',ex:'[1,2,3,4,5] → 3 ✅',code:`<span class="kw">function</span> <span class="fn">diameter</span>(<span class="vr">r</span>) {
  <span class="kw">let</span> <span class="vr">mx</span>=<span class="num">0</span>;
  <span class="kw">function</span> <span class="fn">d</span>(<span class="vr">n</span>){
    <span class="kw">if</span>(!<span class="vr">n</span>) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">const</span> <span class="vr">l</span>=<span class="fn">d</span>(<span class="vr">n</span>.<span class="vr">left</span>),<span class="vr">r</span>=<span class="fn">d</span>(<span class="vr">n</span>.<span class="vr">right</span>);
    <span class="vr">mx</span>=<span class="fn">Math.max</span>(<span class="vr">mx</span>,<span class="vr">l</span>+<span class="vr">r</span>);
    <span class="kw">return</span> <span class="num">1</span>+<span class="fn">Math.max</span>(<span class="vr">l</span>,<span class="vr">r</span>);
  }
  <span class="fn">d</span>(<span class="vr">r</span>);<span class="kw">return</span> <span class="vr">mx</span>;
}`,time:'O(n)',space:'O(h)'}

,{id:43,cat:'trees',catN:'🌳 Trees',diff:'medium',en:'Validate BST',ar:'هل ده BST صحيح؟',idea:'لكل عقدة تكون بين lo وhi. اليسار: hi=الحالي. اليمين: lo=الحالي.',ex:'[5,1,4,null,null,3,6] → false ✅',code:`<span class="kw">function</span> <span class="fn">isValidBST</span>(<span class="vr">r</span>) {
  <span class="kw">function</span> <span class="fn">v</span>(<span class="vr">n</span>,<span class="vr">lo</span>,<span class="vr">hi</span>){
    <span class="kw">if</span>(!<span class="vr">n</span>) <span class="kw">return</span> <span class="kw">true</span>;
    <span class="kw">if</span>(<span class="vr">n</span>.<span class="vr">val</span>&lt;=<span class="vr">lo</span>||<span class="vr">n</span>.<span class="vr">val</span>&gt;=<span class="vr">hi</span>) <span class="kw">return</span> <span class="kw">false</span>;
    <span class="kw">return</span> <span class="fn">v</span>(<span class="vr">n</span>.<span class="vr">left</span>,<span class="vr">lo</span>,<span class="vr">n</span>.<span class="vr">val</span>)&&<span class="fn">v</span>(<span class="vr">n</span>.<span class="vr">right</span>,<span class="vr">n</span>.<span class="vr">val</span>,<span class="vr">hi</span>);
  }
  <span class="kw">return</span> <span class="fn">v</span>(<span class="vr">r</span>,-Infinity,Infinity);
}`,time:'O(n)',space:'O(h)'}

,{id:44,cat:'trees',catN:'🌳 Trees',diff:'medium',en:'Kth Smallest in BST',ar:'الـ K أصغر في BST',idea:'Inorder (يسار→حالي→يمين) يعطيك الأرقام مرتبة. خد الـ K منها.',ex:'[3,1,4,null,2],k=1 → 1 ✅',code:`<span class="kw">function</span> <span class="fn">kthSmallest</span>(<span class="vr">r</span>,<span class="vr">k</span>) {
  <span class="kw">let</span> <span class="vr">cnt</span>=<span class="num">0</span>,<span class="vr">ans</span>=<span class="num">0</span>;
  <span class="kw">function</span> <span class="fn">go</span>(<span class="vr">n</span>){
    <span class="kw">if</span>(!<span class="vr">n</span>||<span class="vr">cnt</span>===<span class="vr">k</span>) <span class="kw">return</span>;
    <span class="fn">go</span>(<span class="vr">n</span>.<span class="vr">left</span>);
    <span class="kw">if</span>(++<span class="vr">cnt</span>===<span class="vr">k</span>) <span class="vr">ans</span>=<span class="vr">n</span>.<span class="vr">val</span>;
    <span class="fn">go</span>(<span class="vr">n</span>.<span class="vr">right</span>);
  }
  <span class="fn">go</span>(<span class="vr">r</span>);<span class="kw">return</span> <span class="vr">ans</span>;
}`,time:'O(n)',space:'O(h)'}

,{id:45,cat:'trees',catN:'🌳 Trees',diff:'medium',en:'LCA of BST',ar:'أقرب جد مشترك في BST',idea:'لو القيمتين على جانبين مختلفين → أنت عند الجد.',ex:'[6,2,8],p=2,q=8 → 6 ✅',code:`<span class="kw">function</span> <span class="fn">lcaBST</span>(<span class="vr">r</span>,<span class="vr">p</span>,<span class="vr">q</span>) {
  <span class="kw">let</span> <span class="vr">n</span>=<span class="vr">r</span>;
  <span class="kw">while</span>(<span class="vr">n</span>){
    <span class="kw">if</span>(<span class="vr">p</span>.<span class="vr">val</span>&lt;<span class="vr">n</span>.<span class="vr">val</span>&&<span class="vr">q</span>.<span class="vr">val</span>&lt;<span class="vr">n</span>.<span class="vr">val</span>) <span class="vr">n</span>=<span class="vr">n</span>.<span class="vr">left</span>;
    <span class="kw">else if</span>(<span class="vr">p</span>.<span class="vr">val</span>&gt;<span class="vr">n</span>.<span class="vr">val</span>&&<span class="vr">q</span>.<span class="vr">val</span>&gt;<span class="vr">n</span>.<span class="vr">val</span>) <span class="vr">n</span>=<span class="vr">n</span>.<span class="vr">right</span>;
    <span class="kw">else</span> <span class="kw">return</span> <span class="vr">n</span>;
  }
}`,time:'O(log n)',space:'O(1)'}

,{id:46,cat:'trees',catN:'🌳 Trees',diff:'medium',en:'Right Side View',ar:'الشجرة من الجانب الأيمن',idea:'BFS مستوى مستوى. آخر عقدة في كل مستوى هي اللي بنشوفها.',ex:'[1,2,3,null,5,null,4] → [1,3,4] ✅',code:`<span class="kw">function</span> <span class="fn">rightView</span>(<span class="vr">r</span>) {
  <span class="kw">if</span>(!<span class="vr">r</span>) <span class="kw">return</span> [];
  <span class="kw">const</span> <span class="vr">res</span>=[],<span class="vr">q</span>=[<span class="vr">r</span>];
  <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){
    <span class="kw">const</span> <span class="vr">sz</span>=<span class="vr">q</span>.<span class="vr">length</span>;
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">sz</span>;<span class="vr">i</span>++){
      <span class="kw">const</span> <span class="vr">n</span>=<span class="vr">q</span>.<span class="fn">shift</span>();
      <span class="kw">if</span>(<span class="vr">i</span>===<span class="vr">sz</span>-<span class="num">1</span>) <span class="vr">res</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">val</span>);
      <span class="kw">if</span>(<span class="vr">n</span>.<span class="vr">left</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">left</span>);
      <span class="kw">if</span>(<span class="vr">n</span>.<span class="vr">right</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">right</span>);
    }
  }
  <span class="kw">return</span> <span class="vr">res</span>;
}`,time:'O(n)',space:'O(w)'}

,{id:47,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Clone Graph',ar:'نسخ الجراف',idea:'DFS + Map. نعمل نسخة لكل عقدة ونحفظها قبل الـ recursion.',ex:'1-2-3-4-1 → نسخة جديدة ✅',code:`<span class="kw">function</span> <span class="fn">cloneGraph</span>(<span class="vr">n</span>) {
  <span class="kw">const</span> <span class="vr">mp</span>=<span class="kw">new</span> <span class="fn">Map</span>();
  <span class="kw">function</span> <span class="fn">d</span>(<span class="vr">x</span>){
    <span class="kw">if</span>(!<span class="vr">x</span>) <span class="kw">return</span> <span class="kw">null</span>;
    <span class="kw">if</span>(<span class="vr">mp</span>.<span class="fn">has</span>(<span class="vr">x</span>)) <span class="kw">return</span> <span class="vr">mp</span>.<span class="fn">get</span>(<span class="vr">x</span>);
    <span class="kw">const</span> <span class="vr">c</span>={<span class="vr">val</span>:<span class="vr">x</span>.<span class="vr">val</span>,<span class="vr">neighbors</span>:[]};
    <span class="vr">mp</span>.<span class="fn">set</span>(<span class="vr">x</span>,<span class="vr">c</span>);
    <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">nb</span> <span class="kw">of</span> <span class="vr">x</span>.<span class="vr">neighbors</span>) <span class="vr">c</span>.<span class="vr">neighbors</span>.<span class="fn">push</span>(<span class="fn">d</span>(<span class="vr">nb</span>));
    <span class="kw">return</span> <span class="vr">c</span>;
  }
  <span class="kw">return</span> <span class="fn">d</span>(<span class="vr">n</span>);
}`,time:'O(V+E)',space:'O(V)'}

,{id:48,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Rotting Oranges',ar:'البرتقال الفاسد',idea:'Multi-source BFS. كل الفاسدة تدخل Queue معاً. كل مستوى = دقيقة.',ex:'[[2,1,1],[1,1,0],[0,1,1]] → 4 ✅',code:`<span class="kw">function</span> <span class="fn">rotOranges</span>(<span class="vr">g</span>) {
  <span class="kw">const</span> <span class="vr">R</span>=<span class="vr">g</span>.<span class="vr">length</span>,<span class="vr">C</span>=<span class="vr">g</span>[<span class="num">0</span>].<span class="vr">length</span>;
  <span class="kw">let</span> <span class="vr">fr</span>=<span class="num">0</span>,<span class="vr">mn</span>=<span class="num">0</span>;
  <span class="kw">const</span> <span class="vr">q</span>=[];
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">R</span>;<span class="vr">r</span>++) <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="num">0</span>;<span class="vr">c</span>&lt;<span class="vr">C</span>;<span class="vr">c</span>++){
    <span class="kw">if</span>(<span class="vr">g</span>[<span class="vr">r</span>][<span class="vr">c</span>]===<span class="num">2</span>) <span class="vr">q</span>.<span class="fn">push</span>([<span class="vr">r</span>,<span class="vr">c</span>]);
    <span class="kw">if</span>(<span class="vr">g</span>[<span class="vr">r</span>][<span class="vr">c</span>]===<span class="num">1</span>) <span class="vr">fr</span>++;
  }
  <span class="kw">const</span> <span class="vr">D</span>=[[<span class="num">1</span>,<span class="num">0</span>],[-<span class="num">1</span>,<span class="num">0</span>],[<span class="num">0</span>,<span class="num">1</span>],[<span class="num">0</span>,-<span class="num">1</span>]];
  <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>&&<span class="vr">fr</span>&gt;<span class="num">0</span>){
    <span class="vr">mn</span>++;<span class="kw">const</span> <span class="vr">sz</span>=<span class="vr">q</span>.<span class="vr">length</span>;
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">sz</span>;<span class="vr">i</span>++){
      <span class="kw">const</span>[<span class="vr">r</span>,<span class="vr">c</span>]=<span class="vr">q</span>.<span class="fn">shift</span>();
      <span class="kw">for</span>(<span class="kw">const</span>[<span class="vr">dr</span>,<span class="vr">dc</span>] <span class="kw">of</span> <span class="vr">D</span>){
        <span class="kw">const</span> <span class="vr">nr</span>=<span class="vr">r</span>+<span class="vr">dr</span>,<span class="vr">nc</span>=<span class="vr">c</span>+<span class="vr">dc</span>;
        <span class="kw">if</span>(<span class="vr">nr</span>&gt;=<span class="num">0</span>&&<span class="vr">nr</span>&lt;<span class="vr">R</span>&&<span class="vr">nc</span>&gt;=<span class="num">0</span>&&<span class="vr">nc</span>&lt;<span class="vr">C</span>&&<span class="vr">g</span>[<span class="vr">nr</span>][<span class="vr">nc</span>]===<span class="num">1</span>)
          {<span class="vr">g</span>[<span class="vr">nr</span>][<span class="vr">nc</span>]=<span class="num">2</span>;<span class="vr">fr</span>--;<span class="vr">q</span>.<span class="fn">push</span>([<span class="vr">nr</span>,<span class="vr">nc</span>]);}
      }
    }
  }
  <span class="kw">return</span> <span class="vr">fr</span>===<span class="num">0</span>?<span class="vr">mn</span>:-<span class="num">1</span>;
}`,time:'O(n×m)',space:'O(n×m)'}

,{id:49,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Maximum Product Subarray',ar:'أعظم حاصل ضرب لجزء متتالي',idea:'بنحفظ أكبر وأصغر. الأصغر مهم لأن سالب × سالب = موجب.',ex:'[2,3,-2,4] → 6 ✅',code:`<span class="kw">function</span> <span class="fn">maxProduct</span>(<span class="vr">n</span>) {
  <span class="kw">let</span> <span class="vr">mx</span>=<span class="vr">n</span>[<span class="num">0</span>],<span class="vr">mn</span>=<span class="vr">n</span>[<span class="num">0</span>],<span class="vr">r</span>=<span class="vr">n</span>[<span class="num">0</span>];
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;<span class="vr">i</span>&lt;<span class="vr">n</span>.<span class="vr">length</span>;<span class="vr">i</span>++){
    <span class="kw">const</span> <span class="vr">v</span>=<span class="vr">n</span>[<span class="vr">i</span>];
    [<span class="vr">mx</span>,<span class="vr">mn</span>]=[<span class="fn">Math.max</span>(<span class="vr">v</span>,<span class="vr">mx</span>*<span class="vr">v</span>,<span class="vr">mn</span>*<span class="vr">v</span>),<span class="fn">Math.min</span>(<span class="vr">v</span>,<span class="vr">mx</span>*<span class="vr">v</span>,<span class="vr">mn</span>*<span class="vr">v</span>)];
    <span class="vr">r</span>=<span class="fn">Math.max</span>(<span class="vr">r</span>,<span class="vr">mx</span>);
  }
  <span class="kw">return</span> <span class="vr">r</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:50,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Longest Palindromic Substring',ar:'أطول جزء يقرأ نفسه من الاتجاهين',idea:'لكل مركز نتوسع للخارج. فردي (حرف) وزوجي (حرفين).',ex:'"babad" → "bab" ✅',code:`<span class="kw">function</span> <span class="fn">longestPalin</span>(<span class="vr">s</span>) {
  <span class="kw">let</span> <span class="vr">r</span>='';
  <span class="kw">function</span> <span class="fn">ex</span>(<span class="vr">l</span>,<span class="vr">ri</span>){
    <span class="kw">while</span>(<span class="vr">l</span>&gt;=<span class="num">0</span>&&<span class="vr">ri</span>&lt;<span class="vr">s</span>.<span class="vr">length</span>&&<span class="vr">s</span>[<span class="vr">l</span>]===<span class="vr">s</span>[<span class="vr">ri</span>]){<span class="vr">l</span>--;<span class="vr">ri</span>++;}
    <span class="kw">return</span> <span class="vr">s</span>.<span class="fn">slice</span>(<span class="vr">l</span>+<span class="num">1</span>,<span class="vr">ri</span>);
  }
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">s</span>.<span class="vr">length</span>;<span class="vr">i</span>++){
    <span class="kw">const</span> <span class="vr">a</span>=<span class="fn">ex</span>(<span class="vr">i</span>,<span class="vr">i</span>),<span class="vr">b</span>=<span class="fn">ex</span>(<span class="vr">i</span>,<span class="vr">i</span>+<span class="num">1</span>);
    <span class="kw">if</span>(<span class="vr">a</span>.<span class="vr">length</span>&gt;<span class="vr">r</span>.<span class="vr">length</span>) <span class="vr">r</span>=<span class="vr">a</span>;
    <span class="kw">if</span>(<span class="vr">b</span>.<span class="vr">length</span>&gt;<span class="vr">r</span>.<span class="vr">length</span>) <span class="vr">r</span>=<span class="vr">b</span>;
  }
  <span class="kw">return</span> <span class="vr">r</span>;
}`,time:'O(n²)',space:'O(1)'}

,{id:51,cat:'dp',catN:'🧠 DP',diff:'medium',en:'House Robber II',ar:'حرامي البيوت - شارع دائري',idea:'حل مرتين: بدون الأول وبدون الآخر. خد الأعلى.',ex:'[2,3,2] → 3 ✅',code:`<span class="kw">function</span> <span class="fn">rob2</span>(<span class="vr">n</span>) {
  <span class="kw">if</span>(<span class="vr">n</span>.<span class="vr">length</span>===<span class="num">1</span>) <span class="kw">return</span> <span class="vr">n</span>[<span class="num">0</span>];
  <span class="kw">function</span> <span class="fn">r</span>(<span class="vr">a</span>){<span class="kw">let</span> <span class="vr">p</span>=<span class="num">0</span>,<span class="vr">c</span>=<span class="num">0</span>;<span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">a</span>)[<span class="vr">p</span>,<span class="vr">c</span>]=[<span class="vr">c</span>,<span class="fn">Math.max</span>(<span class="vr">c</span>,<span class="vr">p</span>+<span class="vr">x</span>)];<span class="kw">return</span> <span class="vr">c</span>;}
  <span class="kw">return</span> <span class="fn">Math.max</span>(<span class="fn">r</span>(<span class="vr">n</span>.<span class="fn">slice</span>(<span class="num">1</span>)),<span class="fn">r</span>(<span class="vr">n</span>.<span class="fn">slice</span>(<span class="num">0</span>,-<span class="num">1</span>)));
}`,time:'O(n)',space:'O(1)'}

,{id:52,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Decode Ways',ar:'كام طريقة لفك الترميز؟',idea:'رقم واحد (لو مش 0) أو رقمين (10-26).',ex:'"226" → 3 ✅',code:`<span class="kw">function</span> <span class="fn">numDecodings</span>(<span class="vr">s</span>) {
  <span class="kw">let</span> <span class="vr">p2</span>=<span class="num">1</span>,<span class="vr">p1</span>=<span class="vr">s</span>[<span class="num">0</span>]!=='0'?<span class="num">1</span>:<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">2</span>;<span class="vr">i</span>&lt;=<span class="vr">s</span>.<span class="vr">length</span>;<span class="vr">i</span>++){
    <span class="kw">let</span> <span class="vr">c</span>=<span class="num">0</span>;
    <span class="kw">if</span>(<span class="vr">s</span>[<span class="vr">i</span>-<span class="num">1</span>]!=='0') <span class="vr">c</span>+=<span class="vr">p1</span>;
    <span class="kw">const</span> <span class="vr">t</span>=+<span class="vr">s</span>.<span class="fn">slice</span>(<span class="vr">i</span>-<span class="num">2</span>,<span class="vr">i</span>);
    <span class="kw">if</span>(<span class="vr">t</span>&gt;=<span class="num">10</span>&&<span class="vr">t</span>&lt;=<span class="num">26</span>) <span class="vr">c</span>+=<span class="vr">p2</span>;
    [<span class="vr">p2</span>,<span class="vr">p1</span>]=[<span class="vr">p1</span>,<span class="vr">c</span>];
  }
  <span class="kw">return</span> <span class="vr">p1</span>;
}`,time:'O(n)',space:'O(1)'}

,{id:53,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Word Break',ar:'هل تقدر تقسم الكلمة؟',idea:'dp[i] = هل s[0..i] قابل للتقسيم؟',ex:'"leetcode",["leet","code"] → true ✅',code:`<span class="kw">function</span> <span class="fn">wordBreak</span>(<span class="vr">s</span>,<span class="vr">d</span>) {
  <span class="kw">const</span> <span class="vr">ws</span>=<span class="kw">new</span> <span class="fn">Set</span>(<span class="vr">d</span>);
  <span class="kw">const</span> <span class="vr">dp</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">s</span>.<span class="vr">length</span>+<span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">false</span>);
  <span class="vr">dp</span>[<span class="num">0</span>]=<span class="kw">true</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;<span class="vr">i</span>&lt;=<span class="vr">s</span>.<span class="vr">length</span>;<span class="vr">i</span>++)
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="num">0</span>;<span class="vr">j</span>&lt;<span class="vr">i</span>;<span class="vr">j</span>++)
      <span class="kw">if</span>(<span class="vr">dp</span>[<span class="vr">j</span>]&&<span class="vr">ws</span>.<span class="fn">has</span>(<span class="vr">s</span>.<span class="fn">slice</span>(<span class="vr">j</span>,<span class="vr">i</span>))){<span class="vr">dp</span>[<span class="vr">i</span>]=<span class="kw">true</span>;<span class="kw">break</span>;}
  <span class="kw">return</span> <span class="vr">dp</span>[<span class="vr">s</span>.<span class="vr">length</span>];
}`,time:'O(n²)',space:'O(n)'}

,{id:54,cat:'dp',catN:'🧠 DP',diff:'hard',en:'Partition Equal Subset Sum',ar:'تقسيم لنصفين متساويين',idea:'0/1 Knapsack. هل فيه subset مجموعه = totalSum/2؟',ex:'[1,5,11,5] → true ✅',code:`<span class="kw">function</span> <span class="fn">canPartition</span>(<span class="vr">n</span>) {
  <span class="kw">const</span> <span class="vr">s</span>=<span class="vr">n</span>.<span class="fn">reduce</span>((<span class="vr">a</span>,<span class="vr">b</span>)=><span class="vr">a</span>+<span class="vr">b</span>,<span class="num">0</span>);
  <span class="kw">if</span>(<span class="vr">s</span>%<span class="num">2</span>) <span class="kw">return</span> <span class="kw">false</span>;
  <span class="kw">const</span> <span class="vr">t</span>=<span class="vr">s</span>/<span class="num">2</span>;
  <span class="kw">const</span> <span class="vr">dp</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">t</span>+<span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">false</span>);
  <span class="vr">dp</span>[<span class="num">0</span>]=<span class="kw">true</span>;
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">n</span>)
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="vr">t</span>;<span class="vr">j</span>&gt;=<span class="vr">x</span>;<span class="vr">j</span>--) <span class="vr">dp</span>[<span class="vr">j</span>]|=<span class="vr">dp</span>[<span class="vr">j</span>-<span class="vr">x</span>];
  <span class="kw">return</span> <span class="vr">dp</span>[<span class="vr">t</span>];
}`,time:'O(n×t)',space:'O(t)'}

,{id:55,cat:'intervals',catN:'📅 Intervals',diff:'medium',en:'Insert Interval',ar:'أضيف فترة جديدة',idea:'3 مراحل: قبل + ادمج المتداخلة + بعد.',ex:'[[1,3],[6,9]],insert=[2,5] → [[1,5],[6,9]] ✅',code:`<span class="kw">function</span> <span class="fn">insertInterval</span>(<span class="vr">iv</span>,<span class="vr">nw</span>) {
  <span class="kw">const</span> <span class="vr">r</span>=[]; <span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;
  <span class="kw">while</span>(<span class="vr">i</span>&lt;<span class="vr">iv</span>.<span class="vr">length</span>&&<span class="vr">iv</span>[<span class="vr">i</span>][<span class="num">1</span>]&lt;<span class="vr">nw</span>[<span class="num">0</span>]) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">iv</span>[<span class="vr">i</span>++]);
  <span class="kw">while</span>(<span class="vr">i</span>&lt;<span class="vr">iv</span>.<span class="vr">length</span>&&<span class="vr">iv</span>[<span class="vr">i</span>][<span class="num">0</span>]&lt;=<span class="vr">nw</span>[<span class="num">1</span>]){
    <span class="vr">nw</span>[<span class="num">0</span>]=<span class="fn">Math.min</span>(<span class="vr">nw</span>[<span class="num">0</span>],<span class="vr">iv</span>[<span class="vr">i</span>][<span class="num">0</span>]);
    <span class="vr">nw</span>[<span class="num">1</span>]=<span class="fn">Math.max</span>(<span class="vr">nw</span>[<span class="num">1</span>],<span class="vr">iv</span>[<span class="vr">i</span>++][<span class="num">1</span>]);
  }
  <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">nw</span>);
  <span class="kw">while</span>(<span class="vr">i</span>&lt;<span class="vr">iv</span>.<span class="vr">length</span>) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">iv</span>[<span class="vr">i</span>++]);
  <span class="kw">return</span> <span class="vr">r</span>;
}`,time:'O(n)',space:'O(n)'}

,{id:56,cat:'intervals',catN:'📅 Intervals',diff:'medium',en:'Non-Overlapping Intervals',ar:'أقل فترات تشيلها لمنع التداخل',idea:'Greedy. رتّب بالنهاية. خد أكتر فترات بدون تداخل.',ex:'[[1,2],[2,3],[3,4],[1,3]] → 1 ✅',code:`<span class="kw">function</span> <span class="fn">eraseOverlap</span>(<span class="vr">iv</span>) {
  <span class="vr">iv</span>.<span class="fn">sort</span>((<span class="vr">a</span>,<span class="vr">b</span>)=><span class="vr">a</span>[<span class="num">1</span>]-<span class="vr">b</span>[<span class="num">1</span>]);
  <span class="kw">let</span> <span class="vr">e</span>=-Infinity,<span class="vr">rm</span>=<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">const</span>[<span class="vr">s</span>,<span class="vr">en</span>] <span class="kw">of</span> <span class="vr">iv</span>)
    <span class="kw">if</span>(<span class="vr">s</span>&gt;=<span class="vr">e</span>) <span class="vr">e</span>=<span class="vr">en</span>; <span class="kw">else</span> <span class="vr">rm</span>++;
  <span class="kw">return</span> <span class="vr">rm</span>;
}`,time:'O(n log n)',space:'O(1)'}

,{id:57,cat:'trie',catN:'🔤 Trie',diff:'medium',en:'Add and Search Words',ar:'قاموس مع wildcard',idea:'Trie عادي. عند "." نجرب كل الأولاد بـ DFS.',ex:'add("bad","mad") → search(".ad")=true ✅',code:`<span class="kw">class</span> <span class="fn">WordDictionary</span> {
  <span class="fn">constructor</span>(){<span class="kw">this</span>.<span class="vr">c</span>={};<span class="kw">this</span>.<span class="vr">e</span>=<span class="kw">false</span>;}
  <span class="fn">addWord</span>(<span class="vr">w</span>){
    <span class="kw">let</span> <span class="vr">n</span>=<span class="kw">this</span>;
    <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">w</span>){<span class="kw">if</span>(!<span class="vr">n</span>.<span class="vr">c</span>[<span class="vr">c</span>])<span class="vr">n</span>.<span class="vr">c</span>[<span class="vr">c</span>]=<span class="kw">new</span> <span class="fn">WordDictionary</span>();<span class="vr">n</span>=<span class="vr">n</span>.<span class="vr">c</span>[<span class="vr">c</span>];}
    <span class="vr">n</span>.<span class="vr">e</span>=<span class="kw">true</span>;
  }
  <span class="fn">search</span>(<span class="vr">w</span>){
    <span class="kw">function</span> <span class="fn">d</span>(<span class="vr">i</span>,<span class="vr">nd</span>){
      <span class="kw">if</span>(<span class="vr">i</span>===<span class="vr">w</span>.<span class="vr">length</span>) <span class="kw">return</span> <span class="vr">nd</span>.<span class="vr">e</span>;
      <span class="kw">if</span>(<span class="vr">w</span>[<span class="vr">i</span>]==='.')<span class="kw">return</span> Object.values(<span class="vr">nd</span>.<span class="vr">c</span>).<span class="fn">some</span>(<span class="vr">x</span>=><span class="fn">d</span>(<span class="vr">i</span>+<span class="num">1</span>,<span class="vr">x</span>));
      <span class="kw">return</span> <span class="vr">nd</span>.<span class="vr">c</span>[<span class="vr">w</span>[<span class="vr">i</span>]]?<span class="fn">d</span>(<span class="vr">i</span>+<span class="num">1</span>,<span class="vr">nd</span>.<span class="vr">c</span>[<span class="vr">w</span>[<span class="vr">i</span>]]):<span class="kw">false</span>;
    }
    <span class="kw">return</span> <span class="fn">d</span>(<span class="num">0</span>,<span class="kw">this</span>);
  }
}`,time:'O(m) add, O(26^m) search',space:'O(nm)'}

,{id:58,cat:'heap',catN:'⛏️ Heap',diff:'hard',en:'Find Median from Data Stream',ar:'الوسيط من بيانات متدفقة',idea:'Binary insertion للإدراج المرتب. الوسيط = العنصر الأوسط.',ex:'add(1,2,3) → median=2 ✅',code:`<span class="kw">class</span> <span class="fn">MedianFinder</span> {
  <span class="fn">constructor</span>(){<span class="kw">this</span>.<span class="vr">d</span>=[];}
  <span class="fn">addNum</span>(<span class="vr">n</span>){
    <span class="kw">let</span> <span class="vr">l</span>=<span class="num">0</span>,<span class="vr">r</span>=<span class="kw">this</span>.<span class="vr">d</span>.<span class="vr">length</span>;
    <span class="kw">while</span>(<span class="vr">l</span>&lt;<span class="vr">r</span>){<span class="kw">const</span> <span class="vr">m</span>=<span class="vr">l</span>+<span class="vr">r</span>&gt;&gt;<span class="num">1</span>;<span class="kw">this</span>.<span class="vr">d</span>[<span class="vr">m</span>]&lt;<span class="vr">n</span>?<span class="vr">l</span>=<span class="vr">m</span>+<span class="num">1</span>:<span class="vr">r</span>=<span class="vr">m</span>;}
    <span class="kw">this</span>.<span class="vr">d</span>.<span class="fn">splice</span>(<span class="vr">l</span>,<span class="num">0</span>,<span class="vr">n</span>);
  }
  <span class="fn">findMedian</span>(){
    <span class="kw">const</span> <span class="vr">n</span>=<span class="kw">this</span>.<span class="vr">d</span>.<span class="vr">length</span>,<span class="vr">m</span>=<span class="vr">n</span>&gt;&gt;<span class="num">1</span>;
    <span class="kw">return</span> <span class="vr">n</span>%<span class="num">2</span>?<span class="kw">this</span>.<span class="vr">d</span>[<span class="vr">m</span>]:(<span class="kw">this</span>.<span class="vr">d</span>[<span class="vr">m</span>-<span class="num">1</span>]+<span class="kw">this</span>.<span class="vr">d</span>[<span class="vr">m</span>])/<span class="num">2</span>;
  }
}`,time:'O(n) add',space:'O(n)'}

,{id:59,cat:'heap',catN:'⛏️ Heap',diff:'medium',en:'Task Scheduler',ar:'جدولة المهام مع راحة',idea:'المهمة الأكتر تكراراً بتحدد الوقت الأدنى.',ex:'["A","A","A","B","B","B"],n=2 → 8 ✅',code:`<span class="kw">function</span> <span class="fn">leastInterval</span>(<span class="vr">t</span>,<span class="vr">n</span>) {
  <span class="kw">const</span> <span class="vr">f</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="num">26</span>).<span class="fn">fill</span>(<span class="num">0</span>);
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">t</span>) <span class="vr">f</span>[<span class="vr">x</span>.<span class="fn">charCodeAt</span>(<span class="num">0</span>)-<span class="num">65</span>]++;
  <span class="kw">const</span> <span class="vr">mf</span>=<span class="fn">Math.max</span>(...<span class="vr">f</span>),<span class="vr">mc</span>=<span class="vr">f</span>.<span class="fn">filter</span>(<span class="vr">x</span>=><span class="vr">x</span>===<span class="vr">mf</span>).<span class="vr">length</span>;
  <span class="kw">return</span> <span class="fn">Math.max</span>(<span class="vr">t</span>.<span class="vr">length</span>,(<span class="vr">mf</span>-<span class="num">1</span>)*(<span class="vr">n</span>+<span class="num">1</span>)+<span class="vr">mc</span>);
}`,time:'O(n)',space:'O(1)'}

,{id:60,cat:'bits',catN:'🔢 Bits',diff:'easy',en:'Counting Bits',ar:'عد الـ 1 لكل رقم من 0 لـ n',idea:'dp[i] = dp[i>>1] + (i&1). نص الرقم + آخر bit.',ex:'n=5 → [0,1,1,2,1,2] ✅',code:`<span class="kw">function</span> <span class="fn">countBits</span>(<span class="vr">n</span>) {
  <span class="kw">const</span> <span class="vr">dp</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>+<span class="num">1</span>).<span class="fn">fill</span>(<span class="num">0</span>);
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;<span class="vr">i</span>&lt;=<span class="vr">n</span>;<span class="vr">i</span>++) <span class="vr">dp</span>[<span class="vr">i</span>]=<span class="vr">dp</span>[<span class="vr">i</span>&gt;&gt;<span class="num">1</span>]+(<span class="vr">i</span>&<span class="num">1</span>);
  <span class="kw">return</span> <span class="vr">dp</span>;
}`,time:'O(n)',space:'O(n)'}

,{id:61,cat:'bits',catN:'🔢 Bits',diff:'easy',en:'Reverse Bits',ar:'عكس الـ bits في 32-bit integer',idea:'ناخد آخر bit من n ونحطه في أول مكان في النتيجة. نكرر 32 مرة.',ex:'00000010... → 00111001... ✅',code:`<span class="kw">function</span> <span class="fn">reverseBits</span>(<span class="vr">n</span>) {
  <span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="num">32</span>;<span class="vr">i</span>++){<span class="vr">r</span>=<span class="vr">r</span>*<span class="num">2</span>+(<span class="vr">n</span>&<span class="num">1</span>);<span class="vr">n</span>&gt;&gt;&gt;=<span class="num">1</span>;}
  <span class="kw">return</span> <span class="vr">r</span>&gt;&gt;&gt;<span class="num">0</span>;
}`,time:'O(1)',space:'O(1)'}

,{id:62,cat:'bits',catN:'🔢 Bits',diff:'medium',en:'Sum of Two Integers Without +',ar:'جمع بدون علامة +',idea:'XOR = جمع بدون carry. AND+shift = الـ carry. نكرر لحد ما carry=0.',ex:'2+3: XOR=1,carry=4 → XOR=5 ✅',code:`<span class="kw">function</span> <span class="fn">getSum</span>(<span class="vr">a</span>,<span class="vr">b</span>) {
  <span class="kw">while</span>(<span class="vr">b</span>){
    <span class="kw">const</span> <span class="vr">c</span>=(<span class="vr">a</span>&<span class="vr">b</span>)&lt;&lt;<span class="num">1</span>;
    <span class="vr">a</span>=<span class="vr">a</span>^<span class="vr">b</span>;
    <span class="vr">b</span>=<span class="vr">c</span>;
  }
  <span class="kw">return</span> <span class="vr">a</span>;
}`,time:'O(1)',space:'O(1)'}

,{id:63,cat:'arrays',catN:'🔢 Math',diff:'medium',en:'Rotate Image',ar:'تدوير المصفوفة 90 درجة',idea:'Transpose ثم اعكس كل صف.',ex:'[[1,2,3],[4,5,6],[7,8,9]] → [[7,4,1],[8,5,2],[9,6,3]] ✅',code:`<span class="kw">function</span> <span class="fn">rotate</span>(<span class="vr">m</span>) {
  <span class="kw">const</span> <span class="vr">n</span>=<span class="vr">m</span>.<span class="vr">length</span>;
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">n</span>;<span class="vr">i</span>++)
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="vr">i</span>+<span class="num">1</span>;<span class="vr">j</span>&lt;<span class="vr">n</span>;<span class="vr">j</span>++)
      [<span class="vr">m</span>[<span class="vr">i</span>][<span class="vr">j</span>],<span class="vr">m</span>[<span class="vr">j</span>][<span class="vr">i</span>]]=[<span class="vr">m</span>[<span class="vr">j</span>][<span class="vr">i</span>],<span class="vr">m</span>[<span class="vr">i</span>][<span class="vr">j</span>]];
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">n</span>;<span class="vr">i</span>++) <span class="vr">m</span>[<span class="vr">i</span>].<span class="fn">reverse</span>();
}`,time:'O(n²)',space:'O(1)'}

,{id:64,cat:'arrays',catN:'🔢 Math',diff:'medium',en:'Spiral Matrix',ar:'قراءة المصفوفة بشكل حلزوني',idea:'نقرأ: يمين→تحت→شمال→فوق. بنضيق الحدود كل مرة.',ex:'[[1,2,3],[4,5,6],[7,8,9]] → [1,2,3,6,9,8,7,4,5] ✅',code:`<span class="kw">function</span> <span class="fn">spiralOrder</span>(<span class="vr">m</span>) {
  <span class="kw">const</span> <span class="vr">r</span>=[];
  <span class="kw">let</span> <span class="vr">t</span>=<span class="num">0</span>,<span class="vr">b</span>=<span class="vr">m</span>.<span class="vr">length</span>-<span class="num">1</span>,<span class="vr">l</span>=<span class="num">0</span>,<span class="vr">ri</span>=<span class="vr">m</span>[<span class="num">0</span>].<span class="vr">length</span>-<span class="num">1</span>;
  <span class="kw">while</span>(<span class="vr">t</span>&lt;=<span class="vr">b</span>&&<span class="vr">l</span>&lt;=<span class="vr">ri</span>){
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="vr">l</span>;<span class="vr">c</span>&lt;=<span class="vr">ri</span>;<span class="vr">c</span>++) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">m</span>[<span class="vr">t</span>][<span class="vr">c</span>]); <span class="vr">t</span>++;
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">row</span>=<span class="vr">t</span>;<span class="vr">row</span>&lt;=<span class="vr">b</span>;<span class="vr">row</span>++) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">m</span>[<span class="vr">row</span>][<span class="vr">ri</span>]); <span class="vr">ri</span>--;
    <span class="kw">if</span>(<span class="vr">t</span>&lt;=<span class="vr">b</span>){<span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="vr">ri</span>;<span class="vr">c</span>&gt;=<span class="vr">l</span>;<span class="vr">c</span>--) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">m</span>[<span class="vr">b</span>][<span class="vr">c</span>]); <span class="vr">b</span>--;}
    <span class="kw">if</span>(<span class="vr">l</span>&lt;=<span class="vr">ri</span>){<span class="kw">for</span>(<span class="kw">let</span> <span class="vr">row</span>=<span class="vr">b</span>;<span class="vr">row</span>&gt;=<span class="vr">t</span>;<span class="vr">row</span>--) <span class="vr">r</span>.<span class="fn">push</span>(<span class="vr">m</span>[<span class="vr">row</span>][<span class="vr">l</span>]); <span class="vr">l</span>++;}
  }
  <span class="kw">return</span> <span class="vr">r</span>;
}`,time:'O(n×m)',space:'O(1)'}

,{id:65,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Longest Common Subsequence',ar:'أطول سلسلة مشتركة بين نصين',idea:'DP 2D. لو الحرفان متطابقان: +1. لو لأ: max من الجهتين.',ex:'"abcde" و "ace" → 3 ✅',code:`<span class="kw">function</span> <span class="fn">LCS</span>(<span class="vr">a</span>,<span class="vr">b</span>) {
  <span class="kw">const</span> <span class="vr">m</span>=<span class="vr">a</span>.<span class="vr">length</span>,<span class="vr">n</span>=<span class="vr">b</span>.<span class="vr">length</span>;
  <span class="kw">const</span> <span class="vr">dp</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">m</span>+<span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(()=><span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>+<span class="num">1</span>).<span class="fn">fill</span>(<span class="num">0</span>));
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;<span class="vr">i</span>&lt;=<span class="vr">m</span>;<span class="vr">i</span>++)
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="num">1</span>;<span class="vr">j</span>&lt;=<span class="vr">n</span>;<span class="vr">j</span>++)
      <span class="vr">dp</span>[<span class="vr">i</span>][<span class="vr">j</span>]=<span class="vr">a</span>[<span class="vr">i</span>-<span class="num">1</span>]===<span class="vr">b</span>[<span class="vr">j</span>-<span class="num">1</span>]?<span class="num">1</span>+<span class="vr">dp</span>[<span class="vr">i</span>-<span class="num">1</span>][<span class="vr">j</span>-<span class="num">1</span>]:<span class="fn">Math.max</span>(<span class="vr">dp</span>[<span class="vr">i</span>-<span class="num">1</span>][<span class="vr">j</span>],<span class="vr">dp</span>[<span class="vr">i</span>][<span class="vr">j</span>-<span class="num">1</span>]);
  <span class="kw">return</span> <span class="vr">dp</span>[<span class="vr">m</span>][<span class="vr">n</span>];
}`,time:'O(m×n)',space:'O(m×n)'}

,{id:66,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Course Schedule II',ar:'ترتيب الكورسات',idea:'Topological Sort (Kahn). كورس يُضاف بعد انتهاء كل prerequisites.',ex:'[[1,0],[2,0],[3,1],[3,2]] → [0,1,2,3] ✅',code:`<span class="kw">function</span> <span class="fn">findOrder</span>(<span class="vr">n</span>,<span class="vr">pre</span>) {
  <span class="kw">const</span> <span class="vr">adj</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(()=>[]);
  <span class="kw">const</span> <span class="vr">deg</span>=<span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">n</span>).<span class="fn">fill</span>(<span class="num">0</span>);
  <span class="kw">for</span>(<span class="kw">const</span>[<span class="vr">a</span>,<span class="vr">b</span>] <span class="kw">of</span> <span class="vr">pre</span>){<span class="vr">adj</span>[<span class="vr">b</span>].<span class="fn">push</span>(<span class="vr">a</span>);<span class="vr">deg</span>[<span class="vr">a</span>]++;}
  <span class="kw">const</span> <span class="vr">q</span>=[]; <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">n</span>;<span class="vr">i</span>++) <span class="kw">if</span>(<span class="vr">deg</span>[<span class="vr">i</span>]===<span class="num">0</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">i</span>);
  <span class="kw">const</span> <span class="vr">or</span>=[];
  <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){
    <span class="kw">const</span> <span class="vr">c</span>=<span class="vr">q</span>.<span class="fn">shift</span>(); <span class="vr">or</span>.<span class="fn">push</span>(<span class="vr">c</span>);
    <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">adj</span>[<span class="vr">c</span>]) <span class="kw">if</span>(--<span class="vr">deg</span>[<span class="vr">x</span>]===<span class="num">0</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">x</span>);
  }
  <span class="kw">return</span> <span class="vr">or</span>.<span class="vr">length</span>===<span class="vr">n</span>?<span class="vr">or</span>:[];
}`,time:'O(V+E)',space:'O(V+E)'}

,{id:67,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Pacific Atlantic Water Flow',ar:'مياه تصل للمحيطين',idea:'BFS من الساحلين للداخل. الخلايا المشتركة = الجواب.',ex:'Grid 5×5 → الخلايا اللي مياهها تصل للمحيطين ✅',code:`<span class="kw">function</span> <span class="fn">pacificAtlantic</span>(<span class="vr">h</span>) {
  <span class="kw">const</span> <span class="vr">R</span>=<span class="vr">h</span>.<span class="vr">length</span>,<span class="vr">C</span>=<span class="vr">h</span>[<span class="num">0</span>].<span class="vr">length</span>;
  <span class="kw">const</span> <span class="vr">mk</span>=()=><span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">R</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(()=><span class="kw">new</span> <span class="fn">Array</span>(<span class="vr">C</span>).<span class="fn">fill</span>(<span class="kw">false</span>));
  <span class="kw">const</span> <span class="vr">p</span>=<span class="fn">mk</span>(),<span class="vr">a</span>=<span class="fn">mk</span>();
  <span class="kw">function</span> <span class="fn">bfs</span>(<span class="vr">q</span>,<span class="vr">vis</span>){
    <span class="kw">const</span> <span class="vr">D</span>=[[<span class="num">1</span>,<span class="num">0</span>],[-<span class="num">1</span>,<span class="num">0</span>],[<span class="num">0</span>,<span class="num">1</span>],[<span class="num">0</span>,-<span class="num">1</span>]];
    <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){
      <span class="kw">const</span>[<span class="vr">r</span>,<span class="vr">c</span>]=<span class="vr">q</span>.<span class="fn">shift</span>();
      <span class="kw">for</span>(<span class="kw">const</span>[<span class="vr">dr</span>,<span class="vr">dc</span>] <span class="kw">of</span> <span class="vr">D</span>){
        <span class="kw">const</span> <span class="vr">nr</span>=<span class="vr">r</span>+<span class="vr">dr</span>,<span class="vr">nc</span>=<span class="vr">c</span>+<span class="vr">dc</span>;
        <span class="kw">if</span>(<span class="vr">nr</span>&gt;=<span class="num">0</span>&&<span class="vr">nr</span>&lt;<span class="vr">R</span>&&<span class="vr">nc</span>&gt;=<span class="num">0</span>&&<span class="vr">nc</span>&lt;<span class="vr">C</span>&&!<span class="vr">vis</span>[<span class="vr">nr</span>][<span class="vr">nc</span>]&&<span class="vr">h</span>[<span class="vr">nr</span>][<span class="vr">nc</span>]&gt;=<span class="vr">h</span>[<span class="vr">r</span>][<span class="vr">c</span>])
          {<span class="vr">vis</span>[<span class="vr">nr</span>][<span class="vr">nc</span>]=<span class="kw">true</span>;<span class="vr">q</span>.<span class="fn">push</span>([<span class="vr">nr</span>,<span class="vr">nc</span>]);}
      }
    }
  }
  <span class="kw">const</span> <span class="vr">pq</span>=[],<span class="vr">aq</span>=[];
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">R</span>;<span class="vr">r</span>++){<span class="vr">p</span>[<span class="vr">r</span>][<span class="num">0</span>]=<span class="kw">true</span>;<span class="vr">pq</span>.<span class="fn">push</span>([<span class="vr">r</span>,<span class="num">0</span>]);<span class="vr">a</span>[<span class="vr">r</span>][<span class="vr">C</span>-<span class="num">1</span>]=<span class="kw">true</span>;<span class="vr">aq</span>.<span class="fn">push</span>([<span class="vr">r</span>,<span class="vr">C</span>-<span class="num">1</span>]);}
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="num">0</span>;<span class="vr">c</span>&lt;<span class="vr">C</span>;<span class="vr">c</span>++){<span class="vr">p</span>[<span class="num">0</span>][<span class="vr">c</span>]=<span class="kw">true</span>;<span class="vr">pq</span>.<span class="fn">push</span>([<span class="num">0</span>,<span class="vr">c</span>]);<span class="vr">a</span>[<span class="vr">R</span>-<span class="num">1</span>][<span class="vr">c</span>]=<span class="kw">true</span>;<span class="vr">aq</span>.<span class="fn">push</span>([<span class="vr">R</span>-<span class="num">1</span>,<span class="vr">c</span>]);}
  <span class="fn">bfs</span>(<span class="vr">pq</span>,<span class="vr">p</span>);<span class="fn">bfs</span>(<span class="vr">aq</span>,<span class="vr">a</span>);

,{id:68,cat:'trees',catN:'🌳 Trees',diff:'hard',en:'Serialize and Deserialize Binary Tree',ar:'تحويل الشجرة لنص وبالعكس',idea:'BFS للـ serialize. نفس الترتيب للـ deserialize.',ex:'[1,2,3] ↔ "1,2,3,null,null,null,null" ✅',code:`<span class="kw">const</span> <span class="vr">codec</span>={
  <span class="fn">serialize</span>(<span class="vr">r</span>){
    <span class="kw">if</span>(!<span class="vr">r</span>) <span class="kw">return</span> '';
    <span class="kw">const</span> <span class="vr">res</span>=[],<span class="vr">q</span>=[<span class="vr">r</span>];
    <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){<span class="kw">const</span> <span class="vr">n</span>=<span class="vr">q</span>.<span class="fn">shift</span>();<span class="kw">if</span>(<span class="vr">n</span>){<span class="vr">res</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">val</span>);<span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">left</span>,<span class="vr">n</span>.<span class="vr">right</span>);}else <span class="vr">res</span>.<span class="fn">push</span>('null');}
    <span class="kw">return</span> <span class="vr">res</span>.<span class="fn">join</span>(',');
  },
  <span class="fn">deserialize</span>(<span class="vr">d</span>){
    <span class="kw">if</span>(!<span class="vr">d</span>) <span class="kw">return</span> <span class="kw">null</span>;

    <span class="kw">const</span> <span class="vr">r</span>={<span class="vr">val</span>:+<span class="vr">v</span>[<span class="num">0</span>],<span class="vr">left</span>:<span class="kw">null</span>,<span class="vr">right</span>:<span class="kw">null</span>};
    <span class="kw">const</span> <span class="vr">q</span>=[<span class="vr">r</span>];<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;
    <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){
      <span class="kw">const</span> <span class="vr">n</span>=<span class="vr">q</span>.<span class="fn">shift</span>();
      <span class="kw">if</span>(<span class="vr">v</span>[<span class="vr">i</span>]!=='null'){<span class="vr">n</span>.<span class="vr">left</span>={<span class="vr">val</span>:+<span class="vr">v</span>[<span class="vr">i</span>],<span class="vr">left</span>:<span class="kw">null</span>,<span class="vr">right</span>:<span class="kw">null</span>};<span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">left</span>);}<span class="vr">i</span>++;
      <span class="kw">if</span>(<span class="vr">v</span>[<span class="vr">i</span>]!=='null'){<span class="vr">n</span>.<span class="vr">right</span>={<span class="vr">val</span>:+<span class="vr">v</span>[<span class="vr">i</span>],<span class="vr">left</span>:<span class="kw">null</span>,<span class="vr">right</span>:<span class="kw">null</span>};<span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">n</span>.<span class="vr">right</span>);}<span class="vr">i</span>++;
    }
    <span class="kw">return</span> <span class="vr">r</span>;
  }
};`,time:'O(n)',space:'O(n)'}

,{id:69,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Surrounded Regions',ar:'تلوين المناطق المحاطة',idea:'DFS من الحواف للداخل واحمِ الـ O المتصلة. الباقي يتحول لـ X.',ex:'XXXX/XOOX/XXOX/XOXX → الـ O الداخلية تتحول X ✅',code:`<span class="kw">function</span> <span class="fn">solve</span>(<span class="vr">b</span>) {

  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">R</span>;<span class="vr">r</span>++){<span class="fn">dfs</span>(<span class="vr">r</span>,<span class="num">0</span>);<span class="fn">dfs</span>(<span class="vr">r</span>,<span class="vr">C</span>-<span class="num">1</span>);}
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="num">0</span>;<span class="vr">c</span>&lt;<span class="vr">C</span>;<span class="vr">c</span>++){<span class="fn">dfs</span>(<span class="num">0</span>,<span class="vr">c</span>);<span class="fn">dfs</span>(<span class="vr">R</span>-<span class="num">1</span>,<span class="vr">c</span>);}
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">r</span>=<span class="num">0</span>;<span class="vr">r</span>&lt;<span class="vr">R</span>;<span class="vr">r</span>++) <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="num">0</span>;<span class="vr">c</span>&lt;<span class="vr">C</span>;<span class="vr">c</span>++)
    <span class="vr">b</span>[<span class="vr">r</span>][<span class="vr">c</span>]=<span class="vr">b</span>[<span class="vr">r</span>][<span class="vr">c</span>]==='S'?'O':'X';

,{id:70,cat:'graphs',catN:'🕸️ Graphs',diff:'hard',en:'Word Ladder',ar:'سلم الكلمات - أقصر تحويل',idea:'BFS. كل كلمة بنغير فيها حرف واحد في كل مستوى.',ex:'"hit"→"cog" : hit→hot→dot→dog→cog = 5 ✅',code:`<span class="kw">function</span> <span class="fn">ladderLength</span>(<span class="vr">bg</span>,<span class="vr">en</span>,<span class="vr">wl</span>) {
  <span class="kw">const</span> <span class="vr">ws</span>=<span class="kw">new</span> <span class="fn">Set</span>(<span class="vr">wl</span>);

    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">w</span>.<span class="vr">length</span>;<span class="vr">i</span>++)
      <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">c</span>=<span class="num">97</span>;<span class="vr">c</span>&lt;=<span class="num">122</span>;<span class="vr">c</span>++){
        <span class="kw">const</span> <span class="vr">nw</span>=<span class="vr">w</span>.<span class="fn">slice</span>(<span class="num">0</span>,<span class="vr">i</span>)+String.fromCharCode(<span class="vr">c</span>)+<span class="vr">w</span>.<span class="fn">slice</span>(<span class="vr">i</span>+<span class="num">1</span>);
        <span class="kw">if</span>(<span class="vr">nw</span>===<span class="vr">en</span>) <span class="kw">return</span> <span class="vr">l</span>+<span class="num">1</span>;
        <span class="kw">if</span>(<span class="vr">ws</span>.<span class="fn">has</span>(<span class="vr">nw</span>)&&!<span class="vr">seen</span>.<span class="fn">has</span>(<span class="vr">nw</span>)){<span class="vr">seen</span>.<span class="fn">add</span>(<span class="vr">nw</span>);<span class="vr">q</span>.<span class="fn">push</span>([<span class="vr">nw</span>,<span class="vr">l</span>+<span class="num">1</span>]);}

  }

}`,time:'O(M²N)',space:'O(M²N)'}

,{id:71,cat:'dp',catN:'🧠 DP',diff:'medium',en:'Palindromic Substrings Count',ar:'عدد الـ substrings اللي palindrome',idea:'لكل مركز نتوسع ونعدّ. كل توسع ناجح = palindrome جديد.',ex:'"aaa" → 6 ✅',code:`<span class="kw">function</span> <span class="fn">countPalin</span>(<span class="vr">s</span>) {

  <span class="kw">function</span> <span class="fn">ex</span>(<span class="vr">l</span>,<span class="vr">r</span>){

  }

  <span class="kw">return</span> <span class="vr">cnt</span>;
}`,time:'O(n²)',space:'O(1)'}

,{id:72,cat:'dp',catN:'🧠 DP',diff:'hard',en:'Edit Distance',ar:'أقل عدد عمليات لتحويل كلمة لأخرى',idea:'DP 2D. عمليات: Insert, Delete, Replace.',ex:'"horse"→"ros" → 3 عمليات ✅',code:`<span class="kw">function</span> <span class="fn">minDistance</span>(<span class="vr">a</span>,<span class="vr">b</span>) {

  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">1</span>;<span class="vr">i</span>&lt;=<span class="vr">m</span>;<span class="vr">i</span>++)
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="num">1</span>;<span class="vr">j</span>&lt;=<span class="vr">n</span>;<span class="vr">j</span>++)
      <span class="vr">dp</span>[<span class="vr">i</span>][<span class="vr">j</span>]=<span class="vr">a</span>[<span class="vr">i</span>-<span class="num">1</span>]===<span class="vr">b</span>[<span class="vr">j</span>-<span class="num">1</span>]?<span class="vr">dp</span>[<span class="vr">i</span>-<span class="num">1</span>][<span class="vr">j</span>-<span class="num">1</span>]:
        <span class="num">1</span>+<span class="fn">Math.min</span>(<span class="vr">dp</span>[<span class="vr">i</span>-<span class="num">1</span>][<span class="vr">j</span>],<span class="vr">dp</span>[<span class="vr">i</span>][<span class="vr">j</span>-<span class="num">1</span>],<span class="vr">dp</span>[<span class="vr">i</span>-<span class="num">1</span>][<span class="vr">j</span>-<span class="num">1</span>]);
  <span class="kw">return</span> <span class="vr">dp</span>[<span class="vr">m</span>][<span class="vr">n</span>];
}`,time:'O(m×n)',space:'O(m×n)'}

,{id:73,cat:'graphs',catN:'🕸️ Graphs',diff:'medium',en:'Reorder List',ar:'إعادة ترتيب القائمة',idea:'3 خطوات: لاقي النص، اعكس النصف الثاني، ادمج الاتنين.',ex:'1→2→3→4→5 → 1→5→2→4→3 ✅',code:`<span class="kw">function</span> <span class="fn">reorderList</span>(<span class="vr">h</span>) {

  <span class="kw">let</span> <span class="vr">a</span>=<span class="vr">h</span>,<span class="vr">b</span>=<span class="vr">pr</span>;
  <span class="kw">while</span>(<span class="vr">b</span>){<span class="kw">const</span> <span class="vr">an</span>=<span class="vr">a</span>.<span class="vr">next</span>,<span class="vr">bn</span>=<span class="vr">b</span>.<span class="vr">next</span>;<span class="vr">a</span>.<span class="vr">next</span>=<span class="vr">b</span>;<span class="vr">b</span>.<span class="vr">next</span>=<span class="vr">an</span>;<span class="vr">a</span>=<span class="vr">an</span>;<span class="vr">b</span>=<span class="vr">bn</span>;}

,{id:74,cat:'graphs',catN:'🕸️ Graphs',diff:'hard',en:'Alien Dictionary',ar:'ترتيب الأبجدية في لغة غريبة',idea:'Topological Sort. نستنتج ترتيب الحروف من مقارنة الكلمات المتجاورة.',ex:'["wrt","wrf","er","ett","rftt"] → "wertf" ✅',code:`<span class="kw">function</span> <span class="fn">alienOrder</span>(<span class="vr">words</span>) {
  <span class="kw">const</span> <span class="vr">adj</span>=<span class="kw">new</span> <span class="fn">Map</span>(),<span class="vr">deg</span>=<span class="kw">new</span> <span class="fn">Map</span>();
  <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">w</span> <span class="kw">of</span> <span class="vr">words</span>) <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">c</span> <span class="kw">of</span> <span class="vr">w</span>)
    {<span class="kw">if</span>(!<span class="vr">adj</span>.<span class="fn">has</span>(<span class="vr">c</span>)) <span class="vr">adj</span>.<span class="fn">set</span>(<span class="vr">c</span>,<span class="kw">new</span> <span class="fn">Set</span>());<span class="kw">if</span>(!<span class="vr">deg</span>.<span class="fn">has</span>(<span class="vr">c</span>)) <span class="vr">deg</span>.<span class="fn">set</span>(<span class="vr">c</span>,<span class="num">0</span>);}
  <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">i</span>=<span class="num">0</span>;<span class="vr">i</span>&lt;<span class="vr">words</span>.<span class="vr">length</span>-<span class="num">1</span>;<span class="vr">i</span>++){
    <span class="kw">const</span>[<span class="vr">w1</span>,<span class="vr">w2</span>]=[<span class="vr">words</span>[<span class="vr">i</span>],<span class="vr">words</span>[<span class="vr">i</span>+<span class="num">1</span>]];
    <span class="kw">const</span> <span class="vr">len</span>=<span class="fn">Math.min</span>(<span class="vr">w1</span>.<span class="vr">length</span>,<span class="vr">w2</span>.<span class="vr">length</span>);
    <span class="kw">for</span>(<span class="kw">let</span> <span class="vr">j</span>=<span class="num">0</span>;<span class="vr">j</span>&lt;<span class="vr">len</span>;<span class="vr">j</span>++){
      <span class="kw">if</span>(<span class="vr">w1</span>[<span class="vr">j</span>]!==<span class="vr">w2</span>[<span class="vr">j</span>]){
        <span class="kw">if</span>(!<span class="vr">adj</span>.<span class="fn">get</span>(<span class="vr">w1</span>[<span class="vr">j</span>]).<span class="fn">has</span>(<span class="vr">w2</span>[<span class="vr">j</span>])){<span class="vr">adj</span>.<span class="fn">get</span>(<span class="vr">w1</span>[<span class="vr">j</span>]).<span class="fn">add</span>(<span class="vr">w2</span>[<span class="vr">j</span>]);<span class="vr">deg</span>.<span class="fn">set</span>(<span class="vr">w2</span>[<span class="vr">j</span>],<span class="vr">deg</span>.<span class="fn">get</span>(<span class="vr">w2</span>[<span class="vr">j</span>])+<span class="num">1</span>);}
        <span class="kw">break</span>;
      }
    }
  }
  <span class="kw">const</span> <span class="vr">q</span>=[...<span class="vr">deg</span>].<span class="fn">filter</span>(([,<span class="vr">v</span>])=><span class="vr">v</span>===<span class="num">0</span>).<span class="fn">map</span>(([<span class="vr">k</span>])=><span class="vr">k</span>);
  <span class="kw">let</span> <span class="vr">res</span>='';
  <span class="kw">while</span>(<span class="vr">q</span>.<span class="vr">length</span>){
    <span class="kw">const</span> <span class="vr">c</span>=<span class="vr">q</span>.<span class="fn">shift</span>(); <span class="vr">res</span>+=<span class="vr">c</span>;
    <span class="kw">for</span>(<span class="kw">const</span> <span class="vr">x</span> <span class="kw">of</span> <span class="vr">adj</span>.<span class="fn">get</span>(<span class="vr">c</span>)){<span class="vr">deg</span>.<span class="fn">set</span>(<span class="vr">x</span>,<span class="vr">deg</span>.<span class="fn">get</span>(<span class="vr">x</span>)-<span class="num">1</span>);<span class="kw">if</span>(<span class="vr">deg</span>.<span class="fn">get</span>(<span class="vr">x</span>)===<span class="num">0</span>) <span class="vr">q</span>.<span class="fn">push</span>(<span class="vr">x</span>);}
  }
  <span class="kw">return</span> <span class="vr">res</span>.<span class="vr">length</span>===<span class="vr">adj</span>.<span class="vr">size</span>?<span class="vr">res</span>:'';
}`,time:'O(C)',space:'O(1)'}

,{id:75,cat:'trie',catN:'🔤 Trie',diff:'hard',en:'Word Search II',ar:'ابحث عن كل الكلمات في الجدول',idea:'Trie + DFS. نبني Trie من القاموس ونبحث في الجدول بـ DFS.',ex:'board مع words=["oath","pea","eat","rain"] → ["eat","oath"] ✅',code:`<span class="kw">function</span> <span class="fn">findWords</span>(<span class="vr">board</span>,<span class="vr">words</span>) {

    <span class="vr">board</span>[<span class="vr">r</span>][<span class="vr">c</span>]='#';

// ── Build categories ──
const CATS = {all:'الكل', arrays:'📦 Arrays', twoptr:'👆 Two Pointers', sliding:'🪟 Sliding Window',
  stack:'📚 Stack', bsearch:'🔍 Binary Search', linked:'🔗 Linked List', trees:'🌳 Trees',
  graphs:'🕸️ Graphs', dp:'🧠 DP', intervals:'📅 Intervals', trie:'🔤 Trie', heap:'⛏️ Heap', bits:'🔢 Bits'};

// Build cat nav
const nav = document.getElementById('catNav');
Object.entries(CATS).forEach(([k,v]) => {
  const b = document.createElement('button');
  b.className = 'cbtn' + (k==='all'?' on':'');
  b.textContent = v;
  b.onclick = () => { curCat=k; document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); render(); };
  nav.appendChild(b);
});

function setDiff(d, btn) {
  curDiff = d;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  const filtered = QS.filter(s => {
    const mD = curDiff==='all' || s.diff===curDiff;
    const mC = curCat==='all' || s.cat===curCat;
    const mQ = !q || s.en.toLowerCase().includes(q) || s.ar.includes(q);
    return mD && mC && mQ;
  });

  // group by catN
  const groups = {};
  filtered.forEach(s => { if(!groups[s.catN]) groups[s.catN]=[]; groups[s.catN].push(s); });

  let html = '';
  if (!filtered.length) { html = '<div class="no-res">😕 مفيش نتائج</div>'; }
  else {
    Object.entries(groups).forEach(([cat, qs]) => {
      html += `<div class="cat-group"><div class="cat-title">${cat} <span class="cat-cnt">${qs.length} سؤال</span></div>`;
      qs.forEach(s => { html += buildCard(s); });
      html += '</div>';
    });
  }
  document.getElementById('main').innerHTML = html;
  updateProg();
}

function buildCard(s) {
  const dn = {easy:'سهل 🟢',medium:'متوسط 🟡',hard:'صعب 🔴'};
  const done = solved.has(s.id);
  return `
<div class="sol-card" id="sc${s.id}" onclick="toggleCard(${s.id},event)">
  <div class="sol-head">
    <div class="sol-num">#${s.id}</div>
    <div class="sol-titles"><div class="sol-en">${s.en}</div><div class="sol-ar">${s.ar}</div></div>
    <span class="diff ${s.diff}">${dn[s.diff]}</span>
    <span class="chev">›</span>
  </div>
  <div class="sol-body">
    <div class="sol-content">
      <div class="tabs">
        <button class="tab on" onclick="switchTab(${s.id},'idea',this)">💡 الفكرة</button>
        <button class="tab" onclick="switchTab(${s.id},'code',this)">💻 الكود</button>
      </div>
      <div id="idea${s.id}" class="tab-panel on">
        <div class="idea-panel">
          <p>${s.idea}</p>
          <div class="ex">${s.ex}</div>
        </div>
      </div>
      <div id="code${s.id}" class="tab-panel">
        <div class="code-wrap">
          <div class="code-head">
            <div class="dots2"><div class="dot2" style="background:#ff5f57"></div><div class="dot2" style="background:#febc2e"></div><div class="dot2" style="background:#28c840"></div></div>
            <span class="lang-tag">JavaScript</span>
            <button class="copy-btn" onclick="copyCode(${s.id},event)">نسخ</button>
          </div>
          <pre class="code" id="pre${s.id}">${s.code}</pre>
        </div>
        <div class="cx-row">
          <span class="cx cx-t">⏱ Time: ${s.time}</span>
          <span class="cx cx-s">💾 Space: ${s.space}</span>
        </div>
      </div>
      <button class="mark-btn ${done?'done':''}" onclick="markDone(${s.id},event)">${done?'✅ تمت!':'○ علّمها حليت'}</button>
    </div>
  </div>
</div>`;
}

function toggleCard(id, e) {
  if (e.target.closest('.tab,.mark-btn,.copy-btn')) return;
  const c = document.getElementById('sc'+id);
  const was = c.classList.contains('open');
  document.querySelectorAll('.sol-card.open').forEach(x=>x.classList.remove('open'));
  if (!was) c.classList.add('open');
}

function switchTab(id, tab, btn) {
  document.getElementById('idea'+id).classList.remove('on');
  document.getElementById('code'+id).classList.remove('on');
  document.getElementById(tab+id).classList.add('on');
  btn.closest('.tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function markDone(id, e) {
  e.stopPropagation();
  solved.has(id) ? solved.delete(id) : solved.add(id);
  const c = document.getElementById('sc'+id);
  const wasOpen = c.classList.contains('open');
  render();
  if (wasOpen) { setTimeout(() => { const nc=document.getElementById('sc'+id); if(nc) nc.classList.add('open'); },10); }
}

function copyCode(id, e) {
  e.stopPropagation();
  const pre = document.getElementById('pre'+id);
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    e.target.textContent = '✅ تم!';
    setTimeout(() => { e.target.textContent = 'نسخ'; }, 1500);
  });
}

function updateProg() {
  const c = solved.size;
  document.getElementById('pFill').style.width = (c/75*100)+'%';
  document.getElementById('pCount').textContent = c;
}

render();
</script>
</body>
</html>
